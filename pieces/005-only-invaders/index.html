<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Only Invaders · HyperGal</title>
    <style>
      html, body { margin: 0; height: 100%; background: #070a12; overflow: hidden; }
      canvas { display: block; width: 100%; height: 100%; }
      .caption {
        position: fixed;
        left: 50%;
        bottom: 1rem;
        transform: translateX(-50%);
        color: rgba(235, 244, 255, 0.62);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: .8rem;
        letter-spacing: .04em;
        text-align: center;
        pointer-events: none;
        text-shadow: 0 1px 0 #000;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="caption">Only Invaders · 2026</div>
    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');

      const COLORS = {
        bg: '#070a12',
        grid: 'rgba(90, 126, 180, 0.10)',
        midline: 'rgba(235, 244, 255, 0.14)',
        top: '#ff6b9d',
        topSoft: 'rgba(255, 107, 157, 0.22)',
        bottom: '#7cf7c8',
        bottomSoft: 'rgba(124, 247, 200, 0.22)',
        left: '#8fb7ff',
        leftSoft: 'rgba(143, 183, 255, 0.22)',
        right: '#ffb86b',
        rightSoft: 'rgba(255, 184, 107, 0.22)',
        attack: '#f8ff9a',
        super: '#fff1a8',
        superCore: '#ffffff',
        text: 'rgba(235, 244, 255, 0.86)',
        dim: 'rgba(235, 244, 255, 0.40)',
      };

      const ATTACK_SPEED_MIN = 245;
      const ATTACK_SPEED_MAX = 320;
      const SUPER_CHANCE = 0.045;
      const MAX_ATTACKS = 7;
      const MUZZLE_GAP = 17;
      const DEFENDER_W = 58;
      const DEFENDER_H = 24;
      const SIDES = ['top', 'right', 'bottom', 'left'];
      const OPPOSITE = { top: 'bottom', right: 'left', bottom: 'top', left: 'right' };
      const BASE_ANGLE = { top: Math.PI, right: -Math.PI / 2, bottom: 0, left: Math.PI / 2 };

      let W = 0, H = 0, dpr = 1;
      let now = 0;
      let lastT = 0;
      let raf = 0;
      let nextAttackAt = 0;
      let nextSide = 'bottom';
      let attackId = 1;
      let driftSeed = Math.random() * 1000;
      let screenShake = 0;
      let whiteFlash = 0;

      const defenders = {
        top: makeDefender('top'),
        right: makeDefender('right'),
        bottom: makeDefender('bottom'),
        left: makeDefender('left'),
      };

      let attacks = [];
      let counters = [];
      let pendingAttacks = [];
      let sparks = [];
      let stars = [];

      const rand = (a, b) => a + Math.random() * (b - a);
      const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
      const ease = (v, target, amount) => v + (target - v) * amount;
      const nextShooterSide = (side) => SIDES[(SIDES.indexOf(side) + 1) % SIDES.length];

      function makeDefender(side) {
        return {
          side,
          axis: side === 'top' || side === 'bottom' ? 'x' : 'y',
          color: COLORS[side],
          softColor: COLORS[side + 'Soft'],
          x: 0,
          y: 0,
          baseX: 0,
          baseY: 0,
          coord: 0,
          goalCoord: 0,
          railMin: 0,
          railMax: 0,
          aimX: 0,
          aimY: 0,
          wobble: Math.random() * Math.PI * 2,
          muzzleGlow: 0,
          chargeStart: -1,
          chargeUntil: -1,
          score: 0,
        };
      }

      function reset() {
        cancelAnimationFrame(raf);
        dpr = Math.min(2, window.devicePixelRatio || 1);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        configureDefenders();

        attacks = [];
        counters = [];
        pendingAttacks = [];
        sparks = [];
        stars = makeStars();
        now = 0;
        lastT = performance.now();
        nextSide = SIDES[(Math.random() * SIDES.length) | 0];
        nextAttackAt = 0.45;
        driftSeed = Math.random() * 1000;
        screenShake = 0;
        whiteFlash = 0;
        raf = requestAnimationFrame(tick);
      }

      function makeStars() {
        const count = clamp(Math.floor((W * H) / 9000), 44, 130);
        return Array.from({ length: count }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.5 + 0.3,
          a: Math.random() * 0.55 + 0.10,
          tw: Math.random() * Math.PI * 2,
        }));
      }

      function configureDefenders() {
        const padX = Math.max(58, W * 0.06);
        const padY = Math.max(58, H * 0.09);
        const specs = {
          top:    { baseX: W * 0.52, baseY: padY,     coord: W * 0.52, min: padX, max: W - padX },
          right:  { baseX: W - padX, baseY: H * 0.48, coord: H * 0.48, min: padY, max: H - padY },
          bottom: { baseX: W * 0.48, baseY: H - padY, coord: W * 0.48, min: padX, max: W - padX },
          left:   { baseX: padX,     baseY: H * 0.52, coord: H * 0.52, min: padY, max: H - padY },
        };
        for (const side of SIDES) {
          const def = defenders[side];
          const spec = specs[side];
          def.baseX = spec.baseX;
          def.baseY = spec.baseY;
          def.coord = spec.coord;
          def.goalCoord = spec.coord;
          def.railMin = spec.min;
          def.railMax = spec.max;
          def.score = 0;
          def.chargeStart = -1;
          def.chargeUntil = -1;
          def.muzzleGlow = 0;
          def.aimX = W / 2;
          def.aimY = H / 2;
          applyDefenderPosition(def, 0);
        }
      }

      function tick(t) {
        const dt = Math.max(0, Math.min(1 / 30, (t - lastT) / 1000));
        lastT = t;
        now += dt;

        launchPendingAttacks();

        if (now >= nextAttackAt && attacks.length + pendingAttacks.length < MAX_ATTACKS) {
          const volley = launchVolley(nextSide);
          nextSide = nextShooterSide(nextSide);
          nextAttackAt = now + (volley.super ? rand(2.4, 3.8) : rand(0.72, 1.36));
        }

        updateDefenders(dt);
        updateBullets(dt);
        updateSparks(dt);
        screenShake = Math.max(0, screenShake - dt * 1.8);
        whiteFlash = Math.max(0, whiteFlash - dt * 2.35);
        draw();
        raf = requestAnimationFrame(tick);
      }

      function launchVolley(side) {
        const superReady = !attacks.some((b) => b.super) && !pendingAttacks.some((b) => b.super);
        const superShot = superReady && Math.random() < SUPER_CHANCE;
        const mood = Math.random();
        const count = superShot ? 1 : mood > 0.76 ? 3 : mood > 0.48 ? 2 : 1;
        const aggression = superShot ? 1 : count === 1 ? rand(0.15, 0.65) : rand(0.62, 1);
        const cadence = superShot ? 0 : aggression > 0.75 ? rand(0.11, 0.18) : rand(0.18, 0.28);
        const chargeDelay = superShot ? rand(0.68, 0.92) : 0;
        const shooter = defenders[side];
        const targetSide = pickTargetSide(side);
        const baseImpact = pickImpactPoint(side, targetSide, aggression);
        setDefenderGoal(shooter, baseImpact.x, baseImpact.y, W * 0.08 * aggression);
        if (superShot) {
          shooter.aimX = baseImpact.x;
          shooter.aimY = baseImpact.y;
          shooter.chargeStart = now;
          shooter.chargeUntil = now + chargeDelay;
        }
        for (let i = 0; i < count; i++) {
          pendingAttacks.push({
            side,
            fireAt: now + chargeDelay + i * cadence,
            aggression,
            targetSide,
            baseImpact,
            shotIndex: i,
            shotCount: count,
            super: superShot,
          });
        }
        return { count, super: superShot };
      }

      function launchPendingAttacks() {
        for (let i = 0; i < pendingAttacks.length;) {
          const shot = pendingAttacks[i];
          if (shot.fireAt > now) {
            i++;
            continue;
          }
          if (attacks.length >= MAX_ATTACKS) {
            i++;
            continue;
          }
          launchAttack(shot);
          pendingAttacks.splice(i, 1);
        }
      }

      function launchAttack(shot) {
        const side = shot.side;
        const shooter = defenders[side];
        const pathAngle = Math.atan2(shot.baseImpact.y - shooter.y, shot.baseImpact.x - shooter.x);
        const spread = (shot.shotIndex - (shot.shotCount - 1) / 2) * rand(30, 58);
        const px = -Math.sin(pathAngle);
        const py = Math.cos(pathAngle);
        const lunge = rand(-1, 1) * W * (0.04 + shot.aggression * 0.10);
        const targetX = clamp(shot.baseImpact.x + px * spread + rand(-36, 36), W * 0.18, W * 0.82);
        const impactY = clamp(shot.baseImpact.y + py * spread + rand(-36, 36), H * 0.18, H * 0.82);
        const muzzle = muzzlePoint(shooter, targetX, impactY, shot.super ? 42 : 34);
        const startX = muzzle.x;
        const startY = muzzle.y;
        const speed = shot.super
          ? rand(185, 245)
          : rand(ATTACK_SPEED_MIN, ATTACK_SPEED_MAX + shot.aggression * 120);
        const travel = Math.abs(impactY - startY);
        const impactDelay = Math.max(shot.super ? 1.08 : 0.64, travel / speed);
        const impactTime = now + impactDelay;
        const vx = (targetX - startX) / impactDelay;
        const vy = (impactY - startY) / impactDelay;
        const id = attackId++;

        setDefenderGoal(shooter, targetX, impactY, lunge * 0.35 + rand(-42, 42));
        shooter.aimX = targetX;
        shooter.aimY = impactY;
        shooter.muzzleGlow = 1;

        const attack = {
          id,
          owner: side,
          targetSide: shot.targetSide,
          x: startX,
          y: startY,
          px: startX,
          py: startY,
          vx,
          vy,
          impactX: targetX,
          impactY,
          impactTime,
          r: shot.super ? 11 : 4,
          color: shot.super ? COLORS.super : COLORS.attack,
          aggression: shot.aggression,
          super: shot.super,
          armed: true,
        };
        attacks.push(attack);

        planCounter(attack);
      }

      function planCounter(attack) {
        const side = attack.targetSide;
        const defender = defenders[side];
        const timeToImpact = attack.impactTime - now;
        const lateSave = attack.super ? true : Math.random() < 0.38;
        const safetyWindow = attack.super ? rand(0.16, 0.26) : lateSave ? rand(0.13, 0.23) : rand(0.34, 0.72);
        const reaction = lateSave
          ? Math.max(0.14, timeToImpact - safetyWindow)
          : clamp(rand(0.18, 0.46), 0.14, Math.max(0.14, timeToImpact - safetyWindow));
        const fireTime = now + reaction;
        const danceOffset = lateSave ? rand(-46, 46) : rand(-118, 118);
        setDefenderGoal(defender, attack.impactX, attack.impactY, danceOffset);
        defender.aimX = attack.impactX;
        defender.aimY = attack.impactY;

        counters.push({
          owner: side,
          targetId: attack.id,
          x: defender.x,
          y: defender.y,
          px: defender.x,
          py: defender.y,
          vx: 0,
          vy: 0,
          r: attack.super ? 5.7 : lateSave ? 4.1 : 3.4,
          color: defender.color,
          fireTime,
          impactTime: attack.impactTime,
          impactX: attack.impactX,
          impactY: attack.impactY,
          lateSave,
          targetSuper: attack.super,
          startX: defender.x,
          startY: defender.y,
          fired: false,
          done: false,
        });
      }

      function pickTargetSide(side) {
        if (Math.random() < 0.55) return OPPOSITE[side];
        const choices = SIDES.filter((s) => s !== side && s !== OPPOSITE[side]);
        return choices[(Math.random() * choices.length) | 0];
      }

      function pickImpactPoint(side, targetSide, aggression) {
        const shooter = defenders[side];
        const target = defenders[targetSide];
        const jitterX = W * (0.10 + aggression * 0.10);
        const jitterY = H * (0.10 + aggression * 0.10);
        return {
          x: clamp((shooter.x + target.x) / 2 + rand(-jitterX, jitterX), W * 0.22, W * 0.78),
          y: clamp((shooter.y + target.y) / 2 + rand(-jitterY, jitterY), H * 0.22, H * 0.78),
        };
      }

      function setDefenderGoal(def, targetX, targetY, offset) {
        const coord = def.axis === 'x' ? targetX : targetY;
        def.goalCoord = clamp(coord + offset, def.railMin, def.railMax);
      }

      function muzzlePoint(def, targetX, targetY, length) {
        const angle = Math.atan2(targetY - def.y, targetX - def.x);
        return {
          x: def.x + Math.cos(angle) * length,
          y: def.y + Math.sin(angle) * length,
        };
      }

      function applyDefenderPosition(def, wobble) {
        if (def.axis === 'x') {
          def.x = def.coord;
          def.y = def.baseY + wobble * (def.side === 'top' ? 1 : -1);
        } else {
          def.x = def.baseX + wobble * (def.side === 'left' ? 1 : -1);
          def.y = def.coord;
        }
      }

      function updateDefenders(dt) {
        for (const def of Object.values(defenders)) {
          const drift = Math.sin(now * 1.4 + def.wobble + driftSeed) * 36;
          const shimmer = Math.sin(now * 3.1 + def.wobble * 0.6) * 9;
          const target = clamp(def.goalCoord + drift + shimmer, def.railMin, def.railMax);
          def.coord = ease(def.coord, target, Math.min(1, dt * 4.2));
          applyDefenderPosition(def, Math.sin(now * 2.2 + def.wobble) * 3);
          def.muzzleGlow = Math.max(0, def.muzzleGlow - dt * 4.6);
        }
      }

      function updateBullets(dt) {
        for (const b of attacks) {
          b.px = b.x;
          b.py = b.y;
          b.x += b.vx * dt;
          b.y += b.vy * dt;
        }

        for (const b of counters) {
          if (b.done) continue;
          if (!b.fired && now >= b.fireTime) fireCounter(b);
          if (!b.fired) continue;
          b.px = b.x;
          b.py = b.y;
          const span = Math.max(0.001, b.impactTime - b.fireTime);
          const p = clamp((now - b.fireTime) / span, 0, 1);
          b.x = b.startX + (b.impactX - b.startX) * p;
          b.y = b.startY + (b.impactY - b.startY) * p;
          if (now >= b.impactTime && resolveInterception(b)) break;
        }

        attacks = attacks.filter((b) => b.armed && b.x > -80 && b.x < W + 80 && b.y > -80 && b.y < H + 80);
        counters = counters.filter((b) => !b.done && b.x > -90 && b.x < W + 90 && b.y > -90 && b.y < H + 90);
      }

      function fireCounter(counter) {
        const def = defenders[counter.owner];
        const muzzle = muzzlePoint(def, counter.impactX, counter.impactY, counter.targetSuper ? 38 : 34);
        counter.x = muzzle.x;
        counter.y = muzzle.y;
        counter.px = counter.x;
        counter.py = counter.y;
        counter.startX = counter.x;
        counter.startY = counter.y;
        const dt = Math.max(0.18, counter.impactTime - now);
        counter.vx = (counter.impactX - counter.x) / dt;
        counter.vy = (counter.impactY - counter.y) / dt;
        counter.fired = true;
        def.aimX = counter.impactX;
        def.aimY = counter.impactY;
        def.muzzleGlow = 1;
      }

      function resolveInterception(counter) {
        const attack = attacks.find((b) => b.id === counter.targetId);
        counter.done = true;
        if (attack) {
          counter.x = counter.impactX;
          counter.y = counter.impactY;
          attack.x = attack.impactX;
          attack.y = attack.impactY;
          attack.armed = false;
          if (attack.super) {
            atomicBurst(counter.impactX, counter.impactY, defenders[counter.owner].color, attack.color);
            clearBulletsAndScores();
            return true;
          } else {
            defenders[counter.owner].score += 1;
            burst(counter.impactX, counter.impactY, defenders[counter.owner].color, attack.color);
          }
          shakeDefenders(counter.impactX, counter.impactY);
        }
        return false;
      }

      function clearBulletsAndScores() {
        attacks = [];
        counters = [];
        pendingAttacks = [];
        for (const def of Object.values(defenders)) def.score = 0;
      }

      function shakeDefenders(x, y) {
        for (const def of Object.values(defenders)) {
          const delta = def.axis === 'x' ? def.x - x : def.y - y;
          const dir = Math.sign(delta) || (Math.random() < 0.5 ? -1 : 1);
          def.goalCoord = clamp(def.goalCoord + dir * rand(16, 52), def.railMin, def.railMax);
        }
      }

      function burst(x, y, colorA, colorB) {
        const count = Math.floor(rand(24, 38));
        for (let i = 0; i < count; i++) {
          const a = (i / count) * Math.PI * 2 + rand(-0.12, 0.12);
          const speed = rand(55, 190);
          sparks.push({
            x,
            y,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            age: 0,
            life: rand(0.55, 1.05),
            color: Math.random() < 0.5 ? colorA : colorB,
            size: rand(1.2, 3.4),
          });
        }
        sparks.push({
          x,
          y,
          vx: 0,
          vy: 0,
          age: 0,
          life: 0.42,
          color: '#ffffff',
          size: 24,
          ring: true,
        });
      }

      function atomicBurst(x, y, colorA, colorB) {
        whiteFlash = 1;
        screenShake = 1;
        burst(x, y, colorA, colorB);
        const count = 90;
        for (let i = 0; i < count; i++) {
          const a = (i / count) * Math.PI * 2 + rand(-0.08, 0.08);
          const speed = rand(180, 560);
          sparks.push({
            x,
            y,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            age: 0,
            life: rand(0.75, 1.55),
            color: Math.random() < 0.45 ? colorA : colorB,
            size: rand(2, 6.5),
          });
        }
        for (let i = 0; i < 4; i++) {
          sparks.push({
            x,
            y,
            vx: 0,
            vy: 0,
            age: -i * 0.08,
            life: 0.72 + i * 0.18,
            color: '#ffffff',
            size: 46 + i * 38,
            ring: true,
          });
        }
      }

      function updateSparks(dt) {
        for (const s of sparks) {
          s.age += dt;
          if (!s.ring) {
            s.x += s.vx * dt;
            s.y += s.vy * dt;
            s.vx *= Math.pow(0.26, dt);
            s.vy = s.vy * Math.pow(0.32, dt) + 42 * dt;
          }
        }
        sparks = sparks.filter((s) => s.age < s.life);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.save();
        if (screenShake > 0) {
          const p = screenShake * screenShake;
          ctx.translate(rand(-18, 18) * p, rand(-14, 14) * p);
          ctx.rotate(rand(-0.012, 0.012) * p);
        }
        drawField();
        drawAimThreads();
        for (const b of attacks) drawBullet(b, b.color, b.super ? 24 : 8);
        for (const b of counters) if (b.fired) drawBullet(b, b.color, 6);
        drawSparks();
        for (const side of SIDES) drawDefender(defenders[side]);
        drawScores();
        ctx.restore();
        if (whiteFlash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${Math.min(0.96, whiteFlash * 0.96)})`;
          ctx.fillRect(0, 0, W, H);
        }
      }

      function drawField() {
        ctx.fillStyle = COLORS.bg;
        ctx.fillRect(0, 0, W, H);

        for (const star of stars) {
          const twinkle = 0.65 + Math.sin(now * 1.7 + star.tw) * 0.35;
          ctx.fillStyle = `rgba(200, 224, 255, ${star.a * twinkle})`;
          ctx.fillRect(star.x, star.y, star.r, star.r);
        }

        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 1;
        const gap = Math.max(34, Math.min(58, W / 18));
        ctx.beginPath();
        for (let x = (now * 8) % gap; x < W; x += gap) {
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
        }
        for (let y = 0; y < H; y += gap) {
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
        }
        ctx.stroke();

        ctx.setLineDash([8, 12]);
        ctx.strokeStyle = COLORS.midline;
        ctx.beginPath();
        ctx.moveTo(0, H / 2);
        ctx.lineTo(W, H / 2);
        ctx.moveTo(W / 2, 0);
        ctx.lineTo(W / 2, H);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawAimThreads() {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (const c of counters) {
          if (c.fired || c.done) continue;
          const def = defenders[c.owner];
          const alpha = clamp((c.fireTime - now) / 0.55, 0.1, 0.55);
          ctx.strokeStyle = hexA(def.color, 0.34 * alpha);
          ctx.lineWidth = 1;
          ctx.beginPath();
          const muzzle = muzzlePoint(def, c.impactX, c.impactY, c.targetSuper ? 38 : 34);
          ctx.moveTo(muzzle.x, muzzle.y);
          ctx.lineTo(c.impactX, c.impactY);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBullet(b, color, glow) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = color;
        ctx.lineWidth = b.r * (b.super ? 1.55 : 1.2);
        ctx.lineCap = 'round';
        ctx.shadowColor = color;
        ctx.shadowBlur = glow;
        ctx.beginPath();
        ctx.moveTo(b.px, b.py);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        if (b.super) {
          ctx.fillStyle = hexA(color, 0.18);
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r * 3.1, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        if (b.super) {
          ctx.fillStyle = COLORS.superCore;
          ctx.beginPath();
          ctx.arc(b.x - b.r * 0.25, b.y - b.r * 0.25, b.r * 0.42, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawSparks() {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (const s of sparks) {
          const p = clamp(s.age / s.life, 0, 1);
          const alpha = 1 - p;
          if (s.ring) {
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.75})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size * (0.4 + p * 2.8), 0, Math.PI * 2);
            ctx.stroke();
            continue;
          }
          ctx.fillStyle = hexA(s.color, alpha);
          ctx.fillRect(s.x - s.size / 2, s.y - s.size / 2, s.size, s.size);
        }
        ctx.restore();
      }

      function drawDefender(def) {
        const x = def.x;
        const y = def.y;
        const angle = Math.atan2(def.aimY - y, def.aimX - x);
        const barrelLen = 28 + def.muzzleGlow * 6;
        const charging = def.chargeUntil > now;
        if (charging) {
          const p = clamp((now - def.chargeStart) / Math.max(0.001, def.chargeUntil - def.chargeStart), 0, 1);
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.strokeStyle = `rgba(255,241,168,${0.26 + p * 0.36})`;
          ctx.lineWidth = 2 + p * 3;
          ctx.beginPath();
          ctx.arc(x, y, 24 + Math.sin(now * 18) * 4 + p * 24, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = `rgba(255,241,168,${0.10 + p * 0.22})`;
          ctx.beginPath();
          ctx.arc(x, y, 18 + p * 28, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(BASE_ANGLE[def.side]);

        ctx.save();
        ctx.shadowColor = def.color;
        ctx.shadowBlur = 18 + def.muzzleGlow * 14;
        ctx.fillStyle = def.softColor;
        ctx.fillRect(-DEFENDER_W / 2 - 10, -DEFENDER_H / 2 - 5, DEFENDER_W + 20, DEFENDER_H + 10);
        ctx.restore();

        ctx.fillStyle = def.color;
        ctx.fillRect(-DEFENDER_W / 2, 5, DEFENDER_W, 10);
        ctx.fillRect(-DEFENDER_W / 2 + 9, -4, DEFENDER_W - 18, 12);
        ctx.fillRect(-11, -13, 22, 14);

        ctx.fillStyle = 'rgba(255,255,255,0.76)';
        ctx.fillRect(-DEFENDER_W / 2 + 4, 7, DEFENDER_W - 8, 2);
        ctx.restore();

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle + Math.PI / 2);
        ctx.fillStyle = '#dfffee';
        ctx.fillRect(-4, -barrelLen, 8, barrelLen);
        ctx.fillStyle = def.color;
        ctx.fillRect(-7, -barrelLen - 3, 14, 5);
        ctx.restore();

        if (def.muzzleGlow > 0) {
          const mx = x + Math.cos(angle) * (barrelLen + 4);
          const my = y + Math.sin(angle) * (barrelLen + 4);
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.fillStyle = hexA(def.color, def.muzzleGlow * 0.65);
          ctx.beginPath();
          ctx.arc(mx, my, 9 + def.muzzleGlow * 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        ctx.strokeStyle = def.softColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (def.axis === 'x') {
          const railY = def.baseY + (def.side === 'top' ? 32 : -32);
          ctx.moveTo(0, railY);
          ctx.lineTo(W, railY);
        } else {
          const railX = def.baseX + (def.side === 'left' ? 32 : -32);
          ctx.moveTo(railX, 0);
          ctx.lineTo(railX, H);
        }
        ctx.stroke();
      }

      function drawScores() {
        ctx.save();
        ctx.font = '700 18px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.textBaseline = 'middle';
        drawScore('top', 22, 34, 'left');
        drawScore('right', W - 22, 34, 'right');
        drawScore('left', 22, H - 34, 'left');
        drawScore('bottom', W - 22, H - 34, 'right');
        ctx.restore();
      }

      function drawScore(side, x, y, align) {
        const def = defenders[side];
        const label = side.toUpperCase();
        const score = String(def.score).padStart(3, '0');
        ctx.textAlign = align;
        ctx.fillStyle = def.color;
        ctx.fillText(label, x, y);
        ctx.fillStyle = COLORS.text;
        ctx.fillText(score, align === 'right' ? x - 102 : x + 86, y);
        ctx.fillStyle = COLORS.dim;
        ctx.font = '12px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.fillText('INTERCEPTS', align === 'right' ? x - 168 : x + 146, y + 1);
        ctx.font = '700 18px ui-monospace, SFMono-Regular, Menlo, monospace';
      }

      function hexA(hex, alpha) {
        const n = parseInt(hex.slice(1), 16);
        return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${alpha})`;
      }

      addEventListener('resize', reset);
      addEventListener('click', reset);
      reset();
    </script>
  </body>
</html>
