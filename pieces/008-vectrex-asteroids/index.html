<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vectrex Asteroids · HyperGal</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        background: #000;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <script>
      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');
      const TAU = Math.PI * 2;

      const MAX_BULLETS = 3;
      const BULLET_SPEED = 690;
      const SHIP_ACCEL = 300;
      const SHIP_TURN = 5.25;
      const AUTO_TURN_GAIN = 1.8;
      const AUTO_TURN_DEADZONE = .085;
      const SHIP_R = 13;
      const MAX_ROCKS = 64;
      const MIN_ROCK_R = 5.5;
      const MIN_SPLIT_R = 7.2;
      const GRAVITY = 88;
      const CAPTURE_PULL = 2.7;
      const ROCK_INERTIA = 1.7;
      const MAX_ROCK_SPEED = 132;
      const MAX_ROCK_SPIN = .48;
      const COLLISION_BOUNCE = .16;
      const CONTACT_SKIN = 1.2;
      const GLUE_SETTLE_TIME = .46;
      const MERGE_TOUCH_PAD = 2.4;
      const SEAM_DECAY = .3;
      const LINE = 'rgba(244,255,250,';

      let W = 0, H = 0, dpr = 1;
      let last = 0, raf = 0, now = 0, rockSerial = 0;
      let ship, bullets, rocks, sparks, stars, score, gameOver, playerControl;
      let mergeContacts;
      const keys = new Set();

      const rand = (a, b) => a + Math.random() * (b - a);
      const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
      const wrap = (v, max) => { v %= max; return v < 0 ? v + max : v; };
      const wrapDelta = (d, max) => d > max / 2 ? d - max : d < -max / 2 ? d + max : d;
      const distWrap = (ax, ay, bx, by) => {
        const dx = wrapDelta(ax - bx, W), dy = wrapDelta(ay - by, H);
        return Math.hypot(dx, dy);
      };
      const normAngle = (a) => {
        a = (a + Math.PI) % TAU;
        if (a < 0) a += TAU;
        return a - Math.PI;
      };

      function resize() {
        cancelAnimationFrame(raf);
        dpr = 1;
        W = innerWidth;
        H = innerHeight;
        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        reset();
      }

      function reset() {
        bullets = [];
        rocks = [];
        sparks = [];
        stars = makeStars();
        mergeContacts = new Map();
        rockSerial = 0;
        score = 0;
        now = 0;
        gameOver = false;
        playerControl = false;
        ship = {
          x: W / 2,
          y: H / 2,
          vx: 0,
          vy: 0,
          a: -Math.PI / 2,
          alive: true,
          lives: 3,
          fireCd: 0,
          invuln: 2.2,
          deadFor: 0,
          lastShot: -Infinity,
          nextAutoShot: 1.8,
          autoBurstLeft: 0,
          autoBurstAt: 0,
          autoAimAngle: -Math.PI / 2,
          autoAimUntil: 0,
          autoSteerAngle: -Math.PI / 2,
          autoSteerUntil: 0,
          autoSteerMode: 'cruise',
          autoDangerId: null,
          autoDangerUntil: 0,
          autoAvoidRockId: null,
          autoAvoidSide: 1,
          autoAvoidSideUntil: 0,
          autoBrakeUntil: 0,
          autoPauseUntil: rand(1.1, 2.8),
          autoCruiseUntil: 0,
          cruiseAngle: rand(-Math.PI, Math.PI),
          thrusting: false,
        };
        seedRocks();
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        last = performance.now();
        raf = requestAnimationFrame(frame);
      }

      function makeStars() {
        const n = clamp(Math.floor(W * H / 18000), 24, 80);
        return Array.from({ length: n }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          a: rand(.08, .22),
          p: Math.random() * TAU,
        }));
      }

      function seedRocks() {
        const count = clamp(Math.floor(Math.min(W, H) / 170) + 3, 4, 7);
        for (let i = 0; i < count; i++) {
          const radius = rand(34, 62);
          rocks.push(placeRock(radius));
        }
        mergeTouchingRocks();
      }

      function placeRock(radius) {
        let x = W / 2, y = H / 2;
        for (let tries = 0; tries < 160; tries++) {
          x = rand(radius + 34, Math.max(radius + 35, W - radius - 34));
          y = rand(radius + 34, Math.max(radius + 35, H - radius - 34));
          if (Math.hypot(x - W / 2, y - H / 2) < 180 + radius) continue;
          let clear = true;
          for (const rock of rocks) {
            if (distWrap(x, y, rock.x, rock.y) < radius + rock.radius + 30) {
              clear = false;
              break;
            }
          }
          if (clear) break;
        }
        return makeRock(x, y, radius);
      }

      function makeRock(x, y, radius, opts = {}) {
        const maxRadius = opts.allowLarge ? Math.max(maxRockRadius(), radius) : maxRockRadius();
        radius = clamp(radius, MIN_ROCK_R, maxRadius);
        const baseHull = opts.lobes ? null : (opts.hull || makeHull(radius, opts.points || (9 + ((Math.random() * 6) | 0))));
        const baseMass = opts.mass ?? radius * radius;
        const lobes = opts.lobes
          ? opts.lobes.map(copyLobe)
          : [{ x: 0, y: 0, rot: 0, hull: copyHull(baseHull), mass: baseMass }];
        const hull = opts.hull || (opts.lobes ? makeCompoundHull(lobes) : baseHull);
        return {
          id: ++rockSerial,
          x: wrap(x, W),
          y: wrap(y, H),
          vx: opts.vx ?? rand(-24, 24),
          vy: opts.vy ?? rand(-24, 24),
          rot: opts.rot ?? rand(0, TAU),
          vr: opts.vr ?? rand(-.2, .2),
          radius,
          mass: opts.mass ?? lobeMass(lobes),
          hull,
          lobes,
          bounds: opts.bounds ?? Math.max(radius, hullRadius(hull)),
          crack: opts.crack ?? 0,
          crackPhase: opts.crackPhase ?? rand(0, TAU),
          mergeFlash: opts.mergeFlash ?? 0,
          seams: opts.seams ? opts.seams.slice() : [],
          mergeAge: opts.mergeAge ?? 1,
          mergeDuration: opts.mergeDuration ?? 0,
          mergeGhosts: opts.mergeGhosts ? opts.mergeGhosts.map(copyMergeGhost) : [],
          mergeAbsorb: opts.mergeAbsorb ? copyMergeAbsorb(opts.mergeAbsorb) : null,
        };
      }

      function copyHull(hull) {
        return hull.map(([x, y]) => [x, y]);
      }

      function copyLobe(lobe) {
        return {
          x: lobe.x,
          y: lobe.y,
          rot: lobe.rot || 0,
          hull: copyHull(lobe.hull),
          mass: lobe.mass ?? Math.max(MIN_ROCK_R * MIN_ROCK_R, hullRadius(lobe.hull) ** 2),
        };
      }

      function copyMergeGhost(ghost) {
        return {
          startX: ghost.startX,
          startY: ghost.startY,
          startRot: ghost.startRot || 0,
          endX: ghost.endX,
          endY: ghost.endY,
          endRot: ghost.endRot || 0,
          hull: copyHull(ghost.hull),
        };
      }

      function copyMergeAbsorb(anim) {
        return {
          bigX: anim.bigX,
          bigY: anim.bigY,
          bigRot: anim.bigRot || 0,
          bigHull: copyHull(anim.bigHull),
          bigRadius: anim.bigRadius,
          smallX: anim.smallX,
          smallY: anim.smallY,
          smallRot: anim.smallRot || 0,
          smallHull: copyHull(anim.smallHull),
          smallRadius: anim.smallRadius,
          targetScale: anim.targetScale,
        };
      }

      function rockLobes(rock) {
        return rock.lobes && rock.lobes.length
          ? rock.lobes
          : [{ x: 0, y: 0, rot: 0, hull: rock.hull, mass: rock.mass }];
      }

      function lobeMass(lobes) {
        return lobes.reduce((sum, lobe) => sum + (lobe.mass || 0), 0);
      }

      function maxRockRadius() {
        return Math.max(42, Math.min(W, H) * .36);
      }

      function makeHull(radius, n) {
        return makeProceduralHull(radius, n, {
          rough: rand(.18, .36),
          squash: rand(.82, 1.18),
          phase: rand(0, TAU),
        });
      }

      function makeFragmentHull(radius, phase) {
        return makeProceduralHull(radius, 4 + ((Math.random() * 5) | 0), {
          rough: rand(.26, .48),
          squash: rand(.72, 1.24),
          phase: phase + rand(-.35, .35),
          fragment: true,
        });
      }

      function makeProceduralHull(radius, n, opts = {}) {
        const weights = Array.from({ length: n }, () => rand(.45, 1.7));
        const totalWeight = weights.reduce((sum, v) => sum + v, 0);
        const phase = opts.phase ?? rand(0, TAU);
        const warpA = rand(0, TAU);
        const warpB = rand(0, TAU);
        const squash = opts.squash ?? 1;
        const tilt = rand(0, TAU);
        const sx = squash;
        const sy = 2 - squash;
        const ca = Math.cos(tilt), sa = Math.sin(tilt);
        const hull = [];
        let a = phase;
        for (let i = 0; i < n; i++) {
          a += (weights[i] / totalWeight) * TAU;
          const wave = Math.sin(a * 2 + warpA) * opts.rough * .34 +
            Math.sin(a * 5 + warpB) * opts.rough * .2;
          const bite = Math.random() < (opts.fragment ? .26 : .16) ? rand(.52, .74) : 1;
          const r = radius * clamp(rand(.74, 1.08) + wave, .52, 1.24) * bite;
          const px = Math.cos(a) * r * sx;
          const py = Math.sin(a) * r * sy;
          hull.push([px * ca - py * sa, px * sa + py * ca]);
        }
        return hull;
      }

      function hullRadius(hull) {
        let radius = MIN_ROCK_R;
        for (const [x, y] of hull) radius = Math.max(radius, Math.hypot(x, y));
        return radius;
      }

      function compoundBounds(lobes) {
        let radius = MIN_ROCK_R;
        for (const lobe of lobes) {
          for (const p of lobeRockPoints(lobe)) {
            radius = Math.max(radius, Math.hypot(p[0], p[1]));
          }
        }
        return radius;
      }

      function makeCompoundHull(lobes) {
        const pts = [];
        for (const lobe of lobes) pts.push(...lobeRockPoints(lobe));
        const base = convexHull(pts);
        if (base.length <= 3) return base;

        const n = clamp(Math.round(base.length * 1.9 + lobes.length * 4), 28, 72);
        const phase = rand(0, TAU);
        const radii = [];
        for (let i = 0; i < n; i++) {
          const a = (i / n) * TAU;
          const ux = Math.cos(a), uy = Math.sin(a);
          const ray = rayPolygonRadius(base, ux, uy);
          const support = supportRadius(pts, ux, uy);
          const r = Math.max(MIN_ROCK_R, ray || support);
          const memory = lobeAngularMemory(lobes, a);
          const carve = .73 + memory * .31;
          const wobble = 1 +
            Math.sin(a * 3 + phase) * .052 +
            Math.sin(a * 7 - phase * .7) * .038 +
            Math.sin(a * 13 + phase * .4) * .024 +
            rand(-.028, .028);
          radii.push(r * carve * wobble);
        }

        const smooth = smoothRing(radii, lobes.length > 3 ? 1 : 0);
        const hull = [];
        for (let i = 0; i < n; i++) {
          const a = (i / n) * TAU;
          hull.push([Math.cos(a) * smooth[i], Math.sin(a) * smooth[i]]);
        }
        return hull;
      }

      function lobeAngularMemory(lobes, a) {
        let best = 0;
        for (const lobe of lobes) {
          const d = Math.hypot(lobe.x, lobe.y);
          const r = hullRadius(lobe.hull);
          if (d < r * .28) {
            best = Math.max(best, .72);
            continue;
          }
          const diff = Math.abs(normAngle(a - Math.atan2(lobe.y, lobe.x)));
          const width = clamp(Math.atan2(r * .9, d), .2, .92);
          const weight = clamp(.62 + r / 76, .7, 1);
          best = Math.max(best, Math.exp(-(diff * diff) / (width * width)) * weight);
        }
        return clamp(best, 0, 1);
      }

      function smoothRing(values, passes) {
        let out = values.slice();
        for (let p = 0; p < passes; p++) {
          out = out.map((v, i) => {
            const prev = out[(i - 1 + out.length) % out.length];
            const next = out[(i + 1) % out.length];
            return prev * .12 + v * .76 + next * .12;
          });
        }
        return out;
      }

      function rayPolygonRadius(poly, ux, uy) {
        let best = 0;
        for (let i = 0; i < poly.length; i++) {
          const a = poly[i];
          const b = poly[(i + 1) % poly.length];
          const ex = b[0] - a[0], ey = b[1] - a[1];
          const den = ux * ey - uy * ex;
          if (Math.abs(den) < .0001) continue;
          const t = (a[0] * ey - a[1] * ex) / den;
          const u = (a[0] * uy - a[1] * ux) / den;
          if (t > 0 && u >= -.0001 && u <= 1.0001) best = Math.max(best, t);
        }
        return best;
      }

      function supportRadius(points, ux, uy) {
        let best = MIN_ROCK_R;
        for (const p of points) best = Math.max(best, p[0] * ux + p[1] * uy);
        return best;
      }

      function lobeRockPoints(lobe) {
        const ca = Math.cos(lobe.rot || 0), sa = Math.sin(lobe.rot || 0);
        return lobe.hull.map(([x, y]) => [
          lobe.x + x * ca - y * sa,
          lobe.y + x * sa + y * ca,
        ]);
      }

      function convexHull(points) {
        if (points.length <= 3) return points.map(([x, y]) => [x, y]);
        const sorted = points
          .map(([x, y]) => ({ x, y }))
          .sort((a, b) => a.x === b.x ? a.y - b.y : a.x - b.x);
        const lower = [];
        for (const p of sorted) {
          while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) {
            lower.pop();
          }
          lower.push(p);
        }
        const upper = [];
        for (let i = sorted.length - 1; i >= 0; i--) {
          const p = sorted[i];
          while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) {
            upper.pop();
          }
          upper.push(p);
        }
        lower.pop();
        upper.pop();
        return lower.concat(upper).map((p) => [p.x, p.y]);
      }

      function rockExtent(rock) {
        return rock.bounds ?? rock.radius;
      }

      function rotateLocal(x, y, angle) {
        const ca = Math.cos(angle), sa = Math.sin(angle);
        return { x: x * ca - y * sa, y: x * sa + y * ca };
      }

      function frame(t) {
        const dt = Math.max(0, Math.min(1 / 30, (t - last) / 1000));
        last = t;
        now += dt;

        updateShip(dt);
        updateBullets(dt);
        updateRocks(dt);
        updateSparks(dt);
        collideBullets();
        collideShip();
        draw();

        raf = requestAnimationFrame(frame);
      }

      function updateShip(dt) {
        if (gameOver) return;
        if (!ship.alive) {
          ship.deadFor -= dt;
          if (ship.deadFor <= 0 && ship.lives > 0) respawnShip();
          return;
        }

        const controls = playerControl ? playerControls() : autoControls();
        ship.a = normAngle(ship.a + controls.turn * SHIP_TURN * dt);
        ship.thrusting = controls.thrust;

        if (controls.thrust) {
          ship.vx += Math.cos(ship.a) * SHIP_ACCEL * dt;
          ship.vy += Math.sin(ship.a) * SHIP_ACCEL * dt;
          if (Math.random() < .42) thrustSpark();
        }

        ship.x = wrap(ship.x + ship.vx * dt, W);
        ship.y = wrap(ship.y + ship.vy * dt, H);
        ship.fireCd = Math.max(0, ship.fireCd - dt);
        ship.invuln = Math.max(0, ship.invuln - dt);

        if (controls.fire && ship.fireCd <= 0) {
          fire(controls.fireAngle ?? ship.a);
        }
      }

      function playerControls() {
        return {
          turn: (keys.has('ArrowRight') || keys.has('KeyD') ? 1 : 0) - (keys.has('ArrowLeft') || keys.has('KeyA') ? 1 : 0),
          thrust: keys.has('ArrowUp') || keys.has('KeyW'),
          fire: keys.has('Space'),
        };
      }

      function autoControls() {
        const danger = closestRock();
        const target = targetRock();
        const shot = autoShot();
        const aimAngle = holdAutoAim(shot);
        updateAutoMood(danger);
        let desired = ship.a;
        let thrust = false;
        let evading = false;
        let escapeBurn = false;
        let braking = false;
        let urgentSteer = false;
        let steerMode = 'cruise';
        const speed = shipSpeed();
        const threat = danger ? Math.min(danger.clearance, danger.predictedClearance) : Infinity;
        const openingClear = danger && danger.closing < -12 && danger.clearance > 52 && danger.predictedClearance > 72;
        const pausing = now < ship.autoPauseUntil && threat > 170;
        if (speed > 18 && threat > 105) ship.autoBrakeUntil = Math.max(ship.autoBrakeUntil || 0, now + .9);
        if (speed < 6 || threat <= 130) ship.autoBrakeUntil = Math.min(ship.autoBrakeUntil || 0, now);
        const wantsStationary = speed > 7 && threat > 95 && now < (ship.autoBrakeUntil || 0);

        if (danger && !openingClear && threat < 130 + speed * .16) {
          desired = evasionAngle(danger, true);
          evading = true;
          escapeBurn = threat < 34 || danger.predictedClearance < 24 ||
            (danger.closing > 12 && (threat < 90 || danger.predictedClearance < 84)) ||
            (danger.closing > 34 && threat < 150);
          urgentSteer = true;
          steerMode = 'avoid';
        } else if (danger && !openingClear && threat < 340 + speed * .18) {
          desired = evasionAngle(danger, false);
          evading = true;
          steerMode = 'avoid';
          const aim = Math.abs(normAngle(desired - ship.a));
          escapeBurn = danger.closing > 8 || danger.predictedClearance < 160 || threat < 180;
          thrust = escapeBurn && aim < 1.05 && speed < 190 && danger.dist > 65;
        } else if (wantsStationary) {
          desired = Math.atan2(-ship.vy, -ship.vx);
          steerMode = 'brake';
          braking = true;
        } else if (pausing) {
          desired = aimAngle != null && threat > 90 ? aimAngle : ship.cruiseAngle;
          steerMode = aimAngle != null && threat > 90 ? 'aim' : 'cruise';
        } else if (aimAngle != null) {
          desired = aimAngle;
          steerMode = 'aim';
        } else if (target) {
          desired = target.angle;
          steerMode = 'target';
        } else {
          desired = ship.cruiseAngle;
          steerMode = 'cruise';
        }

        desired = holdAutoSteer(desired, steerMode, urgentSteer);
        const delta = normAngle(desired - ship.a);
        if (evading) thrust = escapeBurn && Math.abs(delta) < 1.25 && speed < 230 && danger.dist > 46;
        if (braking) thrust = Math.abs(delta) < .62 && speed > 5.5;
        const patient = now - ship.lastShot > 2.2 && bullets.length < MAX_BULLETS;
        const shotReady = now >= ship.nextAutoShot && ship.fireCd <= 0 && bullets.length < MAX_BULLETS;
        let shoot = false;
        let fireAngle = null;
        if (ship.autoBurstLeft > 0 && now - ship.autoBurstAt > .9) ship.autoBurstLeft = 0;
        if (evading && threat < 170) ship.autoBurstLeft = 0;
        if (!evading && ship.autoBurstLeft > 0 && now >= ship.autoBurstAt && threat > 80 && ship.fireCd <= 0 && bullets.length < MAX_BULLETS) {
          const burstShot = autoShot();
          if (burstShot && burstShot.aim < burstShot.cone * 1.24) {
            shoot = true;
            fireAngle = burstShot.angle;
            ship.autoBurstLeft--;
            ship.autoBurstAt = now + rand(.11, .2);
          } else {
            ship.autoBurstLeft = 0;
          }
        } else if (!braking && !evading && threat > 90 && shotReady && !!shot && (shot.aim < shot.cone || (patient && shot.aim < shot.cone * 1.22))) {
          shoot = true;
          fireAngle = shot.angle;
          const burst = autoBurstCountForShot(shot);
          ship.autoBurstLeft = Math.max(0, burst - 1);
          ship.autoBurstAt = now + rand(.1, .18);
          ship.nextAutoShot = now + rand(burst > 1 ? .52 : .34, burst > 1 ? 1.05 : .72);
        }
        const turnGain = evading ? (urgentSteer ? 2.05 : 1.75) : 1.12;
        const maxTurn = evading ? (urgentSteer ? 1 : .92) : .68;
        let turn = clamp(delta * turnGain, -maxTurn, maxTurn);
        if (Math.abs(delta) < (evading ? AUTO_TURN_DEADZONE : .12)) turn = 0;
        else if (!evading && Math.abs(delta) < .36) turn *= .16;
        return {
          turn,
          thrust,
          fire: shoot,
          fireAngle,
        };
      }

      function updateAutoMood(danger) {
        const threat = danger ? Math.min(danger.clearance, danger.predictedClearance) : Infinity;
        if (danger && threat < 220) {
          ship.autoPauseUntil = Math.min(ship.autoPauseUntil || 0, now);
          if (now >= ship.autoCruiseUntil) ship.autoCruiseUntil = now + rand(.35, .85);
          return;
        }
        if (now >= (ship.autoCruiseUntil || 0)) {
          ship.autoCruiseUntil = now + rand(.3, .9);
          ship.cruiseAngle = normAngle(ship.a + rand(-.45, .45));
          if (Math.random() < .94) ship.autoPauseUntil = now + rand(2.2, 5.6);
        }
      }

      function holdAutoAim(shot) {
        if (!shot) return null;
        const current = ship.autoAimAngle ?? shot.angle;
        const drift = Math.abs(normAngle(shot.angle - current));
        const refresh = now >= (ship.autoAimUntil || 0) || drift > (shot.small ? .4 : .54);
        if (refresh) {
          ship.autoAimAngle = shot.angle;
          ship.autoAimUntil = now + rand(.26, .55);
        } else {
          ship.autoAimAngle = normAngle(current + normAngle(shot.angle - current) * .05);
        }
        return ship.autoAimAngle;
      }

      function holdAutoSteer(angle, mode, urgent) {
        if (urgent) {
          const current = ship.autoSteerAngle ?? angle;
          const drift = Math.abs(normAngle(angle - current));
          if (ship.autoSteerMode !== mode || now >= (ship.autoSteerUntil || 0) || drift > 1.55) {
            ship.autoSteerAngle = angle;
          } else {
            ship.autoSteerAngle = normAngle(current + normAngle(angle - current) * .18);
          }
          ship.autoSteerMode = mode;
          ship.autoSteerUntil = now + .14;
          return ship.autoSteerAngle;
        }
        const current = ship.autoSteerAngle ?? angle;
        const drift = Math.abs(normAngle(angle - current));
        const changedMode = ship.autoSteerMode !== mode;
        const expired = now >= (ship.autoSteerUntil || 0);
        const breakAway = mode === 'avoid' ? 1.45 : mode === 'aim' ? 1.04 : .92;
        if (changedMode || expired || drift > breakAway) {
          ship.autoSteerAngle = angle;
          ship.autoSteerMode = mode;
          if (mode === 'aim') ship.autoSteerUntil = now + rand(.32, .68);
          else if (mode === 'avoid') ship.autoSteerUntil = now + rand(.28, .55);
          else ship.autoSteerUntil = now + rand(.45, .9);
        } else {
          const blend = mode === 'aim' ? .04 : mode === 'avoid' ? .06 : .06;
          ship.autoSteerAngle = normAngle(current + normAngle(angle - current) * blend);
        }
        return ship.autoSteerAngle;
      }

      function closestRock() {
        let best = null;
        let held = null;
        for (const rock of rocks) {
          const danger = rockDanger(rock);
          if (rock.id === ship.autoDangerId) held = danger;
          if (!best || danger.risk < best.risk) best = danger;
        }
        if (held && best && now < (ship.autoDangerUntil || 0) && held.risk < best.risk + 58) return held;
        if (best) {
          ship.autoDangerId = best.rock.id;
          ship.autoDangerUntil = now + rand(.24, .48);
        }
        return best;
      }

      function rockDanger(rock) {
        const dx = wrapDelta(rock.x - ship.x, W);
        const dy = wrapDelta(rock.y - ship.y, H);
        const dist = Math.hypot(dx, dy);
        const clearance = dist - rockExtent(rock) - SHIP_R;
        const rvx = rock.vx - ship.vx;
        const rvy = rock.vy - ship.vy;
        const rv2 = rvx * rvx + rvy * rvy;
        const closing = rv2 > .001 ? -(dx * rvx + dy * rvy) / Math.max(1, dist) : 0;
        const time = rv2 > .001 ? clamp(-(dx * rvx + dy * rvy) / rv2, 0, 3.2) : 0;
        const pdx = dx + rvx * time;
        const pdy = dy + rvy * time;
        const predictedDist = Math.hypot(pdx, pdy);
        const predictedClearance = predictedDist - rockExtent(rock) - SHIP_R;
        const risk = Math.min(clearance, predictedClearance) -
          Math.max(0, closing) * .36 -
          Math.max(0, 3.2 - time) * 10;
        return { rock, dx, dy, dist, clearance, rvx, rvy, time, pdx, pdy, predictedClearance, closing, risk };
      }

      function evasionAngle(danger, urgent) {
        const px = danger.pdx ?? danger.dx;
        const py = danger.pdy ?? danger.dy;
        const rvx = danger.rvx ?? (danger.rock.vx - ship.vx);
        const rvy = danger.rvy ?? (danger.rock.vy - ship.vy);
        const naturalSide = (px * rvy - py * rvx) >= 0 ? 1 : -1;
        let side = naturalSide;
        if (ship.autoAvoidRockId === danger.rock.id && now < (ship.autoAvoidSideUntil || 0)) {
          side = ship.autoAvoidSide || naturalSide;
        } else {
          ship.autoAvoidRockId = danger.rock.id;
          ship.autoAvoidSide = naturalSide;
          ship.autoAvoidSideUntil = now + (urgent ? .42 : .68);
        }
        const lateral = urgent ? .94 : .62;
        const awayX = -px + (-rvy * side) * lateral;
        const awayY = -py + (rvx * side) * lateral;
        return Math.atan2(awayY, awayX);
      }

      function targetRock() {
        let best = null;
        for (const rock of rocks) {
          const dx = wrapDelta(rock.x - ship.x, W);
          const dy = wrapDelta(rock.y - ship.y, H);
          const dist = Math.hypot(dx, dy);
          const lead = leadRock(rock, dx, dy, dist);
          const forward = Math.cos(ship.a) * lead.x + Math.sin(ship.a) * lead.y;
          const aim = Math.abs(normAngle(lead.angle - ship.a));
          const smallBonus = canSplitRock(rock) ? 0 : 38;
          const value = rockExtent(rock) * 2.7 + smallBonus + forward * .09 - dist * .08 - aim * 95;
          if (!best || value > best.value) best = { rock, dx, dy, dist, angle: lead.angle, value };
        }
        return best;
      }

      function autoShot() {
        let best = null;
        for (const rock of rocks) {
          const dx = wrapDelta(rock.x - ship.x, W);
          const dy = wrapDelta(rock.y - ship.y, H);
          const dist = Math.hypot(dx, dy);
          if (dist > 920) continue;
          const lead = leadRock(rock, dx, dy, dist);
          const aim = Math.abs(normAngle(lead.angle - ship.a));
          const closing = Math.cos(ship.a) * lead.x + Math.sin(ship.a) * lead.y;
          if (closing < -rockExtent(rock)) continue;
          const extent = rockExtent(rock);
          const small = !canSplitRock(rock) || extent < 17;
          const smallBonus = small ? 96 : 0;
          const cone = clamp(Math.atan2(extent + (small ? 7 : 12), dist) * 1.55 + (dist < 280 ? .055 : .035), .12, .58);
          const value = (cone - aim) * 350 + extent * (small ? .45 : 1.12) + smallBonus - dist * .014 - Math.abs(lead.t) * 2;
          if (!best || value > best.value) best = { rock, aim, cone, angle: lead.angle, value, dist, small };
        }
        return best;
      }

      function leadRock(rock, dx, dy, dist) {
        const rvx = rock.vx - ship.vx;
        const rvy = rock.vy - ship.vy;
        const a = rvx * rvx + rvy * rvy - BULLET_SPEED * BULLET_SPEED;
        const b = 2 * (dx * rvx + dy * rvy);
        const c = dx * dx + dy * dy;
        let t = clamp(dist / BULLET_SPEED, .04, 1.15);
        const disc = b * b - 4 * a * c;
        if (disc >= 0 && Math.abs(a) > .0001) {
          const root = Math.sqrt(disc);
          const t1 = (-b - root) / (2 * a);
          const t2 = (-b + root) / (2 * a);
          const hit = [t1, t2].filter((v) => v > .02).sort((x, y) => x - y)[0];
          if (hit) t = clamp(hit, .04, 1.15);
        }
        const x = dx + rvx * t;
        const y = dy + rvy * t;
        return { x, y, t, angle: Math.atan2(y, x) };
      }

      function autoBurstCountForShot(shot) {
        const available = MAX_BULLETS - bullets.length;
        if (available <= 0) return 0;
        const aimRatio = shot.aim / Math.max(.001, shot.cone);
        if (shot.small && aimRatio < .9 && shot.dist < 720) return Math.min(3, available);
        if (aimRatio < .48 && shot.dist < 820) return Math.min(3, available);
        if (aimRatio < .82 && shot.dist < 760) return Math.min(2, available);
        return 1;
      }

      function canSplitRock(rock) {
        return maxSplitPieces(rock) >= 2;
      }

      function maxSplitPieces(rock) {
        return Math.min(5, Math.floor(rock.mass / (MIN_SPLIT_R * MIN_SPLIT_R)));
      }

      function shipSpeed() {
        return Math.hypot(ship.vx, ship.vy);
      }

      function respawnShip() {
        ship.x = W / 2;
        ship.y = H / 2;
        ship.vx = 0;
        ship.vy = 0;
        ship.a = -Math.PI / 2;
        ship.alive = true;
        ship.invuln = 2;
        ship.fireCd = .25;
        ship.lastShot = now;
        ship.nextAutoShot = now + rand(1.2, 2.3);
        ship.autoBurstLeft = 0;
        ship.autoBurstAt = now;
        ship.autoAimAngle = ship.a;
        ship.autoAimUntil = now;
        ship.autoSteerAngle = ship.a;
        ship.autoSteerUntil = now;
        ship.autoSteerMode = 'cruise';
        ship.autoDangerId = null;
        ship.autoDangerUntil = now;
        ship.autoAvoidRockId = null;
        ship.autoAvoidSide = 1;
        ship.autoAvoidSideUntil = now;
        ship.autoBrakeUntil = now;
        ship.autoPauseUntil = now + rand(1.1, 2.6);
        ship.autoCruiseUntil = now + rand(.8, 1.8);
        ship.cruiseAngle = rand(-Math.PI, Math.PI);
        ship.thrusting = false;
      }

      function killShip() {
        if (!ship.alive || ship.invuln > 0) return;
        ship.alive = false;
        ship.deadFor = 1.6;
        ship.lives--;
        burst(ship.x, ship.y, 34, 180);
        if (ship.lives <= 0) {
          gameOver = true;
          ship.deadFor = Infinity;
        }
      }

      function fire(angle = ship.a) {
        if (!ship.alive || gameOver || bullets.length >= MAX_BULLETS) return 0;
        const nx = Math.cos(angle), ny = Math.sin(angle);
        bullets.push({
          x: wrap(ship.x + nx * 17, W),
          y: wrap(ship.y + ny * 17, H),
          px: ship.x,
          py: ship.y,
          vx: ship.vx + nx * BULLET_SPEED,
          vy: ship.vy + ny * BULLET_SPEED,
          life: .92,
          wrapped: false,
        });
        ship.lastShot = now;
        ship.fireCd = playerControl ? .12 : .12;
        return 1;
      }

      function updateBullets(dt) {
        for (const b of bullets) {
          b.px = b.x;
          b.py = b.y;
          const nx = b.x + b.vx * dt;
          const ny = b.y + b.vy * dt;
          b.wrapped = nx < 0 || nx >= W || ny < 0 || ny >= H;
          b.x = wrap(nx, W);
          b.y = wrap(ny, H);
          b.life -= dt;
        }
        bullets = bullets.filter((b) => b.life > 0);
      }

      function updateRocks(dt) {
        applyRockGravity(dt);

        for (const r of rocks) {
          const speed = Math.hypot(r.vx, r.vy);
          if (speed > MAX_ROCK_SPEED) {
            r.vx = (r.vx / speed) * MAX_ROCK_SPEED;
            r.vy = (r.vy / speed) * MAX_ROCK_SPEED;
          }
          r.x = wrap(r.x + r.vx * dt, W);
          r.y = wrap(r.y + r.vy * dt, H);
          r.vr = clamp(r.vr, -MAX_ROCK_SPIN, MAX_ROCK_SPIN);
          r.rot += r.vr * dt;
          r.crack = Math.max(0, r.crack - dt * .055);
          r.mergeFlash = Math.max(0, r.mergeFlash - dt * 1.25);
          if (r.mergeDuration > 0 && r.mergeAge < r.mergeDuration) {
            r.mergeAge = Math.min(r.mergeDuration, r.mergeAge + dt);
            if (r.mergeAge >= r.mergeDuration) {
              r.mergeGhosts = [];
              r.mergeAbsorb = null;
            }
          }
          for (const seam of r.seams) seam.life = Math.max(0, seam.life - dt * SEAM_DECAY);
          r.seams = r.seams.filter((seam) => seam.life > .015);
        }

        resolveRockCollisions(dt);
        mergeTouchingRocks(dt);
        condenseOverflow();
      }

      function applyRockGravity(dt) {
        for (let i = 0; i < rocks.length; i++) {
          const a = rocks[i];
          for (let j = i + 1; j < rocks.length; j++) {
            const b = rocks[j];
            const dx = wrapDelta(b.x - a.x, W);
            const dy = wrapDelta(b.y - a.y, H);
            const d2 = dx * dx + dy * dy;
            if (d2 < 1) continue;
            const d = Math.sqrt(d2);
            const reach = clamp((rockExtent(a) + rockExtent(b)) * 4.6, 155, Math.min(W, H) * .62);
            if (d > reach) continue;
            const nx = dx / d, ny = dy / d;
            const falloff = Math.pow(1 - d / reach, 1.28);
            const pullA = (GRAVITY * b.mass * falloff) / ((d2 + 18500) * ROCK_INERTIA);
            const pullB = (GRAVITY * a.mass * falloff) / ((d2 + 18500) * ROCK_INERTIA);
            a.vx += nx * pullA * dt;
            a.vy += ny * pullA * dt;
            b.vx -= nx * pullB * dt;
            b.vy -= ny * pullB * dt;
            applyCapturePull(a, b, nx, ny, d, falloff, dt);
          }
        }
      }

      function applyCapturePull(a, b, nx, ny, d, falloff, dt) {
        const big = a.radius >= b.radius ? a : b;
        const small = big === a ? b : a;
        const ratio = big.radius / Math.max(1, small.radius);
        if (ratio < 1.03) return;

        const dir = big === a ? { x: nx, y: ny } : { x: -nx, y: -ny };
        const bigFace = directionalRockRadius(big, dir.x, dir.y);
        const smallFace = directionalRockRadius(small, -dir.x, -dir.y);
        const gap = d - bigFace - smallFace;
        const captureReach = Math.max(22, Math.min(72, smallFace * .95 + bigFace * .28));
        if (gap > captureReach) return;

        const sx = wrapDelta(small.x - big.x, W);
        const sy = wrapDelta(small.y - big.y, H);
        const attach = bigFace + smallFace * .62;
        const targetX = dir.x * attach;
        const targetY = dir.y * attach;
        const capture = Math.pow(clamp(1 - gap / captureReach, 0, 1), 1.9) * Math.min(1.35, Math.sqrt(ratio));
        const ex = targetX - sx;
        const ey = targetY - sy;
        const error = Math.hypot(ex, ey);
        if (error < .01) return;
        const pull = Math.min(error * CAPTURE_PULL * capture / ROCK_INERTIA, 30 + 12 * capture);
        const px = (ex / error) * pull;
        const py = (ey / error) * pull;

        small.vx += px * dt;
        small.vy += py * dt;
        big.vx -= px * dt * (small.mass / big.mass) * .045;
        big.vy -= py * dt * (small.mass / big.mass) * .045;
        const spinNudge = clamp((dir.x * small.vy - dir.y * small.vx) * .00036, -.012, .012);
        small.vr = clamp(small.vr + spinNudge * falloff * Math.min(1, dt * 60), -MAX_ROCK_SPIN, MAX_ROCK_SPIN);
      }

      function resolveRockCollisions(dt) {
        for (let pass = 0; pass < 2; pass++) {
          for (let i = 0; i < rocks.length; i++) {
            for (let j = i + 1; j < rocks.length; j++) {
              const a = rocks[i], b = rocks[j];
              const contact = rockContactInfo(a, b);
              if (!contact || contact.gap > CONTACT_SKIN) continue;

              const key = contactKey(a, b);
              const settling = (mergeContacts.get(key) || 0) > 0 || contact.gap <= MERGE_TOUCH_PAD;
              const penetration = CONTACT_SKIN - contact.gap;
              const invA = 1 / Math.max(1, a.mass);
              const invB = 1 / Math.max(1, b.mass);
              const invTotal = invA + invB;
              const correction = penetration / invTotal;

              a.x = wrap(a.x - contact.nx * correction * invA, W);
              a.y = wrap(a.y - contact.ny * correction * invA, H);
              b.x = wrap(b.x + contact.nx * correction * invB, W);
              b.y = wrap(b.y + contact.ny * correction * invB, H);

              const rvx = b.vx - a.vx;
              const rvy = b.vy - a.vy;
              const relN = rvx * contact.nx + rvy * contact.ny;
              const bounce = settling ? .03 : COLLISION_BOUNCE;
              if (relN < 0) {
                const impulse = -(1 + bounce) * relN / invTotal;
                a.vx -= impulse * invA * contact.nx;
                a.vy -= impulse * invA * contact.ny;
                b.vx += impulse * invB * contact.nx;
                b.vy += impulse * invB * contact.ny;
              }

              const tx = -contact.ny, ty = contact.nx;
              const relT = (b.vx - a.vx) * tx + (b.vy - a.vy) * ty;
              const friction = (settling ? .32 : .1) * Math.min(1, dt * 60);
              const tangentImpulse = clamp(relT * friction / invTotal, -18, 18);
              a.vx += tangentImpulse * invA * tx;
              a.vy += tangentImpulse * invA * ty;
              b.vx -= tangentImpulse * invB * tx;
              b.vy -= tangentImpulse * invB * ty;

              const spinKick = clamp((contact.nx * rvy - contact.ny * rvx) * .00045, -.01, .01) * Math.min(1, dt * 60);
              a.vr = clamp(a.vr + spinKick, -MAX_ROCK_SPIN, MAX_ROCK_SPIN);
              b.vr = clamp(b.vr - spinKick, -MAX_ROCK_SPIN, MAX_ROCK_SPIN);
            }
          }
        }
      }

      function mergeTouchingRocks(dt = 0, immediate = false) {
        let merged = true;
        let guard = 0;
        const seen = new Set();
        while (merged && guard++ < 32) {
          merged = false;
          outer:
          for (let i = 0; i < rocks.length; i++) {
            for (let j = i + 1; j < rocks.length; j++) {
              const a = rocks[i], b = rocks[j];
              if (rocksReadyToGlom(a, b, immediate ? 2 : MERGE_TOUCH_PAD)) {
                const key = contactKey(a, b);
                seen.add(key);
                const rel = Math.hypot(a.vx - b.vx, a.vy - b.vy);
                const settle = rel < 72 ? dt * 1.15 : dt * .6;
                const held = immediate ? GLUE_SETTLE_TIME : (mergeContacts.get(key) || 0) + settle;
                mergeContacts.set(key, held);
                if (!immediate && held < GLUE_SETTLE_TIME) continue;
                absorbRockPair(i, j);
                merged = true;
                break outer;
              }
            }
          }
        }
        if (!immediate && dt > 0) {
          for (const [key, held] of mergeContacts) {
            if (seen.has(key)) continue;
            const next = held - dt * .72;
            if (next <= 0) mergeContacts.delete(key);
            else mergeContacts.set(key, next);
          }
        }
      }

      function contactKey(a, b) {
        return a.id < b.id ? `${a.id}:${b.id}` : `${b.id}:${a.id}`;
      }

      function rocksReadyToGlom(a, b, pad) {
        const contact = rockContactInfo(a, b);
        return !!contact && (contact.gap <= pad || rocksTouch(a, b, pad));
      }

      function rockContactInfo(a, b) {
        const dx = wrapDelta(b.x - a.x, W);
        const dy = wrapDelta(b.y - a.y, H);
        const d = Math.hypot(dx, dy);
        const nx = d > .001 ? dx / d : 1;
        const ny = d > .001 ? dy / d : 0;
        if (d > rockExtent(a) + rockExtent(b) + CONTACT_SKIN + 8) return null;
        const aFace = directionalRockRadius(a, nx, ny);
        const bFace = directionalRockRadius(b, -nx, -ny);
        let gap = d - aFace - bFace;
        if (gap > CONTACT_SKIN && rocksTouch(a, b, CONTACT_SKIN)) gap = 0;
        return { dx, dy, d, nx, ny, gap, aFace, bFace };
      }

      function directionalRockRadius(rock, ux, uy) {
        const local = rotateLocal(ux, uy, -rock.rot);
        return Math.max(
          MIN_ROCK_R,
          rayPolygonRadius(rock.hull, local.x, local.y) ||
            supportRadius(rock.hull, local.x, local.y)
        );
      }

      function absorbRockPair(i, j) {
        const a = rocks[i], b = rocks[j];
        const total = a.mass + b.mass;
        const dx = wrapDelta(b.x - a.x, W);
        const dy = wrapDelta(b.y - a.y, H);
        const x = wrap(a.x + dx * (b.mass / total), W);
        const y = wrap(a.y + dy * (b.mass / total), H);
        const aLocal = { x: wrapDelta(a.x - x, W), y: wrapDelta(a.y - y, H) };
        const bLocal = { x: wrapDelta(b.x - x, W), y: wrapDelta(b.y - y, H) };
        const carried = [
          ...carryLobes(a, x, y, 0),
          ...carryLobes(b, x, y, 0),
        ];
        const lobes = compactMergedLobes(carried, Math.sqrt(total));
        const bigSource = a.radius >= b.radius ? a : b;
        const smallSource = bigSource === a ? b : a;
        const bigLocal = bigSource === a ? aLocal : bLocal;
        const smallLocal = bigSource === a ? bLocal : aLocal;
        const bigRadius = rockExtent(bigSource);
        const smallRadius = rockExtent(smallSource);
        const centerGap = Math.hypot(smallLocal.x - bigLocal.x, smallLocal.y - bigLocal.y);
        const targetScale = clamp((centerGap + smallRadius * 1.08) / Math.max(1, bigRadius), 1.08, 2.65);
        const mergeAbsorb = {
          bigX: bigLocal.x,
          bigY: bigLocal.y,
          bigRot: bigSource.rot,
          bigHull: copyHull(bigSource.hull),
          bigRadius,
          smallX: smallLocal.x,
          smallY: smallLocal.y,
          smallRot: smallSource.rot,
          smallHull: copyHull(smallSource.hull),
          smallRadius,
          targetScale,
        };
        const radius = clamp(Math.sqrt(total), MIN_ROCK_R, maxRockRadius());
        const hull = makeCompoundHull(lobes);
        const bounds = Math.max(radius, hullRadius(hull), compoundBounds(carried));
        const seams = [
          ...carrySeams(a, x, y, 0),
          ...carrySeams(b, x, y, 0),
          makeMergeSeam(aLocal, rockExtent(a), bLocal, rockExtent(b)),
        ].filter((seam) => seam.life > .02);
        const merged = makeRock(x, y, radius, {
          vx: (a.vx * a.mass + b.vx * b.mass) / total,
          vy: (a.vy * a.mass + b.vy * b.mass) / total,
          vr: clamp((a.vr * a.mass + b.vr * b.mass) / total, -MAX_ROCK_SPIN * .45, MAX_ROCK_SPIN * .45),
          rot: 0,
          lobes,
          hull,
          mass: total,
          bounds,
          crack: Math.max(a.crack, b.crack, .35),
          mergeFlash: 0,
          seams,
          mergeAge: 0,
          mergeDuration: .78,
          mergeAbsorb,
        });
        clearContactsFor(a, b);
        burst(x, y, 11, 70);
        rocks.splice(j, 1);
        rocks.splice(i, 1);
        rocks.push(merged);
      }

      function compactMergedLobes(lobes, radius) {
        const bounds = compoundBounds(lobes);
        const target = radius * (lobes.length <= 2 ? 1.92 : 1.74);
        const scale = bounds > target ? clamp(target / bounds, .88, .99) : 1;
        return lobes.map((lobe) => ({
          ...lobe,
          x: lobe.x * scale,
          y: lobe.y * scale,
        }));
      }

      function clearContactsFor(...dead) {
        if (!mergeContacts) return;
        const ids = new Set(dead.map((rock) => rock.id));
        for (const key of mergeContacts.keys()) {
          const [a, b] = key.split(':').map(Number);
          if (ids.has(a) || ids.has(b)) mergeContacts.delete(key);
        }
      }

      function carryLobes(rock, newX, newY, newRot) {
        return rockLobes(rock).map((lobe) => {
          const carried = lobePointToNewLocal(rock, lobe.x, lobe.y, newX, newY, newRot);
          return {
            x: carried.x,
            y: carried.y,
            rot: normAngle(rock.rot + (lobe.rot || 0) - newRot),
            hull: copyHull(lobe.hull),
            mass: lobe.mass ?? rock.mass,
          };
        });
      }

      function lobePointToNewLocal(rock, x, y, newX, newY, newRot) {
        const world = rotateLocal(x, y, rock.rot);
        const lx = wrapDelta(rock.x + world.x - newX, W);
        const ly = wrapDelta(rock.y + world.y - newY, H);
        return rotateLocal(lx, ly, -newRot);
      }

      function makeMergeSeam(a, ar, b, br) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const d = Math.hypot(dx, dy) || 1;
        const nx = dx / d, ny = dy / d;
        const px = -ny, py = nx;
        const boundary = clamp((d * d + ar * ar - br * br) / (2 * d), ar * .32, ar * 1.04);
        const cx = a.x + nx * boundary;
        const cy = a.y + ny * boundary;
        const half = clamp(Math.min(ar, br) * .72, 6, 42);
        return {
          x1: cx + px * half,
          y1: cy + py * half,
          x2: cx - px * half,
          y2: cy - py * half,
          life: 1,
        };
      }

      function carrySeams(rock, newX, newY, newRot) {
        const seams = [];
        for (const seam of rock.seams || []) {
          if (seam.life <= .04) continue;
          const p1 = seamPointToNewLocal(rock, seam.x1, seam.y1, newX, newY, newRot);
          const p2 = seamPointToNewLocal(rock, seam.x2, seam.y2, newX, newY, newRot);
          seams.push({ x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, life: seam.life * .78 });
        }
        return seams;
      }

      function seamPointToNewLocal(rock, x, y, newX, newY, newRot) {
        const world = rotateLocal(x, y, rock.rot);
        const lx = wrapDelta(rock.x + world.x - newX, W);
        const ly = wrapDelta(rock.y + world.y - newY, H);
        return rotateLocal(lx, ly, -newRot);
      }

      function condenseOverflow() {
        while (rocks.length > MAX_ROCKS) {
          let bestI = 0, bestJ = 1, best = Infinity;
          for (let i = 0; i < rocks.length; i++) {
            for (let j = i + 1; j < rocks.length; j++) {
              const a = rocks[i], b = rocks[j];
              const d = distWrap(a.x, a.y, b.x, b.y) - rockExtent(a) - rockExtent(b);
              const score = d + Math.min(a.radius, b.radius) * .35;
              if (score < best) {
                best = score;
                bestI = i;
                bestJ = j;
              }
            }
          }
          absorbRockPair(bestI, bestJ);
        }
      }

      function updateSparks(dt) {
        for (let i = sparks.length - 1; i >= 0; i--) {
          const s = sparks[i];
          s.age += dt;
          s.x = wrap(s.x + s.vx * dt, W);
          s.y = wrap(s.y + s.vy * dt, H);
          s.vx *= Math.pow(.12, dt);
          s.vy *= Math.pow(.12, dt);
          if (s.age >= s.life) sparks.splice(i, 1);
        }
      }

      function collideBullets() {
        for (let bi = bullets.length - 1; bi >= 0; bi--) {
          const b = bullets[bi];
          for (let ri = rocks.length - 1; ri >= 0; ri--) {
            const rock = rocks[ri];
            if (bulletHitsRock(b, rock)) {
              fractureRock(ri, b.x, b.y);
              bullets.splice(bi, 1);
              score += 10;
              break;
            }
          }
        }
      }

      function collideShip() {
        if (!ship.alive || ship.invuln > 0 || gameOver) return;
        for (const rock of rocks) {
          if (distWrap(ship.x, ship.y, rock.x, rock.y) > SHIP_R + rockExtent(rock) + 2) continue;
          if (pointHitsRock(ship.x, ship.y, rock, SHIP_R)) {
            killShip();
            return;
          }
        }
      }

      function bulletHitsRock(b, rock) {
        if (b.wrapped) return pointHitsRock(b.x, b.y, rock, 3);
        const extent = rockExtent(rock);
        if (
          distWrap(b.x, b.y, rock.x, rock.y) > extent + 34 &&
          distWrap(b.px, b.py, rock.x, rock.y) > extent + 34
        ) return false;
        return segmentHitsRock(b.px, b.py, b.x, b.y, rock, 3);
      }

      function pointHitsRock(x, y, rock, pad) {
        const p = pointToRockLocal(rock, x, y);
        if (rockLobes(rock).length > 1) {
          return pointInPolygon(p, rock.hull) || pointPolygonDistance(p, rock.hull) <= pad;
        }
        for (const lobe of rockLobes(rock)) {
          const lp = pointToLobeLocal(p, lobe);
          if (pointInPolygon(lp, lobe.hull) || pointPolygonDistance(lp, lobe.hull) <= pad) return true;
        }
        return false;
      }

      function segmentHitsRock(x1, y1, x2, y2, rock, pad) {
        const p1 = pointToRockLocal(rock, x1, y1);
        const p2 = pointToRockLocal(rock, x2, y2);
        if (rockLobes(rock).length > 1) {
          return pointInPolygon(p1, rock.hull) ||
            pointInPolygon(p2, rock.hull) ||
            segmentPolygonDistance(p1, p2, rock.hull) <= pad;
        }
        for (const lobe of rockLobes(rock)) {
          const lp1 = pointToLobeLocal(p1, lobe);
          const lp2 = pointToLobeLocal(p2, lobe);
          if (
            pointInPolygon(lp1, lobe.hull) ||
            pointInPolygon(lp2, lobe.hull) ||
            segmentPolygonDistance(lp1, lp2, lobe.hull) <= pad
          ) return true;
        }
        return false;
      }

      function pointToRockLocal(rock, x, y) {
        const dx = wrapDelta(x - rock.x, W);
        const dy = wrapDelta(y - rock.y, H);
        return rotateLocal(dx, dy, -rock.rot);
      }

      function pointToLobeLocal(p, lobe) {
        return rotateLocal(p.x - lobe.x, p.y - lobe.y, -(lobe.rot || 0));
      }

      function pointInPolygon(p, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
          const xi = poly[i][0], yi = poly[i][1];
          const xj = poly[j][0], yj = poly[j][1];
          const crosses = (yi > p.y) !== (yj > p.y) &&
            p.x < ((xj - xi) * (p.y - yi)) / (yj - yi || .0001) + xi;
          if (crosses) inside = !inside;
        }
        return inside;
      }

      function pointPolygonDistance(p, poly) {
        let best = Infinity;
        for (let i = 0; i < poly.length; i++) {
          const a = poly[i];
          const b = poly[(i + 1) % poly.length];
          best = Math.min(best, pointSegmentDistance(p.x, p.y, a[0], a[1], b[0], b[1]));
        }
        return best;
      }

      function segmentPolygonDistance(p1, p2, poly) {
        let best = Infinity;
        for (let i = 0; i < poly.length; i++) {
          const a = { x: poly[i][0], y: poly[i][1] };
          const b = { x: poly[(i + 1) % poly.length][0], y: poly[(i + 1) % poly.length][1] };
          if (segmentsIntersect(p1, p2, a, b)) return 0;
          best = Math.min(best, segmentSegmentDistance(p1, p2, a, b));
        }
        return best;
      }

      function segmentsIntersect(a, b, c, d) {
        const ab1 = cross(a, b, c);
        const ab2 = cross(a, b, d);
        const cd1 = cross(c, d, a);
        const cd2 = cross(c, d, b);
        const eps = .0001;
        if (Math.abs(ab1) < eps && onSegment(a, c, b)) return true;
        if (Math.abs(ab2) < eps && onSegment(a, d, b)) return true;
        if (Math.abs(cd1) < eps && onSegment(c, a, d)) return true;
        if (Math.abs(cd2) < eps && onSegment(c, b, d)) return true;
        return (ab1 > 0) !== (ab2 > 0) && (cd1 > 0) !== (cd2 > 0);
      }

      function onSegment(a, b, c) {
        return b.x >= Math.min(a.x, c.x) - .0001 &&
          b.x <= Math.max(a.x, c.x) + .0001 &&
          b.y >= Math.min(a.y, c.y) - .0001 &&
          b.y <= Math.max(a.y, c.y) + .0001;
      }

      function segmentSegmentDistance(a, b, c, d) {
        return Math.min(
          pointSegmentDistance(a.x, a.y, c.x, c.y, d.x, d.y),
          pointSegmentDistance(b.x, b.y, c.x, c.y, d.x, d.y),
          pointSegmentDistance(c.x, c.y, a.x, a.y, b.x, b.y),
          pointSegmentDistance(d.x, d.y, a.x, a.y, b.x, b.y)
        );
      }

      function cross(a, b, c) {
        return (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
      }

      function rocksTouch(a, b, pad) {
        if (distWrap(a.x, a.y, b.x, b.y) > rockExtent(a) + rockExtent(b) + pad + 2) return false;
        const dx = wrapDelta(b.x - a.x, W);
        const dy = wrapDelta(b.y - a.y, H);
        const aPolys = rockCollisionPolygonsRelative(a, 0, 0);
        const bPolys = rockCollisionPolygonsRelative(b, dx, dy);
        for (const aPts of aPolys) {
          for (const bPts of bPolys) {
            if (polygonDistance(aPts, bPts) <= pad) return true;
          }
        }
        return false;
      }

      function rockCollisionPolygonsRelative(rock, ox, oy) {
        if (rockLobes(rock).length > 1) return [rockHullPolygonRelative(rock, ox, oy)];
        return rockLobePolygonsRelative(rock, ox, oy);
      }

      function rockHullPolygonRelative(rock, ox, oy) {
        const ca = Math.cos(rock.rot), sa = Math.sin(rock.rot);
        return rock.hull.map(([x, y]) => [ox + x * ca - y * sa, oy + x * sa + y * ca]);
      }

      function rockLobePolygonsRelative(rock, ox, oy) {
        return rockLobes(rock).map((lobe) => lobePolygonRelative(rock, lobe, ox, oy));
      }

      function lobePolygonRelative(rock, lobe, ox, oy) {
        const rca = Math.cos(rock.rot), rsa = Math.sin(rock.rot);
        const cx = ox + lobe.x * rca - lobe.y * rsa;
        const cy = oy + lobe.x * rsa + lobe.y * rca;
        const a = rock.rot + (lobe.rot || 0);
        const ca = Math.cos(a), sa = Math.sin(a);
        return lobe.hull.map(([x, y]) => [cx + x * ca - y * sa, cy + x * sa + y * ca]);
      }

      function polygonDistance(aPts, bPts) {
        for (const p of aPts) if (pointInPolygon({ x: p[0], y: p[1] }, bPts)) return 0;
        for (const p of bPts) if (pointInPolygon({ x: p[0], y: p[1] }, aPts)) return 0;

        let best = Infinity;
        for (let i = 0; i < aPts.length; i++) {
          const a1 = { x: aPts[i][0], y: aPts[i][1] };
          const a2 = { x: aPts[(i + 1) % aPts.length][0], y: aPts[(i + 1) % aPts.length][1] };
          for (let j = 0; j < bPts.length; j++) {
            const b1 = { x: bPts[j][0], y: bPts[j][1] };
            const b2 = { x: bPts[(j + 1) % bPts.length][0], y: bPts[(j + 1) % bPts.length][1] };
            if (segmentsIntersect(a1, a2, b1, b2)) return 0;
            best = Math.min(best, segmentSegmentDistance(a1, a2, b1, b2));
          }
        }
        return best;
      }

      function segmentCircleDistanceWrapped(x1, y1, x2, y2, cx, cy) {
        let best = Infinity;
        for (const ox of [-W, 0, W]) {
          for (const oy of [-H, 0, H]) {
            best = Math.min(best, pointSegmentDistance(cx + ox, cy + oy, x1, y1, x2, y2));
          }
        }
        return best;
      }

      function pointSegmentDistance(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const l2 = dx * dx + dy * dy;
        if (l2 <= .0001) return Math.hypot(px - x2, py - y2);
        const t = clamp(((px - x1) * dx + (py - y1) * dy) / l2, 0, 1);
        return Math.hypot(px - (x1 + dx * t), py - (y1 + dy * t));
      }

      function fractureRock(index, x, y) {
        const rock = rocks[index];
        if (!rock) return;
        const splitN = splitCountForRock(rock);
        if (splitN < 2) {
          shoveSmallRock(index, x, y);
          return;
        }

        const away = angleAwayFromShip(rock.x, rock.y);
        const childMass = rock.mass / splitN;
        const childR = Math.max(MIN_ROCK_R, Math.sqrt(childMass));
        const orbit = childR * (1.25 + splitN * .12) + 4;
        const kick = clamp(198 - rock.radius * .32, 78, 178);
        const fan = splitN === 2 ? 1.05 : clamp(.52 * splitN, 1.35, 2.65);
        const step = splitN === 1 ? 0 : fan / (splitN - 1);
        const children = [];

        for (let i = 0; i < splitN; i++) {
          const a = away - fan / 2 + step * i + rand(-.16, .16);
          const tangent = a + Math.PI / 2;
          const child = makeRock(
            rock.x + Math.cos(a) * orbit * rand(.78, 1.18),
            rock.y + Math.sin(a) * orbit * rand(.78, 1.18),
            childR,
            {
              hull: makeFragmentHull(childR, a),
              mass: childMass,
              vx: rock.vx * .34 + Math.cos(a) * kick + Math.cos(tangent) * rand(-26, 26),
              vy: rock.vy * .34 + Math.sin(a) * kick + Math.sin(tangent) * rand(-26, 26),
              vr: clamp(rock.vr * .35 + rand(-.32, .32), -MAX_ROCK_SPIN, MAX_ROCK_SPIN),
              crack: 1,
              mergeFlash: .22,
            }
          );
          children.push(child);
        }

        rocks.splice(index, 1, ...children);
        burstDirected(x, y, 13 + splitN * 4, 150, away, .9);
        mergeTouchingRocks();
        condenseOverflow();
      }

      function splitCountForRock(rock) {
        const maxPieces = maxSplitPieces(rock);
        if (maxPieces < 2) return 0;
        return 2 + ((Math.pow(Math.random(), .65) * (maxPieces - 1)) | 0);
      }

      function shoveSmallRock(index, x, y) {
        const rock = rocks[index];
        const away = angleAwayFromShip(rock.x, rock.y);
        const side = away + Math.PI / 2;
        const kick = clamp(215 - rock.radius * 2.3, 82, 178);
        rock.vx += Math.cos(away) * kick + Math.cos(side) * rand(-24, 24);
        rock.vy += Math.sin(away) * kick + Math.sin(side) * rand(-24, 24);
        rock.vr = clamp(rock.vr + rand(-.28, .28), -MAX_ROCK_SPIN, MAX_ROCK_SPIN);
        rock.crack = 1;
        rock.mergeFlash = .46;
        burstDirected(x, y, 12, 115, away, .7);
      }

      function angleAwayFromShip(x, y) {
        const dx = wrapDelta(x - ship.x, W);
        const dy = wrapDelta(y - ship.y, H);
        if (Math.hypot(dx, dy) < 1) return rand(0, TAU);
        return Math.atan2(dy, dx);
      }

      function burst(x, y, n, speed) {
        for (let i = 0; i < n; i++) {
          const a = rand(0, TAU);
          const s = rand(speed * .18, speed);
          sparks.push({
            x, y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            age: 0,
            life: rand(.28, .9),
            len: rand(5, 18),
            a,
          });
        }
      }

      function burstDirected(x, y, n, speed, angle, spread) {
        for (let i = 0; i < n; i++) {
          const a = angle + rand(-spread, spread);
          const s = rand(speed * .24, speed);
          sparks.push({
            x, y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            age: 0,
            life: rand(.25, .82),
            len: rand(6, 20),
            a,
          });
        }
      }

      function thrustSpark() {
        const a = ship.a + Math.PI + rand(-.42, .42);
        sparks.push({
          x: wrap(ship.x + Math.cos(ship.a + Math.PI) * 12, W),
          y: wrap(ship.y + Math.sin(ship.a + Math.PI) * 12, H),
          vx: ship.vx + Math.cos(a) * rand(45, 125),
          vy: ship.vy + Math.sin(a) * rand(45, 125),
          age: 0,
          life: rand(.12, .28),
          len: rand(4, 10),
          a,
        });
      }

      function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        drawStars();
        drawRocks();
        drawBullets();
        drawSparks();
        drawShip();
        drawHud();
      }

      function drawStars() {
        for (const s of stars) {
          const a = s.a * (.65 + Math.sin(now * 1.7 + s.p) * .35);
          ctx.fillStyle = `${LINE}${a})`;
          ctx.fillRect(s.x, s.y, 1, 1);
        }
      }

      function drawRocks() {
        drawAttractionBridges();
        for (const rock of rocks) {
          drawWrappedObject(rock.x, rock.y, rockDrawExtent(rock), (cx, cy) => drawRockAt(rock, cx, cy));
        }
      }

      function rockDrawExtent(rock) {
        let extent = rockExtent(rock) + 12;
        const anim = rock.mergeAbsorb;
        if (rock.mergeDuration > 0 && rock.mergeAge < rock.mergeDuration && anim) {
          const bigReach = Math.hypot(anim.bigX, anim.bigY) + anim.bigRadius * anim.targetScale;
          const smallReach = Math.hypot(anim.smallX, anim.smallY) + anim.smallRadius;
          extent = Math.max(extent, bigReach, smallReach) + 16;
        }
        return extent;
      }

      function drawRockAt(rock, cx, cy) {
        const absorbing = rock.mergeDuration > 0 && rock.mergeAge < rock.mergeDuration && rock.mergeAbsorb;
        if (absorbing) {
          const t = clamp(rock.mergeAge / rock.mergeDuration, 0, 1);
          drawAbsorbAt(rock, cx, cy, t);
          return;
        }
        drawHullAt(rock, cx, cy, .7 + rock.mergeFlash * .22);
        if (rock.seams.length) drawSeamsAt(rock, cx, cy);
        if (rock.crack > .02) drawCracksAt(rock, cx, cy);
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - clamp(t, 0, 1), 3);
      }

      function drawAbsorbAt(rock, cx, cy, t) {
        const anim = rock.mergeAbsorb;
        const reach = easeOutCubic(clamp(t / .9, 0, 1));
        const push = .22 * reach;
        const bigX = anim.bigX + (anim.smallX - anim.bigX) * push;
        const bigY = anim.bigY + (anim.smallY - anim.bigY) * push;
        const bigRot = normAngle(anim.bigRot + normAngle(anim.smallRot - anim.bigRot) * .06 * reach);
        const scale = 1 + (anim.targetScale - 1) * reach;
        const gap = Math.hypot(anim.smallX - bigX, anim.smallY - bigY);
        const coversSmall = scale * anim.bigRadius >= gap + anim.smallRadius * .86;

        if (!coversSmall) drawLocalHullAt(rock, cx, cy, anim.smallX, anim.smallY, anim.smallRot, anim.smallHull, .62, 1);
        drawLocalHullAt(rock, cx, cy, bigX, bigY, bigRot, anim.bigHull, .82, scale);
      }

      function drawAttractionBridges() {
        for (let i = 0; i < rocks.length; i++) {
          for (let j = i + 1; j < rocks.length; j++) {
            const a = rocks[i], b = rocks[j];
            const big = a.radius >= b.radius ? a : b;
            const small = big === a ? b : a;
            const ratio = big.radius / Math.max(1, small.radius);
            if (ratio < 1.12) continue;

            const dx = wrapDelta(small.x - big.x, W);
            const dy = wrapDelta(small.y - big.y, H);
            const d = Math.hypot(dx, dy);
            if (d <= 1) continue;
            const bigExtent = rockExtent(big);
            const smallExtent = rockExtent(small);
            const gap = d - bigExtent - smallExtent;
            if (gap < 0 || gap > 58) continue;

            const nx = dx / d, ny = dy / d;
            const px = -ny, py = nx;
            const alpha = Math.pow(1 - gap / 58, 1.7) * .18;
            const offset = Math.min(9, smallExtent * .22);
            drawWrappedObject(big.x, big.y, d + smallExtent + 20, (bx, by) => {
              const sx = bx + dx;
              const sy = by + dy;
              for (const side of [-1, 1]) {
                const off = offset * side;
                const p1 = {
                  x: bx + nx * bigExtent + px * off,
                  y: by + ny * bigExtent + py * off,
                };
                const p2 = {
                  x: sx - nx * smallExtent + px * off * .38,
                  y: sy - ny * smallExtent + py * off * .38,
                };
                strokePath([p1, p2], false, .75, alpha);
              }
            });
          }
        }
      }

      function drawHullAt(rock, cx, cy, alpha) {
        const ca = Math.cos(rock.rot), sa = Math.sin(rock.rot);
        const pts = rock.hull.map(([x, y]) => ({
          x: cx + x * ca - y * sa,
          y: cy + x * sa + y * ca,
        }));
        strokePath(pts, true, 1.25, alpha);
      }

      function drawLocalHullAt(rock, cx, cy, lx, ly, lrot, hull, alpha, scale = 1) {
        const rca = Math.cos(rock.rot), rsa = Math.sin(rock.rot);
        const lca = Math.cos(lrot), lsa = Math.sin(lrot);
        const pts = hull.map(([x, y]) => {
          const sx = x * scale;
          const sy = y * scale;
          const px = lx + sx * lca - sy * lsa;
          const py = ly + sx * lsa + sy * lca;
          return {
            x: cx + px * rca - py * rsa,
            y: cy + px * rsa + py * rca,
          };
        });
        strokePath(pts, true, 1, alpha);
      }

      function drawSeamsAt(rock, cx, cy) {
        const ca = Math.cos(rock.rot), sa = Math.sin(rock.rot);
        for (const seam of rock.seams) {
          const p1 = {
            x: cx + seam.x1 * ca - seam.y1 * sa,
            y: cy + seam.x1 * sa + seam.y1 * ca,
          };
          const p2 = {
            x: cx + seam.x2 * ca - seam.y2 * sa,
            y: cy + seam.x2 * sa + seam.y2 * ca,
          };
          drawDissolvingLine(p1, p2, seam.life);
        }
      }

      function drawDissolvingLine(p1, p2, life) {
        const alpha = .36;
        if (life > .58) {
          strokePath([p1, p2], false, .85, alpha);
          return;
        }
        const keep = clamp(life / .58, 0, 1) * .42;
        const a = lerpPoint(p1, p2, keep);
        const b = lerpPoint(p2, p1, keep);
        strokePath([p1, a], false, .85, alpha);
        strokePath([p2, b], false, .85, alpha);
      }

      function lerpPoint(a, b, t) {
        return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
      }

      function drawCracksAt(rock, cx, cy) {
        const alpha = rock.crack * .36;
        for (let i = 0; i < 3; i++) {
          const a = rock.rot + rock.crackPhase + i * TAU / 3 + Math.sin(now * .45 + rock.radius) * .08;
          const inner = pointFrom(cx, cy, a, rock.radius * .12, 0);
          const outer = pointFrom(cx, cy, a, rock.radius * (.46 + i * .09), 0);
          strokePath([inner, outer], false, .85, alpha);
        }
      }

      function drawShip() {
        if (!ship.alive) return;
        if (ship.invuln > 0 && Math.sin(now * 28) < -.28) return;
        drawWrappedObject(ship.x, ship.y, 34, (cx, cy) => {
          const nose = pointFrom(cx, cy, ship.a, 17, 0);
          const left = pointFrom(cx, cy, ship.a, -12, -9);
          const notch = pointFrom(cx, cy, ship.a, -7, 0);
          const right = pointFrom(cx, cy, ship.a, -12, 9);
          strokePath([nose, left, notch, right], true, 1.35, .95);

          if (ship.thrusting) {
            const f1 = pointFrom(cx, cy, ship.a, -11, -5);
            const f2 = pointFrom(cx, cy, ship.a, -23 - Math.sin(now * 64) * 4, 0);
            const f3 = pointFrom(cx, cy, ship.a, -11, 5);
            strokePath([f1, f2, f3], false, 1, .62);
          }
        });
      }

      function pointFrom(x, y, angle, forward, side) {
        const ca = Math.cos(angle), sa = Math.sin(angle);
        return {
          x: x + ca * forward - sa * side,
          y: y + sa * forward + ca * side,
        };
      }

      function drawBullets() {
        for (const b of bullets) {
          drawWrappedObject(b.x, b.y, 20, (x, y) => {
            const tail = {
              x: x - b.vx * .018,
              y: y - b.vy * .018,
            };
            strokePath([tail, { x, y }], false, 1.25, .94);
          });
        }
      }

      function drawSparks() {
        for (const s of sparks) {
          const p = clamp(s.age / s.life, 0, 1);
          const a = (1 - p) * .72;
          drawWrappedObject(s.x, s.y, 20, (x, y) => {
            const x2 = x - Math.cos(s.a) * s.len * (1 - p);
            const y2 = y - Math.sin(s.a) * s.len * (1 - p);
            strokePath([{ x, y }, { x: x2, y: y2 }], false, 1, a);
          });
        }
      }

      function drawHud() {
        ctx.save();
        ctx.font = '13px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.textBaseline = 'top';
        ctx.fillStyle = `${LINE}.82)`;
        ctx.fillText(String(score).padStart(5, '0'), 18, 18);
        for (let i = 0; i < ship.lives; i++) drawLifeIcon(22 + i * 22, 45);
        ctx.textAlign = 'right';
        ctx.fillText(`${playerControl ? 'PILOT' : 'AUTO'} ${bullets.length}/${MAX_BULLETS}`, W - 18, 18);
        if (gameOver) {
          ctx.textAlign = 'center';
          ctx.font = '28px ui-monospace, SFMono-Regular, Menlo, monospace';
          ctx.fillText('NO SIGNAL', W / 2, H / 2 - 16);
        }
        ctx.restore();
      }

      function drawLifeIcon(x, y) {
        strokePath([
          { x, y: y - 8 },
          { x: x - 8, y: y + 8 },
          { x, y: y + 4 },
          { x: x + 8, y: y + 8 },
        ], true, .85, .62);
      }

      function drawWrappedObject(x, y, r, drawAt) {
        const xs = [0], ys = [0];
        if (x < r) xs.push(W);
        if (x > W - r) xs.push(-W);
        if (y < r) ys.push(H);
        if (y > H - r) ys.push(-H);
        for (const ox of xs) for (const oy of ys) drawAt(x + ox, y + oy);
      }

      function strokePath(points, close, width, alpha) {
        if (points.length < 2) return;
        ctx.save();
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        if (close) ctx.closePath();
        ctx.lineWidth = width;
        ctx.strokeStyle = `${LINE}${alpha})`;
        ctx.stroke();
        ctx.restore();
      }

      function beginPlayerControl() {
        playerControl = true;
        ship.autoBurstLeft = 0;
        ship.autoBurstAt = now;
      }

      addEventListener('keydown', (e) => {
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'Space'].includes(e.code)) e.preventDefault();
        if (gameOver && (e.code === 'Enter' || e.code === 'Space')) {
          reset();
          return;
        }
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'KeyA', 'KeyD', 'KeyW', 'Space'].includes(e.code)) {
          beginPlayerControl();
        }
        keys.add(e.code);
      });
      addEventListener('keyup', (e) => keys.delete(e.code));
      addEventListener('click', () => {
        if (gameOver) reset();
        else {
          beginPlayerControl();
          fire();
        }
      });
      addEventListener('resize', resize);

      resize();
    </script>
  </body>
</html>
