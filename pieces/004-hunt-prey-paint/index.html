  <body>
    <canvas id="stage"></canvas>
    <div class="caption">hunt prey paint · 2026 · an ecosystem paints itself · click to reseed</div>
    <pre id="debug"></pre>
    <script>
      // hunt prey paint — an abstract ecosystem that paints itself, and then
      // wipes the painting clean, forever.
      //
      // Three layers share one toroidal field (it wraps at every edge, so there
      // are no corners to win or die in):
      //
      //   PLANTS  — the food. A top-down glyph field, Dwarf-Fortress flavoured:
      //             each tile holds a character whose density tracks its biomass
      //             (a bare tile -> . -> , -> : -> " -> a bloom). Grows logist-
      //             ically, spreads to neighbours, regrows after grazing.
      //   PREY    — soft vector grazers. They eat plants, grow larger with age,
      //             and flee predators. Every prey is born with its own ALERTNESS
      //             (how far off it spots a hunter) and SPRINT SPEED. Sprinting
      //             outruns a predator but burns energy fast — so a hounded prey
      //             can run itself to starvation.
      //   HUNTERS — angular vector predators. They chase the nearest prey they
      //             can see and eat it on contact.
      //
      // Death paints the canvas:
      //   · a prey that STARVES leaves a pale, bone-coloured stain.
      //   · a prey that is KILLED leaves a blood stain.
      //   · a predator that dies leaves a faint ash mark.
      //   · a prey that reaches OLD AGE does the opposite — it is renewal. The
      //     ground around it is wiped clean of every stain and flushed lush with
      //     new growth. Living long enough is the only thing that heals the field.
      //
      // Populations are floored (a trickle of immigration if either side crashes)
      // and capped, so neither hunters nor prey can ever fully win: the system is
      // pinned into a perpetual, oscillating balance. The painting fills with the
      // marks of the hunt and is endlessly cleansed by the old — rebirth, balance,
      // and no end.

      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');
      const debugEl = document.getElementById('debug');
      const TAU = Math.PI * 2;

      // ---- tunables -------------------------------------------------------
      // These defaults were found with a headless balance harness (long runs
      // scored for coexistence): predators must be faster than most prey so tail-
      // chases can land, yet the fastest prey still escape — and a hunter only
      // breeds by eating enough to grow fat and SPLIT in half, so the predator
      // line tracks the food supply. Floors and caps then hold both species in a
      // perpetual, marked, self-cleansing balance.

      // plants
      let PLANT_GROWTH = 0.42;   // logistic regrow rate (the "growth" dial)
      let PLANT_PROP   = 0.32;   // lush tiles seeding neighbours (the "prop" dial)
      const SPONT = 0.025;       // bare tiles spontaneously sprouting, per second
      const SENESCE = 0.03;      // chance/s a fully-bloomed tile flowers out and dies back (gentle)
      const EAT = 1.80;          // food a grazing prey removes per second (grazing visibly clears it)
      const NUTR = 0.58;         // energy gained per unit of food eaten

      // prey
      const PREY0 = 30, MIN_PREY = 18, CAP_PREY = 160;
      const PREY_AGE = [46, 82];     // lifespan range (seconds)
      const PREY_MATURE = 16;        // can reproduce after this age
      const SIZE_AGE = 18;           // age at which a prey reaches full size
      const MINR = 3.5, MAXR = 12;   // body radius, young -> old
      const METAB_PREY = 0.055;      // idle energy burn per second
      const FLEE_COST = 4.2;         // sprinting multiplies the burn this much
      const ALERT = [50, 140];       // per-prey predator-detection radius
      const FLEE = [104, 176];       // per-prey sprint speed (fastest still beats a hunter)
      const GRAZE = [16, 30];        // per-prey amble speed while feeding
      const PREY_ACCEL = [12, 22];   // per-prey: how hard it snaps up to sprint speed (fast)
      const PREY_TURN = 3.0, PREY_TURN_FLEE = 13; // rad/s steering; whips around when fleeing
      const PREY_DECEL = 2.5;        // how gently it coasts back down when safe
      const PREY_REP = 0.84;         // energy needed to breed
      const PREY_BREED_R = 10;       // must be visibly grown before breeding

      // predators — they GROW by eating and SPLIT in half when fat (mitosis), and
      // burn energy by MOVING: a starving hunter sprints faster but spends faster.
      const PRED0 = 8, MIN_PRED = 3, CAP_PRED = 36;
      const PRED_AGE = [60, 96];     // hunters die of old age too
      const PRED_SPEED = [135, 168]; // fast — closes a chase quickly; fastest prey still escape
      const PRED_ACCEL = [3.0, 6.5]; // per-hunter: how hard it builds speed (snappier baseline)
      const PRED_TURN = [3.0, 6.0];  // per-hunter: rad/s it can swing its heading (snappier baseline)
      const CRUISE = 0.78;           // fraction of top speed when no prey is in sight (stays fast)
      const DETECT = 190;            // how far a predator sees prey
      const AGGRO_K = 1.0;           // prey-swarm aggression: up to this much extra turn/accel
      const AGGRO_REF = 12;          // a 'lot of prey' = this many in sight
      const BMR = 0.008;             // basal burn per second (standing still)
      const MOVE_K = 0.00044;        // burn per px/s of speed — moving is what costs
      const STARVE_BOOST = 0.4;      // a near-empty hunter moves this much faster
      const HREF = 1.0;              // energy reference for the hunger ramp
      const KILL_GAIN = 0.46;        // base energy per kill, ×(prey size / 7) — big prey, big meal
      const SIZE_W = 2.0;            // how strongly a hunter prefers prey near its own size
      const SPLIT_E = 1.9;           // energy at which a fat hunter divides in two
      const PBASE = 3.0, PGROWK = 2.5, PMAX = 8;  // size = PBASE + energy*PGROWK; small darts, weak = smaller
      const SEP_K = 1.15;            // same-type bodies push apart at this × their radii

      // palettes
      const SOILS = ['#c2a877', '#bca06c', '#c9b282', '#b89a6a', '#c6ad7e'];
      // vibrant prey colours — each prey wears one, and bleeds in it
      const PREY_COLORS = [
        [64, 176, 200], [91, 123, 224], [168, 111, 214], [224, 100, 140],
        [232, 161, 58], [95, 184, 120], [210, 96, 63], [111, 194, 176],
      ];
      // high-contrast green ramp for the groundcover: deep forest -> bright lime
      const GREENS = ['#2f6b1e', '#3f8a24', '#57a52b', '#74be2f', '#92d836', '#4a7d28'];
      const FLOWER_SETS = [
        ['#ff7a3a', '#ffc23a', '#ff5d8a'],
        ['#e879d6', '#b15cff', '#ffc23a'],
        ['#ff6a2f', '#ffa23a', '#ffe04c'],
        ['#ff5d8a', '#ff9ec4', '#c79cff'],
      ];
      const ASH = [[58, 48, 40], [44, 36, 30]];

      // ---- state ----------------------------------------------------------
      let W = 0, H = 0, dpr = 1;
      let CELL = 20, gcols = 0, grows = 0;
      let food = new Float32Array(0);
      let decay = new Float32Array(0);    // transient wilt timer per tile
      let soilL, plantL, marksL;          // offscreen layers
      let prey = [], preds = [], pulses = [];
      let soilTint = SOILS[0], flowers = FLOWER_SETS[0];
      let setIndex = 0;
      let last = 0, fps = 0, plantTimer = 0, WARM = 0;
      let plantPixCols = 0, plantPixRows = 0, plantCursor = 0, plantStride = 1;
      const stats = { starve: 0, kill: 0, old: 0, predDie: 0, splits: 0 };
      const debug = new URLSearchParams(location.search).has('debug');

      // ---- helpers --------------------------------------------------------
      const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
      const rand = (a, b) => a + Math.random() * (b - a);
      const chance = (p) => Math.random() < p;
      const pick = (a) => a[(Math.random() * a.length) | 0];
      const wrapd = (d, s) => d > s * 0.5 ? d - s : d < -s * 0.5 ? d + s : d;  // toroidal delta
      const wrapp = (p, s) => { p %= s; return p < 0 ? p + s : p; };
      const tileIdx = (x, y) => ((wrapp(y, H) / CELL) | 0) * gcols + ((wrapp(x, W) / CELL) | 0);
      const foodAt = (x, y) => food[tileIdx(x, y)];
      function hash(i) { let h = i * 374761393 + 668265263; h = (h ^ (h >> 13)) * 1274126177; return ((h ^ (h >> 16)) >>> 0) / 4294967295; }
      function shade(hex, d) { const n = parseInt(hex.slice(1), 16); const cl = (v) => v < 0 ? 0 : v > 255 ? 255 : v | 0; return `rgb(${cl((n >> 16) + d)},${cl(((n >> 8) & 255) + d)},${cl((n & 255) + d)})`; }
      const mix = (a, b, t) => [a[0] * (1 - t) + b[0] * t | 0, a[1] * (1 - t) + b[1] * t | 0, a[2] * (1 - t) + b[2] * t | 0];
      const sat = (c, s) => { const m = (c[0] + c[1] + c[2]) / 3; return [clamp(m + (c[0] - m) * s, 0, 255) | 0, clamp(m + (c[1] - m) * s, 0, 255) | 0, clamp(m + (c[2] - m) * s, 0, 255) | 0]; };
      const deepen = (c) => { const s = sat(c, 1.5); return [s[0] * 0.92 | 0, s[1] * 0.84 | 0, s[2] * 0.84 | 0]; };  // vivid, slightly deep stain
      const pale = (c) => mix(sat(c, 1.1), [228, 218, 198], 0.55);                    // washed, bone-ward

      // ---- layers / sizing ------------------------------------------------
      function makeLayer() {
        const c = document.createElement('canvas');
        c.width = W * dpr; c.height = H * dpr;
        const x = c.getContext('2d');
        x.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { canvas: c, ctx: x };
      }

      function resize() {
        W = innerWidth; H = innerHeight; dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        CELL = Math.max(14, Math.round(Math.min(W, H) / 42));
        gcols = Math.ceil(W / CELL); grows = Math.ceil(H / CELL);
        food = new Float32Array(gcols * grows);
        decay = new Float32Array(gcols * grows);

        soilL = makeLayer(); plantL = makeLayer(); marksL = makeLayer();
        configurePlantPixels();
      }

      function paintSoil() {
        const c = soilL.ctx;
        c.fillStyle = soilTint; c.fillRect(0, 0, W, H);
        // sparse two-tone speckle so the ground reads as ground, not a flat fill
        for (let i = 0; i < (W * H) / 900; i++) {
          c.fillStyle = chance(0.5) ? 'rgba(90,70,40,0.10)' : 'rgba(255,240,205,0.12)';
          const s = rand(1, 2.4);
          c.fillRect(rand(0, W), rand(0, H), s, s);
        }
      }

      function compose(layer) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.drawImage(layer.canvas, 0, 0);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      // ---- plants ---------------------------------------------------------
      function stepPlants(dt) {
        for (let i = 0; i < food.length; i++) {
          let f = food[i];
          if (f > 0.001) f += PLANT_GROWTH * f * (1 - f) * dt;        // logistic growth
          if (decay[i] > 0) decay[i] -= dt;                          // wilt mark fading
          if (f < 0.05) { if (chance(SPONT * dt)) f = 0.08; }         // bare tile sprouts
          else if (f > 0.9 && chance(SENESCE * dt)) { f = 0.4; decay[i] = 0.9; } // flowers out, dies back partway
          else if (f > 0.5 && chance(PLANT_PROP * dt)) {             // lush tile spreads
            const cx = i % gcols, cy = (i / gcols) | 0;
            const nx = cx + ((Math.random() * 3) | 0) - 1, ny = cy + ((Math.random() * 3) | 0) - 1;
            if (nx >= 0 && ny >= 0 && nx < gcols && ny < grows) {
              const j = ny * gcols + nx; if (food[j] < 0.1) food[j] = 0.1;
            }
          }
          food[i] = f;
        }
      }

      // Plants are a quiet, distributed pixel terrain — a top-down landscape in
      // the spirit of the original Dune: a low-contrast dither over the sand whose
      // DENSITY (not loud colour) tracks biomass, so growth reads as a subtle
      // thickening of the ground, not a busy field of symbols. Biomass is sampled
      // bilinearly across tiles (no blocky tile edges) and dithered onto a fine
      // pixel grid; wilting tiles tint faintly browner. Colours sit very close to
      // the sand so the whole layer stays calm.
      const PXS = 3;                                         // one terrain pixel (finer = less chunky)
      const PLANT_PIXEL_BUDGET = 1400;                       // incremental pixels per paint pass
      const T_SAND = [190, 172, 124];                        // the ground the green grows from
      const T_WILT = [164, 138, 92];
      // greens vary smoothly between these two over a low-frequency noise field, so
      // dark and light greens flow into one another instead of tiling into blocks
      const G_DARK = [54, 80, 36], G_LIGHT = [150, 158, 96];
      const wrapTile = (cx, cy) => (((cy % grows) + grows) % grows) * gcols + (((cx % gcols) + gcols) % gcols);
      function gcd(a, b) { while (b) { const t = b; b = a % b; a = t; } return Math.abs(a); }
      function configurePlantPixels() {
        plantPixCols = Math.ceil(W / PXS);
        plantPixRows = Math.ceil(H / PXS);
        const total = Math.max(1, plantPixCols * plantPixRows);
        plantStride = Math.max(1, ((total * 0.61803398875) | 0) | 1);
        while (gcd(plantStride, total) !== 1) plantStride += 2;
        plantCursor = 0;
      }
      function fieldAt(arr, x, y) {                          // bilinear sample over the tile grid
        const gx = x / CELL - 0.5, gy = y / CELL - 0.5;
        const x0 = Math.floor(gx), y0 = Math.floor(gy), fx = gx - x0, fy = gy - y0;
        const a = arr[wrapTile(x0, y0)], b = arr[wrapTile(x0 + 1, y0)], c = arr[wrapTile(x0, y0 + 1)], d = arr[wrapTile(x0 + 1, y0 + 1)];
        return (a + (b - a) * fx) * (1 - fy) + (c + (d - c) * fx) * fy;
      }
      function tintAt(x, y) {                                // smooth low-frequency noise in [0,1]
        const S = 70, gx = x / S, gy = y / S, x0 = Math.floor(gx), y0 = Math.floor(gy);
        const fx = gx - x0, fy = gy - y0, sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
        const h00 = hash((x0 * 8191 ^ y0 * 131071) >>> 0), h10 = hash(((x0 + 1) * 8191 ^ y0 * 131071) >>> 0);
        const h01 = hash((x0 * 8191 ^ (y0 + 1) * 131071) >>> 0), h11 = hash(((x0 + 1) * 8191 ^ (y0 + 1) * 131071) >>> 0);
        return (h00 + (h10 - h00) * sx) * (1 - sy) + (h01 + (h11 - h01) * sx) * sy;
      }
      function drawPlantPixel(c, px, py) {
        c.clearRect(px, py, PXS, PXS);
        const cxp = px + PXS * 0.5, cyp = py + PXS * 0.5;
        const f = fieldAt(food, cxp, cyp);
        if (f < 0.06) return;
        if (hash((px * 73856093) ^ (py * 19349663) >>> 0) > f) return;   // dithered; reaches full at f=1
        const tint = mix(G_DARK, G_LIGHT, tintAt(cxp, cyp));             // smooth dark↔light green
        let base = mix(T_SAND, tint, clamp(f, 0, 1));
        const wl = fieldAt(decay, cxp, cyp);
        if (wl > 0.05) base = mix(base, T_WILT, clamp(wl, 0, 0.8));
        const v = 0.9 + hash((px * 19349663) ^ (py * 83492791) >>> 0) * 0.2;
        c.fillStyle = `rgba(${base[0] * v | 0},${base[1] * v | 0},${base[2] * v | 0},${0.3 + 0.28 * f})`;
        c.fillRect(px, py, PXS, PXS);
      }
      function drawPlants(budget = PLANT_PIXEL_BUDGET) {
        const c = plantL.ctx, total = plantPixCols * plantPixRows;
        if (!total) return;
        for (let n = 0; n < budget; n++) {
          const idx = (plantCursor * plantStride) % total;
          plantCursor = (plantCursor + 1) % total;
          drawPlantPixel(c, (idx % plantPixCols) * PXS, ((idx / plantPixCols) | 0) * PXS);
        }
      }

      // ---- marks (painterly watercolour, persistent) ----------------------
      // A death builds a stain as a list of primitives, each tagged with how far
      // out from the centre it sits. The stain doesn't appear whole — it SEEPS:
      // each frame we paint the primitives whose radius the spreading edge has
      // reached, so the pool blooms outward over a second or so. Texture comes
      // from a heavy centre, blobby uneven colour, a darker dried RIM (the tide-
      // line a watercolour pool leaves as it dries), and a gritty dirty-xerox
      // stipple. The colour is the dying creature's own.
      const WHITE = [240, 238, 232];   // a starved prey bleeds white
      let seeps = [];
      // A stain is a directional PAINT SMEAR: colour dragged along one axis, built
      // from blobs strung down the smear (tapering at the ends), streaky dragged
      // strokes, and a gritty stipple — so it reads like paint wiped across the
      // ground rather than a round splat. Still seeps outward over time.
      function genStain(x, y, rgb, scale, o) {
        const baseR = o.baseR * scale;
        const r0 = rgb[0] | 0, g0 = rgb[1] | 0, b0 = rgb[2] | 0;
        const dk = [r0 * 0.5 | 0, g0 * 0.42 | 0, b0 * 0.42 | 0];
        const sm = rand(0, TAU), ca = Math.cos(sm), sa = Math.sin(sm);
        const LONG = baseR * 1.8, PERP = baseR * 0.58;
        const place = (al, pe) => [x + ca * al - sa * pe, y + sa * al + ca * pe];
        const vcol = () => { const v = rand(0.82, 1.16); return `${clamp(r0 * v, 0, 255) | 0},${clamp(g0 * v, 0, 255) | 0},${clamp(b0 * v, 0, 255) | 0}`; };
        const P = [];
        for (let k = 0; k < o.blobs; k++) {                            // body strung along the smear
          const t = rand(-1, 1), al = t * LONG, pe = rand(-PERP, PERP) * (1 - Math.abs(t) * 0.5);
          const [ox, oy] = place(al, pe);
          const r = baseR * (0.55 - Math.abs(t) * 0.32) * rand(0.7, 1.3);
          if (r < 1) continue;
          const a = o.wash * rand(0.7, 1.3), col = vcol(), rad = Math.hypot(al, pe);
          P.push({ rad, fn: (c) => { const g = c.createRadialGradient(ox, oy, 0, ox, oy, r); g.addColorStop(0, `rgba(${col},${a})`); g.addColorStop(1, `rgba(${col},0)`); c.fillStyle = g; c.beginPath(); c.arc(ox, oy, r, 0, TAU); c.fill(); } });
        }
        for (let k = 0; k < (o.streaks || 0); k++) {                   // dragged paint strokes
          const pe = rand(-PERP, PERP), a0 = rand(-LONG, LONG * 0.2), a1 = a0 + rand(baseR * 0.8, LONG * 1.3);
          const [x0, y0] = place(a0, pe), [x1, y1] = place(a1, pe + rand(-2.5, 2.5));
          const a = o.wash * rand(1.0, 1.8), w = rand(1.2, baseR * 0.3), col = vcol(), rad = Math.hypot((a0 + a1) / 2, pe);
          P.push({ rad, fn: (c) => { c.strokeStyle = `rgba(${col},${a})`; c.lineWidth = w; c.lineCap = 'round'; c.beginPath(); c.moveTo(x0, y0); c.lineTo(x1, y1); c.stroke(); } });
        }
        for (let k = 0; k < o.grain; k++) {                            // dirty stipple along the smear
          const al = rand(-LONG * 1.05, LONG * 1.05), pe = rand(-PERP * 1.25, PERP * 1.25);
          const a = rand(0.06, 0.5) * (1 - Math.abs(al) / (LONG * 1.15));
          if (a <= 0.02) continue;
          const [ox, oy] = place(al, pe), col = Math.random() < 0.6 ? dk : [r0, g0, b0];
          const sw = Math.random() < 0.5 ? 1 : 2, sh = Math.random() < 0.5 ? 1 : 2, rad = Math.hypot(al, pe);
          P.push({ rad, fn: (c) => { c.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${a})`; c.fillRect(ox | 0, oy | 0, sw, sh); } });
        }
        P.sort((a, b) => a.rad - b.rad);
        return { P, i: 0, age: 0, life: o.life || 1.2, maxR: LONG * 1.1 };
      }
      const paintStain = (x, y, rgb, scale, o) => seeps.push(genStain(x, y, rgb, scale, o));
      function growSeeps(dt) {
        const c = marksL.ctx;
        for (let s = seeps.length - 1; s >= 0; s--) {
          const sp = seeps[s]; sp.age += dt;
          const done = sp.age >= sp.life;
          const reach = done ? Infinity : sp.maxR * (sp.age / sp.life);
          while (sp.i < sp.P.length && sp.P[sp.i].rad <= reach) sp.P[sp.i++].fn(c);
          if (done) seeps.splice(s, 1);
        }
      }
      function flushSeeps() { const c = marksL.ctx; for (const sp of seeps) while (sp.i < sp.P.length) sp.P[sp.i++].fn(c); seeps = []; }

      const paintKill   = (p) => paintStain(p.x, p.y, deepen(p.col), 0.6 + p.size / 7,  { baseR: 24, wash: 0.12, blobs: 22, streaks: 10, grain: 200, life: 1.3 });
      const paintStarve = (p) => paintStain(p.x, p.y, WHITE,         0.6 + p.size / 8,  { baseR: 15, wash: 0.17, blobs: 15, streaks: 5,  grain: 90,  life: 1.1 });

      // A hunter dies as CROSSHATCHING — two crossing sets of short, slightly
      // irregular pen strokes, like a quick hatch mark.
      function paintHatch(x, y, scale) {
        const c = marksL.ctx, base = rand(0, TAU);
        c.save(); c.translate(x, y); c.rotate(base);
        c.strokeStyle = 'rgba(40,33,28,0.5)'; c.lineCap = 'round';
        for (let set = 0; set < 2; set++) {
          c.save(); c.rotate(set === 0 ? -0.45 : 0.62);                // two crossing angles
          const n = 3 + (Math.random() * 3 | 0), len = 15 + 11 * scale, gap = 3.2 * scale;
          for (let i = 0; i < n; i++) {
            const off = (i - (n - 1) / 2) * gap;
            c.lineWidth = Math.max(0.8, rand(0.8, 1.7) * scale);
            c.beginPath();
            c.moveTo(-len / 2 + rand(-3, 3), off + rand(-1.4, 1.4));
            c.lineTo(len / 2 + rand(-3, 3), off + rand(-1.4, 1.4));
            c.stroke();
          }
          c.restore();
        }
        c.restore();
      }

      // Old-age renewal: erase every stain in a radius and flush the plants lush.
      function renew(x, y, r) {
        const c = marksL.ctx;
        c.save();
        c.globalCompositeOperation = 'destination-out';
        for (let k = 0; k < 3; k++) {
          const ox = x + rand(-r * 0.3, r * 0.3), oy = y + rand(-r * 0.3, r * 0.3), rr = r * rand(0.7, 1.1);
          const grad = c.createRadialGradient(ox, oy, 0, ox, oy, rr);
          grad.addColorStop(0, 'rgba(0,0,0,0.95)'); grad.addColorStop(0.7, 'rgba(0,0,0,0.5)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
          c.fillStyle = grad; c.beginPath(); c.arc(ox, oy, rr, 0, TAU); c.fill();
        }
        c.restore();
        const r2 = r * r;
        for (let cy = 0; cy < grows; cy++) {
          for (let cx = 0; cx < gcols; cx++) {
            const tx = cx * CELL + CELL / 2, ty = cy * CELL + CELL / 2;
            const dx = wrapd(tx - x, W), dy = wrapd(ty - y, H);
            if (dx * dx + dy * dy < r2) food[cy * gcols + cx] = Math.max(food[cy * gcols + cx], rand(0.5, 0.85));
          }
        }
        pulses.push({ x, y, age: 0, life: 1.2, max: r * 1.45 });
        plantTimer = 1;  // force a plant redraw so the flush shows at once
      }

      // ---- agents ---------------------------------------------------------
      function makePrey(x, y, t) {
        t = t || {};
        return {
          x, y, vx: 0, vy: 0, spd: 0, heading: rand(0, TAU), wander: rand(0, TAU),
          energy: t.energy ?? rand(0.45, 0.7), age: 0, maxAge: rand(PREY_AGE[0], PREY_AGE[1]),
          size: MINR, cool: rand(2, 6), fleeing: false,
          col: t.col || pick(PREY_COLORS),               // worn for life, bled in death
          alert: t.alert ?? rand(ALERT[0], ALERT[1]),
          fleeSpeed: t.fleeSpeed ?? rand(FLEE[0], FLEE[1]),
          graze: rand(GRAZE[0], GRAZE[1]),
          accel: rand(PREY_ACCEL[0], PREY_ACCEL[1]),     // its own urgency
        };
      }
      function makePred(x, y, t) {
        t = t || {};
        return {
          x, y, vx: 0, vy: 0, spd: 0, heading: rand(0, TAU), wander: rand(0, TAU),
          energy: t.energy ?? rand(0.6, 0.9), age: t.age ?? 0, maxAge: rand(PRED_AGE[0], PRED_AGE[1]),
          size: PBASE, hunting: false,
          speed: t.speed ?? rand(PRED_SPEED[0], PRED_SPEED[1]),
          accel: t.accel ?? rand(PRED_ACCEL[0], PRED_ACCEL[1]),  // its own build-up
          turn: t.turn ?? rand(PRED_TURN[0], PRED_TURN[1]),      // its own agility
        };
      }

      function updatePrey(dt) {
        const births = [];
        for (let i = prey.length - 1; i >= 0; i--) {
          const p = prey[i];
          // nearest predator (toroidal)
          let nd = Infinity, ndx = 0, ndy = 0;
          for (const h of preds) {
            const dx = wrapd(p.x - h.x, W), dy = wrapd(p.y - h.y, H), d2 = dx * dx + dy * dy;
            if (d2 < nd) { nd = d2; ndx = dx; ndy = dy; }
          }
          const dist = Math.sqrt(nd);
          p.fleeing = dist < p.alert;

          let dvx, dvy, sp;
          if (p.fleeing) {
            const inv = 1 / (dist || 1); dvx = ndx * inv; dvy = ndy * inv; sp = p.fleeSpeed;
          } else {
            p.wander += rand(-1, 1) * 3 * dt;
            // amble, with a gentle pull toward richer grazing nearby
            const gx = foodAt(p.x + CELL, p.y) - foodAt(p.x - CELL, p.y);
            const gy = foodAt(p.x, p.y + CELL) - foodAt(p.x, p.y - CELL);
            let ax = Math.cos(p.wander) + gx * 2.2, ay = Math.sin(p.wander) + gy * 2.2;
            const m = Math.hypot(ax, ay) || 1; dvx = ax / m; dvy = ay / m; sp = p.graze;
          }
          // steer the heading toward the desired direction at a turn rate, then
          // accelerate (fleeing → snap hard up to sprint) or decelerate (safe →
          // coast gently back down to a graze)
          let dh = Math.atan2(dvy, dvx) - p.heading; dh = Math.atan2(Math.sin(dh), Math.cos(dh));
          const tr = p.fleeing ? PREY_TURN_FLEE : PREY_TURN;
          p.heading += clamp(dh, -tr * dt, tr * dt);
          const rate = p.fleeing ? p.accel : PREY_DECEL;
          p.spd += (sp - p.spd) * Math.min(1, rate * dt);
          p.vx = Math.cos(p.heading) * p.spd; p.vy = Math.sin(p.heading) * p.spd;
          p.x = wrapp(p.x + p.vx * dt, W); p.y = wrapp(p.y + p.vy * dt, H);

          // graze the tile underfoot
          const ti = tileIdx(p.x, p.y);
          const bite = Math.min(food[ti], EAT * dt); food[ti] -= bite; p.energy += bite * NUTR;

          // burn, age, grow
          p.energy -= METAB_PREY * (p.fleeing ? FLEE_COST : 1) * (0.7 + p.size / 9) * dt;
          if (p.energy > 1) p.energy = 1;
          p.age += dt; p.cool -= dt;
          p.size = MINR + (MAXR - MINR) * clamp(p.age / SIZE_AGE, 0, 1);

          // death
          if (p.energy <= 0) { paintStarve(p); prey.splice(i, 1); stats.starve++; continue; }
          if (p.age >= p.maxAge) { renew(p.x, p.y, 32 + p.size * 3); prey.splice(i, 1); stats.old++; continue; }

          // breed — each newborn takes a fresh random colour, so the field keeps
          // its full spread of hues instead of one lineage taking over
          if (p.age > PREY_MATURE && p.size >= PREY_BREED_R && p.energy > PREY_REP && p.cool <= 0 && prey.length + births.length < CAP_PREY) {
            births.push(makePrey(p.x + rand(-12, 12), p.y + rand(-12, 12), {
              energy: 0.32,
              alert: clamp(p.alert + rand(-12, 12), ALERT[0] - 6, ALERT[1] + 6),
              fleeSpeed: clamp(p.fleeSpeed + rand(-8, 8), FLEE[0] - 6, FLEE[1] + 6),
            }));
            p.energy -= 0.36; p.cool = rand(12, 18);
          }
        }
        for (const b of births) prey.push(b);
      }

      function updatePreds(dt) {
        const births = [];
        for (let i = preds.length - 1; i >= 0; i--) {
          const h = preds[i];
          // pick a target in sight, preferring prey near its OWN size — a small
          // hunter goes after small prey, a big one after big prey (a size-mismatch
          // counts against a prey like extra distance would)
          let best = Infinity, tgt = -1, ndx = 0, ndy = 0, dist = 0, nearby = 0;
          const D2 = DETECT * DETECT;
          for (let j = 0; j < prey.length; j++) {
            const p = prey[j];
            const dx = wrapd(p.x - h.x, W), dy = wrapd(p.y - h.y, H), d2 = dx * dx + dy * dy;
            if (d2 > D2) continue;
            nearby++;
            const d = Math.sqrt(d2);
            const score = d * (1 + SIZE_W * Math.abs(p.size - h.size) / (h.size + 2));
            if (score < best) { best = score; tgt = j; ndx = dx; ndy = dy; dist = d; }
          }
          // surrounded by prey → much quicker to turn and pursue (the top speed
          // itself stays capped, so the very fastest prey can still get away)
          const aggro = 1 + AGGRO_K * Math.min(1, nearby / AGGRO_REF);
          let dvx, dvy, baseSp;
          if (tgt >= 0) {
            const inv = 1 / (dist || 1); dvx = ndx * inv; dvy = ndy * inv; baseSp = h.speed; h.hunting = true;
          } else {
            h.wander += rand(-1, 1) * 2.4 * dt;
            dvx = Math.cos(h.wander); dvy = Math.sin(h.wander); baseSp = h.speed * CRUISE; h.hunting = false;
          }
          // turn toward the target at its own agility, then accelerate toward top
          // speed — a starving hunter pushes faster (desperate), and it pays in burn.
          const hunger = clamp(1 - h.energy / HREF, 0, 1);
          let dh = Math.atan2(dvy, dvx) - h.heading; dh = Math.atan2(Math.sin(dh), Math.cos(dh));
          h.heading += clamp(dh, -h.turn * aggro * dt, h.turn * aggro * dt);
          h.spd += (baseSp * (1 + STARVE_BOOST * hunger) - h.spd) * Math.min(1, h.accel * aggro * dt);
          h.vx = Math.cos(h.heading) * h.spd; h.vy = Math.sin(h.heading) * h.spd;
          h.x = wrapp(h.x + h.vx * dt, W); h.y = wrapp(h.y + h.vy * dt, H);

          // catch — paint the prey's own colour where it fell
          if (tgt >= 0 && tgt < prey.length) {
            const tp = prey[tgt];
            if (dist < tp.size + h.size * 0.5 + 11) {
              paintKill(tp);
              prey.splice(tgt, 1); stats.kill++;
              h.energy += KILL_GAIN * (tp.size / 7);  // a bigger prey is a bigger meal
            }
          }

          // size tracks accumulated energy (weak = small); energy burns with MOVEMENT
          h.size = clamp(PBASE + h.energy * PGROWK, PBASE, PMAX);
          h.energy -= (BMR + MOVE_K * Math.hypot(h.vx, h.vy)) * dt;
          h.age += dt;

          if (h.energy <= 0) { paintHatch(h.x, h.y, 1); preds.splice(i, 1); stats.predDie++; continue; }
          if (h.age >= h.maxAge) { paintHatch(h.x, h.y, 1.3); preds.splice(i, 1); stats.predDie++; continue; }

          // grow big -> divide in half: the only way new hunters are born
          if (h.energy >= SPLIT_E && preds.length + births.length < CAP_PRED) {
            h.energy *= 0.5;
            const ch = h.heading + rand(0.6, 1.4) * (chance(0.5) ? 1 : -1);
            const kid = makePred(h.x + Math.cos(ch) * 9, h.y + Math.sin(ch) * 9, {
              energy: h.energy, speed: clamp(h.speed + rand(-6, 6), PRED_SPEED[0] - 4, PRED_SPEED[1] + 4), age: 0,
            });
            kid.heading = ch; stats.splits++;
            births.push(kid);
          }
        }
        for (const b of births) preds.push(b);
      }

      // Same-type bodies can't overlap: push any pair closer than their combined
      // radii apart. Prey just bump and crowd; hunters additionally BOUNCE —
      // their velocities reflect off the contact normal, so they ricochet. Hunters
      // and prey are NOT separated — that's how a hunter reaches a prey to take it.
      function separate(arr, bounce) {
        for (let i = 0; i < arr.length; i++) {
          const a = arr[i];
          for (let j = i + 1; j < arr.length; j++) {
            const b = arr[j];
            const dx = wrapd(b.x - a.x, W), dy = wrapd(b.y - a.y, H), d2 = dx * dx + dy * dy;
            const rs = (a.size + b.size) * SEP_K;
            if (d2 < rs * rs && d2 > 1e-4) {
              const d = Math.sqrt(d2), o = (rs - d) * 0.5, nx = dx / d, ny = dy / d;
              a.x = wrapp(a.x - nx * o, W); a.y = wrapp(a.y - ny * o, H);
              b.x = wrapp(b.x + nx * o, W); b.y = wrapp(b.y + ny * o, H);
              if (bounce) {
                const van = a.vx * nx + a.vy * ny;            // a heading into b → reflect
                if (van > 0) { a.vx -= 2 * van * nx; a.vy -= 2 * van * ny; a.heading = Math.atan2(a.vy, a.vx); a.spd = Math.hypot(a.vx, a.vy); }
                const vbn = b.vx * nx + b.vy * ny;            // b heading into a → reflect
                if (vbn < 0) { b.vx -= 2 * vbn * nx; b.vy -= 2 * vbn * ny; b.heading = Math.atan2(b.vy, b.vx); b.spd = Math.hypot(b.vx, b.vy); }
              }
            }
          }
        }
      }

      // immigration floor — a trickle from "off-screen" so neither side dies out
      function immigrate(dt) {
        while (prey.length < MIN_PREY) prey.push(makePrey(rand(0, W), rand(0, H)));
        if (preds.length < MIN_PRED && chance(0.5 * dt)) preds.push(makePred(rand(0, W), rand(0, H)));
      }

      // ---- drawing agents -------------------------------------------------
      function drawAgents() {
        // renewal pulses
        for (let i = pulses.length - 1; i >= 0; i--) {
          const pl = pulses[i]; pl.age += 1 / 60;
          const t = pl.age / pl.life;
          if (t >= 1) { pulses.splice(i, 1); continue; }
          ctx.beginPath(); ctx.arc(pl.x, pl.y, pl.max * t, 0, TAU);
          ctx.strokeStyle = `rgba(150,220,120,${(1 - t) * 0.6})`; ctx.lineWidth = 2.5; ctx.stroke();
          ctx.beginPath(); ctx.arc(pl.x, pl.y, pl.max * t * 0.68, 0, TAU);
          ctx.strokeStyle = `rgba(224,255,184,${(1 - t) * 0.4})`; ctx.lineWidth = 1.2; ctx.stroke();
        }
        // prey — vibrant cells in their own colour; a fleeing one trails a streak
        // (a clear, motion-driven cue, not a mysterious ring)
        for (const p of prey) {
          // a starving prey SHRINKS (toward 40% of its grown size) — it stays solid,
          // never fades. Its grown size still governs the stain it will leave.
          const r = p.size * clamp(0.4 + 0.6 * p.energy, 0.4, 1), [cr, cg, cb] = p.col;
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.heading);
          const spd = Math.hypot(p.vx, p.vy);
          if (p.fleeing && spd > 40) {                         // a darting streak behind it
            const len = clamp(spd / 5, 9, 34);
            const g = ctx.createLinearGradient(0, 0, -len, 0);
            g.addColorStop(0, `rgba(${cr},${cg},${cb},0.5)`);
            g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.moveTo(0, -r * 0.7); ctx.lineTo(-len, 0); ctx.lineTo(0, r * 0.7); ctx.closePath(); ctx.fill();
          }
          ctx.fillStyle = `rgba(${cr},${cg},${cb},0.92)`;
          ctx.beginPath(); ctx.ellipse(0, 0, r * 1.3, r, 0, 0, TAU); ctx.fill();
          ctx.strokeStyle = `rgba(${cr * 0.38 | 0},${cg * 0.38 | 0},${cb * 0.38 | 0},0.88)`; ctx.lineWidth = 1.3; ctx.stroke();
          ctx.restore();
        }
        // hunters — drawn like a mouse cursor: a filled triangle with a stem,
        // always opaque; a weak one is simply SMALLER. Glints gold before it splits.
        for (const h of preds) {
          const r = h.size, L = r * 3.0;
          ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(h.heading);
          ctx.lineCap = 'round'; ctx.lineJoin = 'round';
          // stem
          ctx.strokeStyle = 'rgba(16,14,12,0.96)'; ctx.lineWidth = clamp(r * 0.5, 1.5, 4);
          ctx.beginPath(); ctx.moveTo(-L * 0.55, 0); ctx.lineTo(L * 0.08, 0); ctx.stroke();
          // filled triangle head (the pointer)
          ctx.fillStyle = 'rgba(16,14,12,0.96)';
          ctx.beginPath();
          ctx.moveTo(L * 0.5, 0); ctx.lineTo(-L * 0.12, -r * 1.05); ctx.lineTo(-L * 0.12, r * 1.05); ctx.closePath();
          ctx.fill();
          if (h.energy > SPLIT_E * 0.8) {                                                       // about to divide
            ctx.strokeStyle = 'rgba(248,240,214,0.85)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(-L * 0.55, 0); ctx.lineTo(L * 0.08, 0); ctx.stroke();
          }
          ctx.restore();
        }
      }

      // ---- frame ----------------------------------------------------------
      function frame(t) {
        const dt = Math.min(0.05, (t - last) / 1000 || 0);
        last = t;
        if (dt > 0) fps = fps * 0.9 + (1 / dt) * 0.1;

        stepPlants(dt);
        updatePrey(dt);
        updatePreds(dt);
        separate(prey, false); separate(preds, true);
        immigrate(dt);

        growSeeps(dt);                 // stains bloom outward over time

        plantTimer -= dt;
        if (plantTimer <= 0) { drawPlants(); plantTimer = 0.04; }

        compose(soilL);
        compose(plantL);
        compose(marksL);
        drawAgents();

        if (debug) {
          let fsum = 0; for (let i = 0; i < food.length; i++) fsum += food[i];
          debugEl.textContent =
            `prey     ${prey.length}\n` +
            `hunters  ${preds.length}\n` +
            `plants   ${(fsum / food.length * 100).toFixed(0)}% cover\n` +
            `growth   ${PLANT_GROWTH.toFixed(2)}  [g/G]\n` +
            `prop     ${PLANT_PROP.toFixed(2)}  [p/P]\n` +
            `died  starve ${stats.starve}  killed ${stats.kill}  old ${stats.old}  hunter ${stats.predDie}\n` +
            `splits   ${stats.splits}\n` +
            `fps      ${fps.toFixed(0)}`;
        }
        requestAnimationFrame(frame);
      }

      // ---- seeding & input ------------------------------------------------
      function reset() {
        soilTint = SOILS[setIndex % SOILS.length];
        flowers = FLOWER_SETS[setIndex % FLOWER_SETS.length];
        for (let i = 0; i < food.length; i++) food[i] = chance(0.28) ? rand(0.15, 0.7) : 0;
        decay.fill(0);
        plantL.ctx.clearRect(0, 0, W, H);
        plantCursor = 0;
        prey = []; preds = []; pulses = []; seeps = [];
        for (let i = 0; i < PREY0; i++) prey.push(makePrey(rand(0, W), rand(0, H)));
        for (let i = 0; i < PRED0; i++) preds.push(makePred(rand(0, W), rand(0, H)));
        stats.starve = stats.kill = stats.old = stats.predDie = stats.splits = 0;
        paintSoil();
        marksL.ctx.clearRect(0, 0, W, H);
        plantTimer = 0;
      }

      addEventListener('click', () => { setIndex++; reset(); });
      addEventListener('keydown', (e) => {
        const k = e.key;
        if (k === 'g') PLANT_GROWTH = Math.max(0.05, +(PLANT_GROWTH - 0.05).toFixed(2));
        else if (k === 'G') PLANT_GROWTH = Math.min(3, +(PLANT_GROWTH + 0.05).toFixed(2));
        else if (k === 'p') PLANT_PROP = Math.max(0, +(PLANT_PROP - 0.05).toFixed(2));
        else if (k === 'P') PLANT_PROP = Math.min(5, +(PLANT_PROP + 0.05).toFixed(2));
      });
      addEventListener('resize', () => { resize(); reset(); if (WARM > 0) warmUp(WARM); });

      // Fast-forward the simulation without drawing, so the field opens already
      // alive — a settled herd, hunting hunters, a canvas with some history on it
      // — instead of a sparse cold start. ?warm=120 warms by 120 seconds.
      function warmUp(seconds) {
        const wdt = 1 / 30;
        for (let s = 0, n = (seconds / wdt) | 0; s < n; s++) {
          stepPlants(wdt); updatePrey(wdt); updatePreds(wdt); separate(prey, false); separate(preds, true); immigrate(wdt); growSeeps(wdt);
        }
        pulses.length = 0; flushSeeps(); drawPlants(plantPixCols * plantPixRows); plantTimer = 0.1;  // full paint, opens settled
      }

      // ---- boot -----------------------------------------------------------
      (function boot() {
        const q = new URLSearchParams(location.search);
        if (q.has('growth')) PLANT_GROWTH = Math.max(0.05, +q.get('growth') || PLANT_GROWTH);
        if (q.has('prop')) PLANT_PROP = Math.max(0, +q.get('prop') || PLANT_PROP);
        if (debug) debugEl.style.display = 'block';
        resize();
        reset();
        WARM = Math.min(600, +q.get('warm') || 0);
        if (WARM > 0) warmUp(WARM);
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
