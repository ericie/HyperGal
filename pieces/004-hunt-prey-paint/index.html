    <canvas id="stage"></canvas>
    <div class="caption">hunt prey paint · 2026 · an ecosystem paints itself · click to reseed</div>
    <pre id="debug"></pre>
    <script>
      // hunt prey paint — an abstract ecosystem that paints itself, and then
      // wipes the painting clean, forever.
      //
      // Three layers share one toroidal field (it wraps at every edge, so there
      // are no corners to win or die in):
      //
      //   PLANTS  — the food. A top-down pixel field: each tile's density tracks
      //             biomass, blooms into little 8-bit signal sparks, and regrows
      //             after grazing.
      //   PREY    — blocky pixel grazers. They eat plants, grow larger with age,
      //             and flee predators. Every prey is born with its own ALERTNESS
      //             (how far off it spots a hunter) and SPRINT SPEED. Sprinting
      //             outruns a predator but burns energy fast — so a hounded prey
      //             can run itself to starvation.
      //   HUNTERS — angular vector predators. They chase the nearest prey they
      //             can see and eat it on contact.
      //
      // Death paints the canvas, in watercolour that seeps in and slowly soaks away:
      //   · a prey that is KILLED leaves a body that the hunters PECK apart, a
      //     watercolour bloodstain blooming in its colour as they feed.
      //   · a STARVING animal spins down — slows, stops, circles tight and shrinks
      //     to nothing; a starved small prey fertilises a patch of DEAD plants.
      //   · a hunter that dies leaves a crosshatch mark.
      //   · a spiny prey ages steadily toward white; when death finally takes it,
      //     it bursts, wipes bloodstains, food, foliage, and nearby husks.
      //   · big prey are immune to hunters and trundle toward richer plant patches.
      //
      // Populations are floored (a trickle of immigration if either side crashes)
      // and capped, so neither hunters nor prey can ever fully win: the system is
      // pinned into a perpetual, oscillating balance. The painting fills with the
      // marks of the hunt and is endlessly cleansed by the old — rebirth, balance,
      // and no end.

      const canvas = document.getElementById('stage');
      const ctx = canvas.getContext('2d');
      const debugEl = document.getElementById('debug');
      const TAU = Math.PI * 2;

      // ---- tunables -------------------------------------------------------
      // These defaults were found with a headless balance harness (long runs
      // scored for coexistence): predators must be faster than most prey so tail-
      // chases can land, yet the fastest prey still escape — and a hunter only
      // breeds by eating enough to grow fat and SPLIT in half, so the predator
      // line tracks the food supply. Floors and caps then hold both species in a
      // perpetual, marked, self-cleansing balance.

      // plants
      let PLANT_GROWTH = 0.24;   // logistic regrow rate (the "growth" dial)
      let PLANT_PROP   = 0.46;   // lush tiles seeding neighbours — patches fill into dense clusters
      const SPONT = 0.0016;      // RARE pioneers — each seeds a CLUSTER that grows & blooms in a burst, not a uniform lawn
      const SENESCE = 0.12;      // a bloomed tile flowers out and dies back fast — patches stay distinct, bursts move on
      const EAT = 3.60;          // prey graze HARD — a herd mows a patch to bare ground fast
      const NUTR = 0.85;         // energy gained per unit of food eaten (well-fed grazers)

      // prey
      const PREY0 = 40, MIN_PREY = 40, CAP_PREY = 340;
      const PREY_AGE = [46, 82];     // lifespan range (seconds)
      const PREY_MATURE = 16;        // can reproduce after this age
      const SIZE_AGE = 100;          // grows VERY slowly — only the rare, long-lived survivor turns giant
      const MINR = 3.5, MAXR = 22;   // body radius, young -> old (giants)
      const METAB_PREY = 0.055;      // idle energy burn per second
      const FLEE_COST = 4.2;         // sprinting multiplies the burn this much
      const ALERT = [70, 165];       // per-prey predator-detection radius — more warning against fast hunters
      const FLEE = [175, 265];       // overlaps hunter speed — the fastest prey escape, the slowest get taken
      const GRAZE = [16, 30];        // per-prey amble speed while feeding
      const PREY_ACCEL = [12, 22];   // per-prey: how hard it snaps up to sprint speed (fast)
      const PREY_TURN = 3.0, PREY_TURN_FLEE = 13; // rad/s steering; whips around when fleeing
      const PREY_DECEL = 2.5;        // how gently it coasts back down when safe
      const PREY_REP = 0.84;         // energy needed to breed
      const PREY_BREED_R = 10;       // must be visibly grown before breeding
      const IMMUNE_RATIO = 2.0;      // a prey bigger than (hunter size × this) can't be taken
      const GIANT_SEEK_DIRS = 12;     // a spiny prey samples this many directions for rich plant patches
      const GIANT_SEEK_NEAR = 3.0;    // nearby plant-sensing radius, in CELLs
      const GIANT_SEEK_FAR = 6.5;     // far plant-sensing radius, in CELLs

      // predators — they GROW by eating and SPLIT in half when fat (mitosis), and
      // burn energy by MOVING: a starving hunter sprints faster but spends faster.
      const PRED0 = 8, MIN_PRED = 4, CAP_PRED = 22;
      const PRED_AGE = [60, 96];     // hunters die of old age too
      // hidden hunter temperaments: quick snaps on hard but tires; fast has the
      // higher ceiling but needs more runway before it bites.
      const PRED_TYPES = {
        quick: { speed: [188, 218], accel: [10.0, 15.0], turn: [6.8, 10.2], sustain: 1.05, tired: 0.64, cruise: 0.72, moveBurn: 1.12 },
        fast:  { speed: [236, 286], accel: [2.6, 4.6],  turn: [3.2, 5.2],  sustain: 3.4,  tired: 0.92, cruise: 0.84, moveBurn: 1.00 },
        // APEX super-predator: faster AND snappier than either, a lone killer that
        // scorns carrion — it eats only what it drops itself
        apex:  { speed: [305, 360], accel: [16.0, 22.0], turn: [6.0, 9.0],  sustain: 4.6,  tired: 0.96, cruise: 0.86, moveBurn: 1.16 },
      };
      const PRED_TYPE_NAMES = ['quick', 'fast'];   // split-mutation pool — apex only arrives fresh, stays rare
      const APEX_CHANCE = 0.06;                     // odds a newly-spawned hunter is an apex
      const DETECT = 190;            // how far a predator sees prey
      const PRED_LEAD = 0.34;        // seconds of target-leading; enough to bite, not enough to feel guided
      const STRIKE_PAD = 5;          // post-move bite forgiveness so fast hunters don't visibly whiff
      const AGGRO_K = 1.0;           // prey-swarm aggression: up to this much extra turn/accel
      const AGGRO_REF = 12;          // a 'lot of prey' = this many in sight
      const BMR = 0.008;             // basal burn per second (standing still)
      const MOVE_K = 0.00013;        // cheaper still, to offset the higher top speed — a fast hunter must net positive
      const STARVE_SLOW = 0.12;      // a near-empty hunter slows to this fraction of speed, then stalls
      const HREF = 0.4;              // stays at FULL speed until energy drops below ~0.35, then ramps down
      const CHASE_MAX = 3.5;         // seconds of fruitless pursuit before it breaks off and cruises
      const FEED_MAX = 7;            // seconds it will fuss over one body before losing interest and moving on
      const PLENTY = 3;              // this many live prey in sight = don't stoop to STALE carrion, go make a fresh kill
      const FRESH = 3.0;             // ...though it will always finish a kill this fresh (usually its own)
      const KILL_GAIN = 0.90;        // total food a corpse holds, ×(prey size / 7) — torn off peck by peck
      const SIZE_W = 0.8;            // mild preference for prey near its own size (not so picky it starves)
      const SPLIT_E = 1.9;           // energy at which a fat hunter divides in two
      const PBASE = 3.0, PGROWK = 2.8, PMAX = 8;  // size = PBASE + energy*PGROWK; small darts
      const SEP_K = 1.15;            // same-type bodies push apart at this × their radii
      const DYING_DUR = 1.4;         // seconds a starving animal spends spinning down to nothing
      const PECK_BITE = 0.15;        // energy a hunter tears off a corpse per peck (small bites = longer meal)
      const GIANT_SIZE = 17;         // a prey this big is a 'giant' — spiny, immune, and pops when it dies
      const CORPSE_LIFE = 16, HUSK_LIFE = 6; // a body lingers, then a spent husk fades over seconds

      // palettes
      const SOILS = ['#ddd6c4', '#d1d6c9', '#e4ddc8', '#d5ccb9', '#d9d9c7'];   // cartridge-plastic paper tones
      // NES-bright prey colours — each prey wears one, and bleeds in it
      const PREY_COLORS = [
        [232, 48, 56], [0, 168, 232], [248, 184, 0], [64, 184, 80],
        [112, 80, 216], [248, 112, 40], [40, 80, 200], [224, 224, 192],
      ];
      const FLOWER_SETS = [   // little 8-bit signal sparks, not botanical decoration
        ['#e83038', '#f8b800', '#00a8e8'],
        ['#7050d8', '#40b850', '#f87028'],
        ['#2850c8', '#f8b800', '#e83038'],
        ['#00a8e8', '#e0e0c0', '#7050d8'],
      ];
      const ASH = [[58, 48, 40], [44, 36, 30]];

      // ---- state ----------------------------------------------------------
      let W = 0, H = 0, dpr = 1;
      let CELL = 20, gcols = 0, grows = 0;
      let food = new Float32Array(0);
      let decay = new Float32Array(0);    // transient wilt timer per tile
      // coarse 'where is the blood, and what colour' grid — cheap to sample, so a
      // hunter only trails when it stands IN blood, in that blood's own colour
      const BCELL = 16; let bgW = 0, bgH = 0, bA = new Float32Array(0), bR = new Uint8Array(0), bG = new Uint8Array(0), bB = new Uint8Array(0);
      let soilL, plantL, cartoL, marksL;  // offscreen layers
      let prey = [], preds = [], pulses = [], corpses = [], oldBursts = [], erasers = [];
      let soilTint = SOILS[0], flowers = FLOWER_SETS[0], flowerRGBs = FLOWER_SETS[0].map(hexRgb);
      let setIndex = 0;
      let last = 0, fps = 0, plantTimer = 0, WARM = 0, warming = false;
      let plantPixCols = 0, plantPixRows = 0, plantCursor = 0, plantStride = 1;
      const stats = { starve: 0, kill: 0, old: 0, predDie: 0, splits: 0 };
      const debug = new URLSearchParams(location.search).has('debug');

      // ---- helpers --------------------------------------------------------
      const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
      const rand = (a, b) => a + Math.random() * (b - a);
      const chance = (p) => Math.random() < p;
      const pick = (a) => a[(Math.random() * a.length) | 0];
      const wrapd = (d, s) => d > s * 0.5 ? d - s : d < -s * 0.5 ? d + s : d;  // toroidal delta
      const wrapp = (p, s) => { p %= s; return p < 0 ? p + s : p; };
      const tileIdx = (x, y) => ((wrapp(y, H) / CELL) | 0) * gcols + ((wrapp(x, W) / CELL) | 0);
      const foodAt = (x, y) => food[tileIdx(x, y)];
      function hash(i) { let h = i * 374761393 + 668265263; h = (h ^ (h >> 13)) * 1274126177; return ((h ^ (h >> 16)) >>> 0) / 4294967295; }
      function shade(hex, d) { const n = parseInt(hex.slice(1), 16); const cl = (v) => v < 0 ? 0 : v > 255 ? 255 : v | 0; return `rgb(${cl((n >> 16) + d)},${cl(((n >> 8) & 255) + d)},${cl((n & 255) + d)})`; }
      function hexRgb(hex) { const n = parseInt(hex.slice(1), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }
      const mix = (a, b, t) => [a[0] * (1 - t) + b[0] * t | 0, a[1] * (1 - t) + b[1] * t | 0, a[2] * (1 - t) + b[2] * t | 0];
      const sat = (c, s) => { const m = (c[0] + c[1] + c[2]) / 3; return [clamp(m + (c[0] - m) * s, 0, 255) | 0, clamp(m + (c[1] - m) * s, 0, 255) | 0, clamp(m + (c[2] - m) * s, 0, 255) | 0]; };
      const deepen = (c) => { const s = sat(c, 1.5); return [s[0] * 0.92 | 0, s[1] * 0.84 | 0, s[2] * 0.84 | 0]; };  // vivid, slightly deep stain
      const pale = (c) => mix(sat(c, 1.1), [228, 218, 198], 0.55);                    // washed, bone-ward
      const rgba = (c, a) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`;

      // ---- layers / sizing ------------------------------------------------
      function makeLayer() {
        const c = document.createElement('canvas');
        c.width = W * dpr; c.height = H * dpr;
        const x = c.getContext('2d');
        x.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { canvas: c, ctx: x };
      }

      function resize() {
        W = innerWidth; H = innerHeight; dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        CELL = Math.max(10, Math.round(Math.min(W, H) / 64));   // denser tiles -> finer, city-like clusters
        gcols = Math.ceil(W / CELL); grows = Math.ceil(H / CELL);
        food = new Float32Array(gcols * grows);
        decay = new Float32Array(gcols * grows);
        bgW = Math.ceil(W / BCELL); bgH = Math.ceil(H / BCELL);
        bA = new Float32Array(bgW * bgH); bR = new Uint8Array(bgW * bgH); bG = new Uint8Array(bgW * bgH); bB = new Uint8Array(bgW * bgH);

        soilL = makeLayer(); plantL = makeLayer(); cartoL = makeLayer(); marksL = makeLayer();
        configurePlantPixels();
      }

      function paintSoil() {
        const c = soilL.ctx;
        c.fillStyle = soilTint; c.fillRect(0, 0, W, H);
        // sparse two-tone speckle so the ground reads as material, not a flat fill
        for (let i = 0; i < (W * H) / 900; i++) {
          c.fillStyle = chance(0.5) ? 'rgba(30,28,24,0.08)' : 'rgba(255,248,220,0.18)';
          const s = rand(1, 2.4);
          c.fillRect(rand(0, W), rand(0, H), s, s);
        }
      }

      function paintCartography() {
        const c = cartoL.ctx, u = Math.max(18, Math.round(Math.min(W, H) / 42));
        c.clearRect(0, 0, W, H);
        c.save();
        c.lineCap = 'square';
        c.lineJoin = 'miter';

        // ghost grid: broken survey marks beneath the ecosystem.
        c.strokeStyle = 'rgba(18,16,14,0.075)';
        c.lineWidth = 1;
        for (let x = (setIndex % 5) * 3; x < W; x += u) {
          if (chance(0.72)) { c.beginPath(); c.moveTo(x, rand(0, H * 0.25)); c.lineTo(x + rand(-2, 2), rand(H * 0.72, H)); c.stroke(); }
        }
        for (let y = (setIndex % 7) * 2; y < H; y += u) {
          if (chance(0.62)) { c.beginPath(); c.moveTo(rand(0, W * 0.2), y); c.lineTo(rand(W * 0.75, W), y + rand(-2, 2)); c.stroke(); }
        }

        const accents = [[232, 48, 56], [0, 168, 232], [248, 184, 0], [64, 184, 80], [112, 80, 216]];
        for (let i = 0; i < 46; i++) {
          const col = pick(accents), hot = chance(0.38);
          c.strokeStyle = hot ? `rgba(${col[0]},${col[1]},${col[2]},0.24)` : 'rgba(18,16,14,0.19)';
          c.lineWidth = hot ? 1.2 : 0.85;
          c.setLineDash(chance(0.35) ? [u * 0.24, u * 0.16] : []);
          let x = Math.round(rand(-2, W + 2) / u) * u + rand(-3, 3);
          let y = Math.round(rand(-2, H + 2) / u) * u + rand(-3, 3);
          c.beginPath(); c.moveTo(x, y);
          const turns = 3 + (Math.random() * 4 | 0);
          for (let k = 0; k < turns; k++) {
            if (chance(0.5)) x += rand(-4, 5) * u * 0.55;
            else y += rand(-4, 5) * u * 0.55;
            c.lineTo(x + rand(-4, 4), y + rand(-4, 4));
          }
          c.stroke();
        }
        c.setLineDash([]);

        for (let i = 0; i < 28; i++) {
          const x = rand(0, W), y = rand(0, H), r = rand(u * 1.2, u * 5.5), a = rand(0, TAU);
          c.strokeStyle = chance(0.45) ? 'rgba(18,16,14,0.15)' : 'rgba(0,168,232,0.18)';
          c.lineWidth = rand(0.7, 1.4);
          c.beginPath(); c.arc(x, y, r, a, a + rand(0.4, 1.5)); c.stroke();
          if (chance(0.35)) {
            c.fillStyle = 'rgba(18,16,14,0.16)';
            c.fillRect(Math.round(x / 2) * 2 - 1, Math.round(y / 2) * 2 - 1, 3, 3);
          }
        }
        c.restore();
      }

      function compose(layer) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.drawImage(layer.canvas, 0, 0);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      // ---- plants ---------------------------------------------------------
      // a pioneer doesn't sprout one tile — it lays down a small dense CLUSTER, so
      // growth reads as patches springing up around the world, like blocks from above
      function seedCluster(cx, cy) {
        const rad = 1 + (Math.random() * 2 | 0), reach = rad * 2 + 1, n = reach * reach;
        for (let k = 0; k < n; k++) {
          const nx = cx + (Math.random() * reach | 0) - rad, ny = cy + (Math.random() * reach | 0) - rad;
          if (nx >= 0 && ny >= 0 && nx < gcols && ny < grows) { const j = ny * gcols + nx; if (food[j] < 0.1) food[j] = rand(0.1, 0.2); }
        }
      }
      function stepPlants(dt) {
        for (let i = 0; i < food.length; i++) {
          let f = food[i];
          if (f > 0.001) f += PLANT_GROWTH * f * (1 - f) * dt;        // logistic growth
          if (decay[i] > 0) decay[i] -= dt;                          // wilt mark fading
          if (f < 0.05) { if (chance(SPONT * dt)) seedCluster(i % gcols, (i / gcols) | 0); }   // a pioneer drops a cluster
          else if (f > 0.9 && chance(SENESCE * dt)) { f = 0.4; decay[i] = 0.9; } // flowers out, dies back partway
          else if (f > 0.5 && chance(PLANT_PROP * dt)) {             // lush tile spreads
            const cx = i % gcols, cy = (i / gcols) | 0;
            const nx = cx + ((Math.random() * 3) | 0) - 1, ny = cy + ((Math.random() * 3) | 0) - 1;
            if (nx >= 0 && ny >= 0 && nx < gcols && ny < grows) {
              const j = ny * gcols + nx; if (food[j] < 0.1) food[j] = 0.1;
            }
          }
          food[i] = f;
        }
      }

      // Plants are a quiet, distributed pixel terrain — a low-contrast dither over
      // the cartridge-paper field whose DENSITY (not loud colour) tracks biomass.
      // Biomass is sampled bilinearly across tiles (no blocky tile edges) and
      // dithered onto a fine pixel grid; wilting tiles tint faintly browner.
      const PXS = 2;                                         // one terrain pixel (finer = less chunky)
      const PLANT_PIXEL_BUDGET = 1400;                       // incremental pixels per paint pass
      const T_SAND = [218, 213, 196];                        // cartridge-paper the green grows from
      const T_WILT = [150, 145, 136];              // wilt = a darker, drabber grey
      // greens vary smoothly between these two over a low-frequency noise field, so
      // dark and light greens flow into one another instead of tiling into blocks
      // The groundcover drifts slowly through a ring of muted TONES (never green,
      // never loud) so the field keeps turning over instead of filling to one grey.
      const FOLIAGE_TONES = [
        [[96, 98, 94],  [170, 170, 163]],   // neutral grey
        [[104, 96, 84], [178, 166, 144]],   // warm sepia-grey
        [[84, 96, 104],  [148, 166, 178]],  // cool slate-grey
        [[98, 104, 86], [166, 174, 138]],   // drab olive-grey
        [[104, 90, 100], [174, 154, 168]],  // dusty mauve-grey
      ];
      const TONE_PERIOD = 26;   // seconds spent easing from one tone to the next
      let tonePhase = 0, gDark = FOLIAGE_TONES[0][0], gLight = FOLIAGE_TONES[0][1];
      function advanceTone(dt) {
        tonePhase += dt / TONE_PERIOD;
        const N = FOLIAGE_TONES.length, base = Math.floor(tonePhase), fr = tonePhase - base;
        const i = ((base % N) + N) % N, j = (i + 1) % N, e = fr * fr * (3 - 2 * fr);
        gDark = mix(FOLIAGE_TONES[i][0], FOLIAGE_TONES[j][0], e);
        gLight = mix(FOLIAGE_TONES[i][1], FOLIAGE_TONES[j][1], e);
      }
      const wrapTile = (cx, cy) => (((cy % grows) + grows) % grows) * gcols + (((cx % gcols) + gcols) % gcols);
      function gcd(a, b) { while (b) { const t = b; b = a % b; a = t; } return Math.abs(a); }
      function configurePlantPixels() {
        plantPixCols = Math.ceil(W / PXS);
        plantPixRows = Math.ceil(H / PXS);
        const total = Math.max(1, plantPixCols * plantPixRows);
        plantStride = Math.max(1, ((total * 0.61803398875) | 0) | 1);
        while (gcd(plantStride, total) !== 1) plantStride += 2;
        plantCursor = 0;
      }
      function fieldAt(arr, x, y) {                          // bilinear sample over the tile grid
        const gx = x / CELL - 0.5, gy = y / CELL - 0.5;
        const x0 = Math.floor(gx), y0 = Math.floor(gy), fx = gx - x0, fy = gy - y0;
        const a = arr[wrapTile(x0, y0)], b = arr[wrapTile(x0 + 1, y0)], c = arr[wrapTile(x0, y0 + 1)], d = arr[wrapTile(x0 + 1, y0 + 1)];
        return (a + (b - a) * fx) * (1 - fy) + (c + (d - c) * fx) * fy;
      }
      function noiseAt(x, y, S, salt) {                      // smooth value noise in [0,1]
        const gx = x / S, gy = y / S, x0 = Math.floor(gx), y0 = Math.floor(gy);
        const fx = gx - x0, fy = gy - y0, sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
        const hv = (a, b) => hash(((a * 8191) ^ (b * 131071) ^ salt) >>> 0);
        const h00 = hv(x0, y0), h10 = hv(x0 + 1, y0), h01 = hv(x0, y0 + 1), h11 = hv(x0 + 1, y0 + 1);
        return (h00 + (h10 - h00) * sx) * (1 - sy) + (h01 + (h11 - h01) * sx) * sy;
      }
      const tintAt = (x, y) => noiseAt(x, y, 70, 0);          // broad light/dark drift
      const clumpAt = (x, y) => noiseAt(x, y, 8, 0x5bf03635);  // small-scale LEAF CLUMPS
      function drawPlantPixel(c, px, py) {
        c.clearRect(px, py, PXS, PXS);
        const cxp = px + PXS * 0.5, cyp = py + PXS * 0.5;
        const f = fieldAt(food, cxp, cyp);
        if (f < 0.06) return;
        // FOLIAGE: a smooth small-scale clump field decides where leaves sit, with a

        const cl = clumpAt(cxp, cyp) * 0.82 + hash((px * 73856093) ^ (py * 19349663) >>> 0) * 0.18;

      // Prey drag the groundcover with them: a slug of the plant layer is copied

      // ---- marks (painterly watercolour, persistent) ----------------------

      // out from the centre it sits. The stain doesn't appear whole — it SEEPS:
      // each frame we paint the primitives whose radius the spreading edge has
      // reached, so the pool blooms outward over a second or so. Texture comes

      // line a watercolour pool leaves as it dries), and a gritty dirty-xerox
      // stipple. The colour is the dying creature's own.
      const WHITE = [244, 240, 232];   // a starved prey bleeds white
      const OLD_WHITE = [248, 246, 240];
      let seeps = [];
      const gauss = () => (Math.random() + Math.random() + Math.random() + Math.random() - 2) * 0.72;

      function deformPoly(pts, depth, variance, rough) {

      function genWatercolor(x, y, rgb, scale, o) {

      function plotEventScaffold(x, y, r, rgb) {
        const c = marksL.ctx;
        c.save();
        c.lineCap = 'square';
        c.lineJoin = 'miter';
        for (let i = 0; i < 8; i++) {
          const a = rand(0, TAU), inner = rand(r * 0.12, r * 0.38), outer = rand(r * 0.65, r * 1.45);
          const sx = x + Math.cos(a) * inner, sy = y + Math.sin(a) * inner;
          const mx = x + Math.cos(a) * outer, my = y + Math.sin(a) * outer;
          const jog = rand(r * 0.14, r * 0.42) * (chance(0.5) ? 1 : -1);
          c.strokeStyle = chance(0.45) ? rgba(rgb, 0.24) : 'rgba(16,14,12,0.22)';
          c.lineWidth = chance(0.25) ? 1.6 : 0.9;

          c.moveTo(sx, sy);

          c.fillRect(Math.round(px / 2) * 2, Math.round(py / 2) * 2, s, s);
        }
        c.restore();
      }

      function traceMotionTiles(ax, ay, bx, by, rgb, size) {
        const dx = bx - ax, dy = by - ay, d2 = dx * dx + dy * dy;
        if (d2 <= 4 || d2 > 6400) return;
        const c = marksL.ctx, n = clamp(Math.ceil(Math.sqrt(d2) / 10), 1, 6), s = clamp(size * 0.22, 1.4, 4.2);
        c.save();
        c.fillStyle = rgba(rgb, 0.22);
        c.strokeStyle = 'rgba(16,14,12,0.08)';
        c.lineWidth = 1;
        for (let i = 0; i < n; i++) {
          const t = (i + Math.random()) / n;

          const py = Math.round((ay + dy * t + rand(-3, 3)) / 2) * 2;

          if (chance(0.28)) c.strokeRect(px - s, py - s, s * 2, s * 2);

      }

      function traceHunterVector(ax, ay, bx, by, hot) {
        const dx = bx - ax, dy = by - ay, d2 = dx * dx + dy * dy;
        if (!hot || d2 <= 16 || d2 > 6400 || !chance(0.42)) return;
        const c = marksL.ctx;
        c.save();
        c.strokeStyle = 'rgba(16,14,12,0.18)';
        c.lineWidth = 1;
        c.lineCap = 'square';
        c.setLineDash(chance(0.5) ? [5, 4] : []);
        c.beginPath();
        c.moveTo(ax, ay);
        c.lineTo(bx, by);
        c.stroke();
        c.restore();
      }

      function paintStain(x, y, rgb, scale, o) {
        seeps.push(genWatercolor(x, y, rgb, scale, o));

        stampBlood(x, y, rr * 1.15, rgb, clamp(o.wash * o.layers, 0.12, 1));

      function growSeeps(dt) {
        const c = marksL.ctx;

      function spinyAgeProgress(p) {

      function preyDisplayColor(p, dprog) {

        if (p.dying && giant) {

      }

      function preyGlyphBlocks(glyph, giant) {
        if (giant) {
          const b = [[-2, -2, 4, 4], [-3, -1, 1, 2], [2, -1, 1, 2], [-1, -3, 2, 1], [-1, 2, 2, 1], [-4, 0, 1, 1], [3, 0, 1, 1], [0, -4, 1, 1], [0, 3, 1, 1]];
          if (glyph[0]) b.push([-3, -3, 1, 1]); if (glyph[1]) b.push([2, -3, 1, 1]);
          if (glyph[2]) b.push([-3, 2, 1, 1]); if (glyph[3]) b.push([2, 2, 1, 1]);

        const b = [[-1, -1, 2, 2], [-2, -1, 1, 2], [1, -1, 1, 2], [-1, -2, 2, 1], [-1, 1, 2, 1]];
        if (glyph[0]) b.push([-2, -2, 1, 1]); if (glyph[1]) b.push([1, -2, 1, 1]);
        if (glyph[2]) b.push([-2, 1, 1, 1]); if (glyph[3]) b.push([1, 1, 1, 1]);
        if (glyph[4]) b.push([-3, 0, 1, 1]); if (glyph[5]) b.push([2, 0, 1, 1]);
        return b;

      // A soft lumpy outline from per-point radial multipliers, smoothed through
      // its own midpoints — organic, never faceted.
      function blobPath(c, r, blob, sx) {

      function drawPreyGlyph(c, r, glyph, rgb, alpha, giant) {

        const u = Math.max(1.8, r * (apex ? 0.68 : 0.5));

        const c = marksL.ctx;
        c.save();
        c.globalCompositeOperation = 'destination-out';
        for (let k = 0; k < 3; k++) {
          const ox = x + rand(-r * 0.3, r * 0.3), oy = y + rand(-r * 0.3, r * 0.3), rr = r * rand(0.7, 1.1);
          const grad = c.createRadialGradient(ox, oy, 0, ox, oy, rr);
          grad.addColorStop(0, 'rgba(0,0,0,0.95)'); grad.addColorStop(0.7, 'rgba(0,0,0,0.5)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
          c.fillStyle = grad; c.beginPath(); c.arc(ox, oy, rr, 0, TAU); c.fill();
        }
        c.restore();
        const r2 = r * r;
        for (let cy = 0; cy < grows; cy++) {
          for (let cx = 0; cx < gcols; cx++) {
            const tx = cx * CELL + CELL / 2, ty = cy * CELL + CELL / 2;
            const dx = wrapd(tx - x, W), dy = wrapd(ty - y, H);
            if (dx * dx + dy * dy < r2) food[cy * gcols + cx] = Math.max(food[cy * gcols + cx], rand(0.5, 0.85));
          }
        }
        clearBlood(x, y, r);
        pulses.push({ x, y, age: 0, life: 1.2, max: r * 1.45 });
        plantTimer = 1;  // force a plant redraw so the flush shows at once
      }

      // Where a prey starves, its body fertilises the ground: a patch fills in fast
      // with DEAD plants (brown), which green up as the wilt fades — death feeding
      // the next growth.
      function fertilize(x, y, rad) {
        const r = rad || (24 + rand(0, 9)), r2 = r * r;
        for (let cy = 0; cy < grows; cy++) {
          for (let cx = 0; cx < gcols; cx++) {
            const tx = cx * CELL + CELL / 2, ty = cy * CELL + CELL / 2;
            const dx = wrapd(tx - x, W), dy = wrapd(ty - y, H);
            if (dx * dx + dy * dy < r2) { const i = cy * gcols + cx; food[i] = Math.max(food[i], rand(0.55, 0.95)); decay[i] = Math.max(decay[i], rand(0.9, 1.3)); }
          }
        }
        pulses.push({ x, y, age: 0, life: 1.0, max: r * 1.2, dead: true });
        plantTimer = 1;
      }

      // A spiny prey's end is a pure ERASER: it wipes stains, foliage, food value,
      // and nearby husks. It leaves no fertile patch behind.
      function wipeGiant(p, hard) {
        flushSeeps();                                          // settle any mid-seep stains first
        oldAgeBurst(p.x, p.y, 18 + p.size * (hard ? 1.7 : 1.35), p.size, hard);
        erasers.push({ x: p.x, y: p.y, max: 34 + p.size * (hard ? 1.9 : 1.55), age: 0, life: hard ? 0.5 : 0.68, lobes: makeEraserLobes(hard) });   // the erasure RADIATES outward
      }
      const popGiant = (p) => wipeGiant(p, true);
      const giantReset = (p) => wipeGiant(p, false);

      function makeEraserLobes(hard) {
        const n = hard ? 7 : 6, lobes = [{ a: 0, off: 0, rad: hard ? 0.38 : 0.32, alpha: 0.92 }];
        const base = rand(0, TAU);
        for (let i = 0; i < n; i++) {
          lobes.push({
            a: base + i / n * TAU + rand(-0.28, 0.28),
            off: rand(0.10, hard ? 0.58 : 0.46),
            rad: rand(0.20, hard ? 0.52 : 0.43),
            alpha: rand(0.34, hard ? 0.74 : 0.62),
          });
        }
        return lobes;
      }

      // an expanding, lopsided blood-eraser — clears in uneven lobes, not a perfect disk
      function updateErasers(dt) {
        const c = marksL.ctx;
        for (let i = erasers.length - 1; i >= 0; i--) {
          const e = erasers[i]; e.age += dt;
          const t = clamp(e.age / e.life, 0, 1), r = e.max * (1 - (1 - t) * (1 - t));   // easeOut radius
          const reach = r * 1.15;
          c.save(); c.globalCompositeOperation = 'destination-out';
          for (const l of e.lobes) {
            const lx = e.x + Math.cos(l.a) * r * l.off, ly = e.y + Math.sin(l.a) * r * l.off, lr = Math.max(2, r * l.rad);
            const g = c.createRadialGradient(lx, ly, lr * 0.18, lx, ly, lr);
            g.addColorStop(0, `rgba(0,0,0,${0.78 * l.alpha})`);
            g.addColorStop(0.58, `rgba(0,0,0,${0.46 * l.alpha})`);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            c.fillStyle = g; c.beginPath(); c.arc(lx, ly, lr, 0, TAU); c.fill();
            clearBlood(lx, ly, lr);
          }
          c.restore();
          // the blast strips the ground bare too — foliage goes with the blood
          const pc = plantL.ctx;
          pc.save(); pc.globalCompositeOperation = 'destination-out';
          for (const l of e.lobes) {
            const lx = e.x + Math.cos(l.a) * r * l.off, ly = e.y + Math.sin(l.a) * r * l.off, lr = Math.max(2, r * l.rad);
            const pg = pc.createRadialGradient(lx, ly, lr * 0.2, lx, ly, lr);
            pg.addColorStop(0, `rgba(0,0,0,${0.86 * l.alpha})`); pg.addColorStop(0.72, `rgba(0,0,0,${0.5 * l.alpha})`); pg.addColorStop(1, 'rgba(0,0,0,0)');
            pc.fillStyle = pg; pc.beginPath(); pc.arc(lx, ly, lr, 0, TAU); pc.fill();
          }
          pc.restore();
          const q0x = Math.floor((e.x - reach) / CELL), q1x = Math.floor((e.x + reach) / CELL);
          const q0y = Math.floor((e.y - reach) / CELL), q1y = Math.floor((e.y + reach) / CELL);
          for (let ty = q0y; ty <= q1y; ty++) for (let tx = q0x; tx <= q1x; tx++) {
            const wx = ((tx % gcols) + gcols) % gcols, wy = ((ty % grows) + grows) % grows;
            const px = wx * CELL + CELL / 2, py = wy * CELL + CELL / 2;
            let hit = false;
            for (const l of e.lobes) {
              const lx = e.x + Math.cos(l.a) * r * l.off, ly = e.y + Math.sin(l.a) * r * l.off, lr = Math.max(2, r * l.rad);
              const dx = wrapd(px - lx, W), dy = wrapd(py - ly, H);
              if (dx * dx + dy * dy <= lr * lr) { hit = true; break; }
            }
            if (!hit) continue;
            const j = wy * gcols + wx; food[j] = 0; decay[j] = 0;
          }
          for (let k = corpses.length - 1; k >= 0; k--) {
            const cp = corpses[k], dx = wrapd(cp.x - e.x, W), dy = wrapd(cp.y - e.y, H);
            if (dx * dx + dy * dy < reach * reach) corpses.splice(k, 1);
          }
          if (t >= 1) erasers.splice(i, 1);
        }
      }

      function oldAgeBurst(x, y, r, size, hard) {
        const parts = [];
        const n = (hard ? 16 : 12) + (size * 0.55 | 0);
        const bias = rand(0, TAU);
        for (let i = 0; i < n; i++) {
          const clustered = chance(0.62);
          const a = clustered ? bias + rand(-1.15, 1.15) + pick([-1, 0, 1]) * rand(0.25, 0.7) : rand(0, TAU);
          const speed = rand(r * 0.28, r * (hard ? 0.95 : 0.78));
          parts.push({
            a,
            speed,
            spin: rand(-1.2, 1.2),
            len: rand(5, 10 + size * 0.55),
            off: rand(0, r * 0.12),
            width: rand(0.55, 1.25),
            alpha: rand(0.34, hard ? 0.72 : 0.58),
          });
        }
        oldBursts.push({ x, y, age: 0, life: hard ? 0.72 : 0.84, r, parts });
      }

      // Corpses linger: an un-pecked body slowly rots, and a body picked clean
      // leaves a husk that fades over a few seconds.
      function updateCorpses(dt) {
        for (let i = corpses.length - 1; i >= 0; i--) {
          const cp = corpses[i]; cp.age += dt;
          if (cp.spent) { cp.fade += dt; if (cp.fade >= HUSK_LIFE) corpses.splice(i, 1); }
          else if (cp.age >= CORPSE_LIFE) { cp.spent = true; cp.fade = 0; }
        }
      }

      // The slow spin-down a STARVING animal does: decelerate, stop, then meander a
      // tight shrinking circle. Returns true once it has wound all the way down.
      function deathSpiral(a, dt) {
        a.dying += dt;
        const dur = a.dyingDur || DYING_DUR, spin = a.spinRate || 7, crawl = a.crawl ?? 13;
        if (a.dying / dur < 0.3) a.spd *= Math.max(0, 1 - 7 * dt);   // coast to a halt
        else { a.heading += spin * dt; a.spd = crawl; }             // then turn (giants: slow, in place)
        a.vx = Math.cos(a.heading) * a.spd; a.vy = Math.sin(a.heading) * a.spd;
        a.x = wrapp(a.x + a.vx * dt, W); a.y = wrapp(a.y + a.vy * dt, H);
        return a.dying >= dur;
      }

      // ---- agents ---------------------------------------------------------
      function makePrey(x, y, t) {
        t = t || {};
        return {
          x, y, vx: 0, vy: 0, spd: 0, heading: rand(0, TAU), wander: rand(0, TAU),
          energy: t.energy ?? rand(0.45, 0.7), age: 0, maxAge: rand(PREY_AGE[0], PREY_AGE[1]),
          size: MINR, cool: rand(2, 6), fleeing: false,
          blob: Array.from({ length: 16 }, () => rand(0.88, 1.12)),   // many gentle lumps — a soft organic blob
          shape: t.shape ?? (Math.random() * 5 | 0),                   // giant SILHOUETTE: spiny / 5-star / diamond / triangle / parallelogram
          glyph: Array.from({ length: 6 }, () => chance(0.5)),        // (legacy sprite bits)
          col: t.col || pick(PREY_COLORS),               // worn for life, bled in death
          alert: t.alert ?? rand(ALERT[0], ALERT[1]),
          fleeSpeed: t.fleeSpeed ?? rand(FLEE[0], FLEE[1]),
          graze: rand(GRAZE[0], GRAZE[1]),
          accel: rand(PREY_ACCEL[0], PREY_ACCEL[1]),     // its own urgency
        };
      }
      let predSeq = 0;
      function makePred(x, y, t) {
        t = t || {};
        const kind = PRED_TYPES[t.kind] ? t.kind : (chance(APEX_CHANCE) ? 'apex' : chance(0.52) ? 'quick' : 'fast');
        const spec = PRED_TYPES[kind];
        const speed = t.speed ?? rand(spec.speed[0], spec.speed[1]);
        // the speed/lifespan trade-off that keeps the ecosystem stable: a faster
        // hunter is more successful, but burns out and dies younger
        const fast = clamp((speed - spec.speed[0]) / (spec.speed[1] - spec.speed[0] || 1), 0, 1);
        return {
          x, y, vx: 0, vy: 0, spd: 0, heading: rand(0, TAU), wander: rand(0, TAU),
          energy: t.energy ?? rand(0.6, 0.9), age: t.age ?? 0,
          maxAge: rand(PRED_AGE[0], PRED_AGE[1]) * (1 - (kind === 'quick' ? 0.28 : 0.45) * fast),
          size: PBASE, hunting: false, kind, speed, id: ++predSeq, apex: kind === 'apex',
          accel: t.accel ?? rand(spec.accel[0], spec.accel[1]),  // its own build-up
          turn: t.turn ?? rand(spec.turn[0], spec.turn[1]),      // its own agility
          sustain: spec.sustain, tired: spec.tired, cruise: spec.cruise, moveBurn: spec.moveBurn,
          peckCd: 0, peckT: 0,                                   // corpse-pecking rhythm + jab
          chaseT: 0, rest: 0,                                   // give-up-and-cruise timers
          feedT: 0, corpseRest: 0,                              // corpse attention span + cool-off
        };
      }

      function hunterChaseSpeed(h) {
        const over = Math.max(0, h.chaseT - h.sustain);
        if (over <= 0) return h.speed;
        return h.speed * (1 - (1 - h.tired) * smooth01(over / 1.5));
      }

      function giantPlantSeek(p) {
        let ax = 0, ay = 0, total = 0, best = 0, bx = Math.cos(p.wander), by = Math.sin(p.wander);
        for (let k = 0; k < GIANT_SEEK_DIRS; k++) {
          const a = p.wander + (k / GIANT_SEEK_DIRS) * TAU;
          const dx = Math.cos(a), dy = Math.sin(a);
          const near = foodAt(p.x + dx * CELL * GIANT_SEEK_NEAR, p.y + dy * CELL * GIANT_SEEK_NEAR);
          const far = foodAt(p.x + dx * CELL * GIANT_SEEK_FAR, p.y + dy * CELL * GIANT_SEEK_FAR);
          const score = near * 0.8 + far * 1.2;
          const w = Math.max(0, score - 0.12);
          ax += dx * w; ay += dy * w; total += w;
          if (score > best) { best = score; bx = dx; by = dy; }
        }
        if (total <= 0.001) return { x: bx, y: by, pull: 0 };
        const m = Math.hypot(ax, ay) || 1;
        return { x: ax / m, y: ay / m, pull: clamp(total / GIANT_SEEK_DIRS, 0, 1) };
      }

      function killPrey(h, idx) {
        const tp = prey[idx];
        if (!tp || tp.dying || tp.size > GIANT_SIZE) return false;
        corpses.push({ x: tp.x, y: tp.y, size: tp.size, col: tp.col, blob: tp.blob, shape: tp.shape, heading: tp.heading, owner: h.id, food: KILL_GAIN * (tp.size / 7), age: 0, spent: false, fade: 0 });
        paintKill(tp);
        prey.splice(idx, 1);
        stats.kill++;
        h.chaseT = 0;
        h.peckT = Math.max(h.peckT, 0.12);
        return true;
      }

      function strikePreyAt(h, x, y) {
        let best = Infinity, hit = -1;
        for (let j = 0; j < prey.length; j++) {
          const p = prey[j];
          if (p.dying || p.size > GIANT_SIZE) continue;
          const dx = wrapd(p.x - x, W), dy = wrapd(p.y - y, H);
          const reach = p.size + h.size * 0.62 + STRIKE_PAD;
          const d2 = dx * dx + dy * dy;
          if (d2 < reach * reach && d2 < best) { best = d2; hit = j; }
        }
        return hit >= 0 && killPrey(h, hit);
      }

      function updatePrey(dt) {
        const births = [];
        for (let i = prey.length - 1; i >= 0; i--) {
          const p = prey[i];
          // already starving to death — spin down, then resolve as fertilizer or eraser
          if (p.dying) { if (deathSpiral(p, dt)) { if (p.dmode === 'old') { giantReset(p); stats.old++; } else if (p.size > GIANT_SIZE) { popGiant(p); stats.starve++; } else { fertilize(p.x, p.y); stats.starve++; } prey.splice(i, 1); } continue; }
          // nearest predator (toroidal)
          let nd = Infinity, ndx = 0, ndy = 0;
          for (const h of preds) {
            const dx = wrapd(p.x - h.x, W), dy = wrapd(p.y - h.y, H), d2 = dx * dx + dy * dy;
            if (d2 < nd) { nd = d2; ndx = dx; ndy = dy; }
          }
          const dist = Math.sqrt(nd);
          const giant = p.size > GIANT_SIZE;
          p.fleeing = dist < p.alert && !giant;   // spiny giants are immune — they never run

          let dvx, dvy, sp;
          if (p.fleeing) {
            const inv = 1 / (dist || 1); dvx = ndx * inv; dvy = ndy * inv; sp = p.fleeSpeed;
          } else if (giant) {
            p.wander += rand(-1, 1) * 1.2 * dt;
            const seek = giantPlantSeek(p);
            const gx = foodAt(p.x + CELL * 2, p.y) - foodAt(p.x - CELL * 2, p.y);
            const gy = foodAt(p.x, p.y + CELL * 2) - foodAt(p.x, p.y - CELL * 2);
            let ax = Math.cos(p.wander) * 0.35 + seek.x * 3.8 + gx * 1.4;
            let ay = Math.sin(p.wander) * 0.35 + seek.y * 3.8 + gy * 1.4;
            const m = Math.hypot(ax, ay) || 1; dvx = ax / m; dvy = ay / m;
            sp = clamp(p.graze * (0.62 + seek.pull * 0.8), 12, 24);
          } else {
            p.wander += rand(-1, 1) * 3 * dt;
            // amble, with a gentle pull toward richer grazing nearby
            const gx = foodAt(p.x + CELL, p.y) - foodAt(p.x - CELL, p.y);
            const gy = foodAt(p.x, p.y + CELL) - foodAt(p.x, p.y - CELL);
            let ax = Math.cos(p.wander) + gx * 2.2, ay = Math.sin(p.wander) + gy * 2.2;
            const m = Math.hypot(ax, ay) || 1; dvx = ax / m; dvy = ay / m; sp = p.graze;
          }
          if (!giant && p.size > 12) sp *= clamp(1 - (p.size - 12) / 22, 0.55, 1);  // big prey are a little slower
          // steer the heading toward the desired direction at a turn rate, then
          // accelerate (fleeing → snap hard up to sprint) or decelerate (safe →
          // coast gently back down to a graze)
          let dh = Math.atan2(dvy, dvx) - p.heading; dh = Math.atan2(Math.sin(dh), Math.cos(dh));
          const tr = p.fleeing ? PREY_TURN_FLEE : PREY_TURN;
          p.heading += clamp(dh, -tr * dt, tr * dt);
          const rate = p.fleeing ? p.accel : PREY_DECEL;
          p.spd += (sp - p.spd) * Math.min(1, rate * dt);
          p.vx = Math.cos(p.heading) * p.spd; p.vy = Math.sin(p.heading) * p.spd;
          const ox = p.x, oy = p.y;
          p.x = wrapp(p.x + p.vx * dt, W); p.y = wrapp(p.y + p.vy * dt, H);
          if (p.fleeing && p.spd > 42) traceMotionTiles(ox, oy, p.x, p.y, p.col, p.size);

          // a spiny giant is a roaming eraser: it rubs out any blood or trail it walks over
          if (p.size > GIANT_SIZE && (p.eraseCd = (p.eraseCd || 0) - dt) <= 0) {
            p.eraseCd = 0.07;                                  // a trundling giant needn't re-rub the same spot 60x/s
            const c = marksL.ctx, er = p.size * 1.3;
            c.save(); c.globalCompositeOperation = 'destination-out';
            const g = c.createRadialGradient(p.x, p.y, 0, p.x, p.y, er);   // soft, blurry rub — gradient, not a filter
            g.addColorStop(0, 'rgba(0,0,0,0.42)'); g.addColorStop(0.35, 'rgba(0,0,0,0.28)'); g.addColorStop(0.65, 'rgba(0,0,0,0.13)'); g.addColorStop(0.85, 'rgba(0,0,0,0.04)'); g.addColorStop(1, 'rgba(0,0,0,0)');
            c.fillStyle = g; c.beginPath(); c.arc(p.x, p.y, er, 0, TAU); c.fill();
            c.restore();
            clearBlood(p.x, p.y, er);
          }

          if (!warming) {                                       // drag the ground around, and eat a hole in it
            p.smearCd = (p.smearCd || 0) - dt;
            if (p.smearCd <= 0) { p.smearCd = 0.06; smearPlants(p); rubPlants(p); }
          }

          // graze the tile underfoot — but a GIANT hoovers its whole footprint clean
          if (p.size > GIANT_SIZE) {
            const rr = p.size * 1.4, r2 = rr * rr;
            const t0x = Math.floor((p.x - rr) / CELL), t1x = Math.floor((p.x + rr) / CELL);
            const t0y = Math.floor((p.y - rr) / CELL), t1y = Math.floor((p.y + rr) / CELL);
            for (let ty = t0y; ty <= t1y; ty++) for (let tx = t0x; tx <= t1x; tx++) {
              const wx = ((tx % gcols) + gcols) % gcols, wy = ((ty % grows) + grows) % grows;
              const dx = wrapd(wx * CELL + CELL / 2 - p.x, W), dy = wrapd(wy * CELL + CELL / 2 - p.y, H);
              if (dx * dx + dy * dy > r2) continue;
              const j = wy * gcols + wx, b = Math.min(food[j], EAT * 0.7 * dt);
              food[j] -= b; p.energy += b * NUTR;
            }
          } else {
            const ti = tileIdx(p.x, p.y);
            const bite = Math.min(food[ti], EAT * dt); food[ti] -= bite; p.energy += bite * NUTR;
          }

          // burn, age, grow
          p.energy -= METAB_PREY * (p.fleeing ? FLEE_COST : 1) * (0.7 + p.size / 9) * dt;
          if (p.energy > 1) p.energy = 1;
          p.age += dt; p.cool -= dt;
          p.size = MINR + (MAXR - MINR) * clamp(p.age / SIZE_AGE, 0, 1);
          if (!p.elder && p.size > GIANT_SIZE) { p.elder = 1; p.maxAge += rand(45, 75); }   // a giant earns a long reign

          // death
          if (p.energy <= 0) { p.dying = 1e-6; p.dmode = 'starve'; continue; }   // begin the starving spin-down
          if (p.age >= p.maxAge) { if (p.size > GIANT_SIZE) { p.dying = 1e-6; p.dmode = 'old'; p.dyingDur = 3.4; p.spinRate = 2.2; p.crawl = 3; continue; } renew(p.x, p.y, 32 + p.size * 3); prey.splice(i, 1); stats.old++; continue; }

          // breed — each newborn takes a fresh random colour, so the field keeps
          // its full spread of hues instead of one lineage taking over
          if (p.age > PREY_MATURE && p.size >= PREY_BREED_R && p.energy > PREY_REP && p.cool <= 0 && prey.length + births.length < CAP_PREY) {
            births.push(makePrey(p.x + rand(-12, 12), p.y + rand(-12, 12), {
              shape: p.shape,
              energy: 0.32,
              alert: clamp(p.alert + rand(-12, 12), ALERT[0] - 6, ALERT[1] + 6),
              fleeSpeed: clamp(p.fleeSpeed + rand(-8, 8), FLEE[0] - 6, FLEE[1] + 6),
            }));
            p.energy -= 0.36; p.cool = rand(12, 18);
          }
        }
        for (const b of births) prey.push(b);
      }

      function updatePreds(dt) {
        const births = [];
        const D2 = DETECT * DETECT, D2C = (DETECT * 0.85) * (DETECT * 0.85);
        const giants = prey.filter(p => p.size > GIANT_SIZE && !p.dying);   // things to give a wide berth
        for (let i = preds.length - 1; i >= 0; i--) {
          const h = preds[i];

          // starving to death — spin down, then fall as a crosshatch mark
          if (h.dying) { if (deathSpiral(h, dt)) { paintHatch(h.x, h.y, 1); preds.splice(i, 1); stats.predDie++; } continue; }
          if (h.peckT > 0) h.peckT -= dt;

          // how much live meat is walking around right here?
          let liveNear = 0;
          for (let j = 0; j < prey.length; j++) {
            const p = prey[j];
            if (p.dying || p.size > GIANT_SIZE) continue;
            const dx = wrapd(p.x - h.x, W), dy = wrapd(p.y - h.y, H);
            if (dx * dx + dy * dy < D2) { if (++liveNear >= PLENTY) break; }
          }

          // a fresh corpse nearby is free food — go peck it apart before chasing,
          // but only for so long: it gets bored rather than orbiting a body to death.
          // And when prey are PLENTIFUL it snubs carrion entirely: why chew a husk
          // when there is fresh meat everywhere?
          if (h.corpseRest > 0) h.corpseRest -= dt;
          let cTgt = -1, cbest = Infinity;
          if (h.corpseRest <= 0) {
            for (let j = 0; j < corpses.length; j++) {
              const cp = corpses[j];
              if (cp.spent) continue;
              if (h.apex && cp.owner !== h.id) continue;            // an apex will not touch another's kill
              if (liveNear >= PLENTY && cp.age > FRESH) continue;   // meat everywhere — only a FRESH body is worth stopping for
              const dx = wrapd(cp.x - h.x, W), dy = wrapd(cp.y - h.y, H), d2 = dx * dx + dy * dy;
              if (d2 < D2C && d2 < cbest) { cbest = d2; cTgt = j; }
            }
          }
          if (cTgt >= 0) {
            h.feedT += dt;
            if (h.feedT > FEED_MAX) { h.feedT = 0; h.corpseRest = 5; cTgt = -1; }   // bored — go find something live
          } else h.feedT = 0;

          let dvx, dvy, baseSp, aggro = 1, liveChase = false;
          if (cTgt >= 0) {
            const cp = corpses[cTgt];
            const dx = wrapd(cp.x - h.x, W), dy = wrapd(cp.y - h.y, H), cdist = Math.sqrt(cbest), inv = 1 / (cdist || 1);
            dvx = dx * inv; dvy = dy * inv; h.hunting = true;
            baseSp = h.speed * clamp(cdist / 70, 0.05, 1);       // BRAKE on approach — no more orbiting the body
            if (cdist < cp.size + h.size * 0.5 + 12) {           // settle in and feed
              dvx = Math.cos(h.heading); dvy = Math.sin(h.heading); // hold heading — no spinning over the body
              baseSp = h.speed * 0.04;                           // nearly still
              h.peckCd -= dt;
              if (h.peckCd <= 0) {                               // an unhurried peck: a bite, a little shrink, a little blood
                const bite = Math.min(cp.food, PECK_BITE);
                cp.food -= bite; h.energy += bite; cp.size *= 0.92;
                paintStain(cp.x + rand(-3, 3), cp.y + rand(-3, 3), deepen(cp.col), 0.35 + cp.size / 12, { baseR: 11, wash: 0.04, layers: 9, life: 1.0 });
                h.peckCd = 0.30; h.peckT = 0.2;
                if (cp.food <= 0.02 || cp.size < 1.6) { cp.spent = true; cp.fade = 0; }   // picked clean — husk lingers
              }
            }
          } else if (h.rest > 0) {                            // just broke off a hopeless chase — cruise and cool off
            h.rest -= dt; h.chaseT = 0; h.hunting = false;
            h.wander += rand(-1, 1) * 2.4 * dt;
            dvx = Math.cos(h.wander); dvy = Math.sin(h.wander); baseSp = h.speed * h.cruise;
          } else {
            // pick the NEAREST live, non-spiny prey in sight — size is no object, only spiny is immune
            let best = Infinity, tgt = -1, ndx = 0, ndy = 0, dist = 0, nearby = 0;
            for (let j = 0; j < prey.length; j++) {
              const p = prey[j];
              if (p.dying || p.size > GIANT_SIZE) continue;   // dying, or a spiny giant (immune) — leave it
              const dx = wrapd(p.x - h.x, W), dy = wrapd(p.y - h.y, H), d2 = dx * dx + dy * dy;
              if (d2 > D2) continue;
              nearby++;
              if (d2 < best) { best = d2; tgt = j; ndx = dx; ndy = dy; dist = Math.sqrt(d2); }
            }
            aggro = 1 + AGGRO_K * Math.min(1, nearby / AGGRO_REF);   // a swarm makes it quicker to turn/pursue
            if (tgt >= 0) {
              const tp = prey[tgt];
              const lead = clamp(dist / Math.max(1, h.speed + tp.spd), 0, PRED_LEAD);
              const ldx = ndx + tp.vx * lead, ldy = ndy + tp.vy * lead, lm = Math.hypot(ldx, ldy) || 1;
              h.chaseT += dt;
              dvx = ldx / lm; dvy = ldy / lm; baseSp = hunterChaseSpeed(h); h.hunting = true; liveChase = true;
              if (dist < tp.size + h.size * 0.5 + 11) {       // caught
                if (killPrey(h, tgt)) liveChase = false;
              } else if (h.chaseT > CHASE_MAX) { h.rest = 2.0; h.chaseT = 0; }   // give up — stop burning out on one runner
            } else {
              h.chaseT = 0;
              h.wander += rand(-1, 1) * 2.4 * dt;
              dvx = Math.cos(h.wander); dvy = Math.sin(h.wander); baseSp = h.speed * h.cruise; h.hunting = false;
            }
          }

          // give the spines a wide berth — steer around a giant, never through it
          for (const gp of giants) {
            const gx = wrapd(h.x - gp.x, W), gy = wrapd(h.y - gp.y, H), gd2 = gx * gx + gy * gy;
            const rr = gp.size * 1.9 + h.size;
            if (gd2 < rr * rr && gd2 > 1e-6) {
              const gd = Math.sqrt(gd2), wgt = (1 - gd / rr) * 2.6;
              dvx += (gx / gd) * wgt; dvy += (gy / gd) * wgt;
              const hard = gp.size * 1.15 + h.size * 0.5;      // and never overlap the body
              if (gd < hard) { h.x = wrapp(gp.x + (gx / gd) * hard, W); h.y = wrapp(gp.y + (gy / gd) * hard, H); }
            }
          }

          // shared steering — a starving hunter goes SLUGGISH and grinds to a halt
          const vigor = clamp(STARVE_SLOW + h.energy / HREF, STARVE_SLOW, 1);
          let dh = Math.atan2(dvy, dvx) - h.heading; dh = Math.atan2(Math.sin(dh), Math.cos(dh));
          h.heading += clamp(dh, -h.turn * aggro * dt, h.turn * aggro * dt);
          h.spd += (baseSp * vigor - h.spd) * Math.min(1, h.accel * aggro * dt);
          h.vx = Math.cos(h.heading) * h.spd; h.vy = Math.sin(h.heading) * h.spd;
          const ox = h.x, oy = h.y;
          h.x = wrapp(h.x + h.vx * dt, W); h.y = wrapp(h.y + h.vy * dt, H);
          if (liveChase) strikePreyAt(h, h.x, h.y);
          traceHunterVector(ox, oy, h.x, h.y, h.hunting);
          // only when it is standing IN blood does a hunter pick up a trail — and
          // that trail is the blood's OWN colour, tracked out as it leaves the pool
          const bi = clamp(h.y / BCELL | 0, 0, bgH - 1) * bgW + clamp(h.x / BCELL | 0, 0, bgW - 1);
          if (bA[bi] > 0.12) { h.bloody = 0.5; h.bcol = [bR[bi], bG[bi], bB[bi]]; }
          if (h.bloody > 0) {
            h.bloody -= dt;
            const tdx = h.x - h.px, tdy = h.y - h.py;
            if (h.px !== undefined && tdx * tdx + tdy * tdy < 3600) {
              const mc = marksL.ctx, d = 0.78;                  // a smooth 1px line, a touch darker than the pool, fading to nothing
              mc.strokeStyle = `rgba(${h.bcol[0] * d | 0},${h.bcol[1] * d | 0},${h.bcol[2] * d | 0},${clamp(h.bloody * 0.5, 0.06, 0.28)})`;
              mc.lineWidth = 1; mc.lineCap = 'round'; mc.lineJoin = 'round';
              mc.beginPath(); mc.moveTo(h.px, h.py); mc.lineTo(h.x, h.y); mc.stroke();
            }
          }
          h.px = ox; h.py = oy;

          // size tracks accumulated energy (weak = small); energy burns with MOVEMENT
          h.size = clamp(PBASE + h.energy * PGROWK, PBASE, PMAX);
          h.energy -= (BMR + MOVE_K * Math.hypot(h.vx, h.vy) * h.moveBurn) * dt;
          h.age += dt;

          if (h.energy <= 0) { h.dying = 1e-6; continue; }       // starve -> spin down
          if (h.age >= h.maxAge) { paintHatch(h.x, h.y, 1.3); preds.splice(i, 1); stats.predDie++; continue; }

          // grow big -> divide in half: the only way new hunters are born
          if (h.energy >= SPLIT_E && preds.length + births.length < CAP_PRED) {
            h.energy *= 0.5;
            const ch = h.heading + rand(0.6, 1.4) * (chance(0.5) ? 1 : -1);
            const kidKind = h.kind === 'apex'
              ? (chance(0.12) ? 'apex' : pick(PRED_TYPE_NAMES))   // an apex rarely breeds true — it stays a rarity
              : (chance(0.86) ? h.kind : pick(PRED_TYPE_NAMES));
            const kidSpec = PRED_TYPES[kidKind];
            const kid = makePred(h.x + Math.cos(ch) * 9, h.y + Math.sin(ch) * 9, {
              energy: h.energy, kind: kidKind, speed: clamp(h.speed + rand(-6, 6), kidSpec.speed[0] - 4, kidSpec.speed[1] + 4), age: 0,
            });
            kid.heading = ch; stats.splits++;
            births.push(kid);
          }
        }
        for (const b of births) preds.push(b);
      }

      // Same-type bodies can't overlap: push any pair closer than their combined
      // radii apart. Prey just bump and crowd; hunters additionally BOUNCE —
      // their velocities reflect off the contact normal, so they ricochet. Hunters
      // and prey are NOT separated — that's how a hunter reaches a prey to take it.
      function separate(arr, bounce) {
        for (let i = 0; i < arr.length; i++) {
          const a = arr[i];
          for (let j = i + 1; j < arr.length; j++) {
            const b = arr[j];
            const dx = wrapd(b.x - a.x, W), dy = wrapd(b.y - a.y, H), d2 = dx * dx + dy * dy;
            const rs = (a.size + b.size) * SEP_K;
            if (d2 < rs * rs && d2 > 1e-4) {
              const d = Math.sqrt(d2), o = (rs - d) * 0.5, nx = dx / d, ny = dy / d;
              a.x = wrapp(a.x - nx * o, W); a.y = wrapp(a.y - ny * o, H);
              b.x = wrapp(b.x + nx * o, W); b.y = wrapp(b.y + ny * o, H);
              if (bounce) {
                const van = a.vx * nx + a.vy * ny;            // a heading into b → reflect
                if (van > 0) { a.vx -= 2 * van * nx; a.vy -= 2 * van * ny; a.heading = Math.atan2(a.vy, a.vx); a.spd = Math.hypot(a.vx, a.vy); }
                const vbn = b.vx * nx + b.vy * ny;            // b heading into a → reflect
                if (vbn < 0) { b.vx -= 2 * vbn * nx; b.vy -= 2 * vbn * ny; b.heading = Math.atan2(b.vy, b.vx); b.spd = Math.hypot(b.vx, b.vy); }
              }
            }
          }
        }
      }

      // immigration floor — a trickle from "off-screen" so neither side dies out
      function immigrate(dt) {
        while (prey.length < MIN_PREY) prey.push(makePrey(rand(0, W), rand(0, H)));
        if (preds.length < MIN_PRED && chance(0.5 * dt)) preds.push(makePred(rand(0, W), rand(0, H)));
      }

      // ---- drawing agents -------------------------------------------------
      function drawOldBursts() {
        for (let i = oldBursts.length - 1; i >= 0; i--) {
          const b = oldBursts[i];
          b.age += 1 / 60;
          const t = b.age / b.life;
          if (t >= 1) { oldBursts.splice(i, 1); continue; }
          const ease = 1 - Math.pow(1 - t, 3);
          const a = Math.pow(1 - t, 1.35);
          ctx.save();
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          for (const p of b.parts) {
            const ang = p.a + p.spin * t;
            const inner = p.off + p.speed * ease * 0.22;
            const outer = p.off + p.speed * ease;
            const x1 = b.x + Math.cos(ang) * inner;
            const y1 = b.y + Math.sin(ang) * inner;
            const x2 = b.x + Math.cos(ang) * (outer + p.len * (1 - t) * 0.35);
            const y2 = b.y + Math.sin(ang) * (outer + p.len * (1 - t) * 0.35);
            ctx.strokeStyle = `rgba(255,252,244,${p.alpha * a})`;
            ctx.lineWidth = p.width;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
          }
          ctx.restore();
        }
      }

      function drawAgents() {
        // renewal pulses
        for (let i = pulses.length - 1; i >= 0; i--) {
          const pl = pulses[i]; pl.age += 1 / 60;
          const t = pl.age / pl.life;
          if (t >= 1) { pulses.splice(i, 1); continue; }
          const c1 = pl.white ? '248,246,240' : pl.dead ? '150,110,52' : '150,220,120', c2 = pl.white ? '255,255,252' : pl.dead ? '196,156,96' : '224,255,184';
          ctx.beginPath(); ctx.arc(pl.x, pl.y, pl.max * t, 0, TAU);
          ctx.strokeStyle = `rgba(${c1},${(1 - t) * 0.6})`; ctx.lineWidth = 2.5; ctx.stroke();
          ctx.beginPath(); ctx.arc(pl.x, pl.y, pl.max * t * 0.68, 0, TAU);
          ctx.strokeStyle = `rgba(${c2},${(1 - t) * 0.4})`; ctx.lineWidth = 1.2; ctx.stroke();
        }
        drawOldBursts();
        // corpses — the body lingers as a dark husk, shrinking peck by peck
        for (const cp of corpses) {
          const a = cp.spent ? clamp(1 - cp.fade / HUSK_LIFE, 0, 1) : 1, r = cp.size, [cr, cg, cb] = deepen(cp.col);
          ctx.save(); ctx.translate(cp.x, cp.y); ctx.rotate(cp.heading || 0);
          drawPreyBody(ctx, r * 0.95, cp.blob, [cr, cg, cb], 0.72 * a, false, cp.shape);
          ctx.restore();
        }
        // prey — soft blobs in their own colour; a fleeing one sheds droplets. Giants are SPINY.
        // A starving one is spinning down: it shrinks toward nothing.
        for (const p of prey) {
          const giant = p.size > GIANT_SIZE, dprog = p.dying ? p.dying / (p.dyingDur || DYING_DUR) : 0;
          const dscale = p.dying ? (giant ? clamp(1 - dprog * 0.28, 0.68, 1) : Math.max(0, 1 - dprog)) : clamp(0.4 + 0.6 * p.energy, 0.4, 1);
          const r = p.size * dscale;
          let [cr, cg, cb] = preyDisplayColor(p, dprog);
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.heading);
          const spd = Math.hypot(p.vx, p.vy);
          if (p.fleeing && spd > 40) drawPanicPixels(ctx, r, [cr, cg, cb]);
          drawPreyBody(ctx, r, p.blob, [cr, cg, cb], 0.94, giant, p.shape);
          ctx.restore();
        }
        // hunters — compact black arcade glyphs, no stem or taper.
        // always opaque; a weak one is simply SMALLER. Glints gold before it splits.
        for (const h of preds) {
          const dscale = h.dying ? Math.max(0, 1 - h.dying / DYING_DUR) : 1;
          const r = h.size * dscale;
          const jab = h.peckT > 0 ? Math.sin((1 - h.peckT / 0.2) * Math.PI) * r * 0.5 : 0;  // a small nod while feeding
          ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(h.heading); ctx.translate(jab, 0);
          drawHunterGlyph(ctx, r, h.energy > SPLIT_E * 0.8, h.apex);
          ctx.restore();
        }
      }

      // ---- frame ----------------------------------------------------------
      function frame(t) {
        const dt = Math.min(0.05, (t - last) / 1000 || 0);
        last = t;
        if (dt > 0) fps = fps * 0.9 + (1 / dt) * 0.1;

        advanceTone(dt);
        stepPlants(dt);
        updatePrey(dt);
        updatePreds(dt);
        separate(prey, false); separate(preds, true);
        updateCorpses(dt);
        immigrate(dt);

        growSeeps(dt);                 // stains bloom outward over time
        updateErasers(dt);             // giant-pop erasures radiate outward
        // ...and very slowly soak into the page, so the painting breathes instead
        // of piling up forever (old-age renewal still wipes patches outright)
        { const fc = marksL.ctx; fc.save(); fc.globalCompositeOperation = 'destination-out'; fc.fillStyle = `rgba(0,0,0,${0.22 * dt})`; fc.fillRect(0, 0, W, H); fc.restore(); }
        decayBlood(dt);

        plantTimer -= dt;
        if (plantTimer <= 0) { drawPlants(); plantTimer = 0.04; }

        compose(soilL);
        compose(plantL);
        compose(cartoL);
        compose(marksL);
        drawAgents();

        if (debug) {
          let fsum = 0; for (let i = 0; i < food.length; i++) fsum += food[i];
          debugEl.textContent =
            `prey     ${prey.length}\n` +
            `hunters  ${preds.length}\n` +
            `plants   ${(fsum / food.length * 100).toFixed(0)}% cover\n` +
            `growth   ${PLANT_GROWTH.toFixed(2)}  [g/G]\n` +
            `prop     ${PLANT_PROP.toFixed(2)}  [p/P]\n` +
            `died  starve ${stats.starve}  killed ${stats.kill}  old ${stats.old}  hunter ${stats.predDie}\n` +
            `splits   ${stats.splits}\n` +
            `fps      ${fps.toFixed(0)}`;
        }
        requestAnimationFrame(frame);
      }

      // ---- seeding & input ------------------------------------------------
      function reset() {
        soilTint = SOILS[setIndex % SOILS.length];
        flowers = FLOWER_SETS[setIndex % FLOWER_SETS.length];
        flowerRGBs = flowers.map(hexRgb);
        for (let i = 0; i < food.length; i++) food[i] = chance(0.28) ? rand(0.15, 0.7) : 0;
        decay.fill(0); bA.fill(0);
        plantL.ctx.clearRect(0, 0, W, H);
        cartoL.ctx.clearRect(0, 0, W, H);
        plantCursor = 0;
        prey = []; preds = []; pulses = []; seeps = []; corpses = []; oldBursts = []; erasers = [];
        for (let i = 0; i < PREY0; i++) prey.push(makePrey(rand(0, W), rand(0, H)));
        for (let i = 0; i < PRED0; i++) preds.push(makePred(rand(0, W), rand(0, H)));
        stats.starve = stats.kill = stats.old = stats.predDie = stats.splits = 0;
        paintSoil();
        paintCartography();
        marksL.ctx.clearRect(0, 0, W, H);
        plantTimer = 0;
      }

      addEventListener('click', () => { setIndex++; reset(); });
      addEventListener('keydown', (e) => {
        const k = e.key;
        if (k === 'g') PLANT_GROWTH = Math.max(0.05, +(PLANT_GROWTH - 0.05).toFixed(2));
        else if (k === 'G') PLANT_GROWTH = Math.min(3, +(PLANT_GROWTH + 0.05).toFixed(2));
        else if (k === 'p') PLANT_PROP = Math.max(0, +(PLANT_PROP - 0.05).toFixed(2));
        else if (k === 'P') PLANT_PROP = Math.min(5, +(PLANT_PROP + 0.05).toFixed(2));
      });
      addEventListener('resize', () => { resize(); reset(); if (WARM > 0) warmUp(WARM); });

      // Fast-forward the simulation without drawing, so the field opens already
      // alive — a settled herd, hunting hunters, a canvas with some history on it
      // — instead of a sparse cold start. ?warm=120 warms by 120 seconds.
      function warmUp(seconds) {
        const wdt = 1 / 30;
        warming = true;
        const fc = marksL.ctx;
        for (let s = 0, n = (seconds / wdt) | 0; s < n; s++) {
          advanceTone(wdt); stepPlants(wdt); updatePrey(wdt); updatePreds(wdt); separate(prey, false); separate(preds, true); updateCorpses(wdt); immigrate(wdt); growSeeps(wdt); updateErasers(wdt);
          fc.save(); fc.globalCompositeOperation = 'destination-out'; fc.fillStyle = `rgba(0,0,0,${0.22 * wdt})`; fc.fillRect(0, 0, W, H); fc.restore(); decayBlood(wdt);   // same soak-away as live
        }
        warming = false;
        pulses.length = 0; oldBursts.length = 0; flushSeeps(); drawPlants(plantPixCols * plantPixRows); plantTimer = 0.1;  // full paint, opens settled
      }

      // ---- boot -----------------------------------------------------------
      (function boot() {
        const q = new URLSearchParams(location.search);
        if (q.has('growth')) PLANT_GROWTH = Math.max(0.05, +q.get('growth') || PLANT_GROWTH);
        if (q.has('prop')) PLANT_PROP = Math.max(0, +q.get('prop') || PLANT_PROP);
        if (debug) debugEl.style.display = 'block';
        resize();
        reset();
        WARM = Math.min(600, +q.get('warm') || 0);
        if (WARM > 0) warmUp(WARM);
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
