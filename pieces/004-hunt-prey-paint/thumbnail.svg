<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="wc1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a86fd6" stop-opacity="0.75"/>
      <stop offset="60%" stop-color="#7a4bb0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a86fd6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wc2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40b0c8" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#2c7e93" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#40b0c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wc3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0648c" stop-opacity="0.72"/>
      <stop offset="60%" stop-color="#b03f63" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#e0648c" stop-opacity="0"/>
