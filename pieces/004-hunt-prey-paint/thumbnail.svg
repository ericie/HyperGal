      <stop offset="0%" stop-color="#e8a13a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8a13a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#c2a877"/>
  <!-- watercolour death-blooms, in the colours of the fallen -->
  <circle cx="56" cy="66" r="30" fill="url(#wc1)"/>
  <circle cx="150" cy="140" r="26" fill="url(#wc2)"/>
  <circle cx="120" cy="58" r="20" fill="url(#wc3)"/>
  <circle cx="64" cy="150" r="18" fill="url(#wc4)"/>
